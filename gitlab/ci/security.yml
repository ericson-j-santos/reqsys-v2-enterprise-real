security_baseline_smoke:
  stage: security
  image: alpine:3.20
  script:
    - mkdir -p audit
    - echo "security_status=passed" > audit/gitlab-security-baseline.txt
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - audit/gitlab-security-baseline.txt

backend_sast_bandit:
  stage: security
  image: python:3.12-slim
  rules:
    - changes:
        - backend/**/*
        - gitlab/**/*
        - .gitlab-ci.yml
  before_script:
    - python -m pip install --upgrade pip bandit
  script:
    - mkdir -p audit
    - bandit -r backend/app -ll -x backend/app/tests -f json -o audit/gitlab-bandit-report.json
    - bandit -r backend/app -ll -x backend/app/tests
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - audit/gitlab-bandit-report.json
