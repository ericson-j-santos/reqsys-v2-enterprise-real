gitlab_devsecops_baseline:
  stage: security
  image: python:3.12-slim
  script:
    - mkdir -p audit
    - python gitlab/scripts/generate_devsecops_baseline.py --output audit/gitlab-devsecops-report.json --markdown audit/gitlab-devsecops-report.md
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - audit/gitlab-devsecops-report.json
      - audit/gitlab-devsecops-report.md

secret_detection_gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - mkdir -p audit
    - gitleaks detect --source . --no-git --redact
        --report-format json --report-path audit/gitlab-secret-detection-report.json
        --exit-code 1
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - audit/gitlab-secret-detection-report.json

backend_dependency_scanning_pip_audit:
  stage: security
  image: python:3.12-slim
  rules:
    - changes:
        - backend/**/*
        - gitlab/**/*
        - .gitlab-ci.yml
  before_script:
    - python -m pip install --upgrade pip pip-audit
  script:
    - mkdir -p audit
    - pip-audit -r backend/requirements-audit.txt --no-deps --format json --output audit/gitlab-pip-audit-report.json
    - pip-audit -r backend/requirements-audit.txt --no-deps
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - audit/gitlab-pip-audit-report.json

frontend_dependency_scanning_npm_audit:
  stage: security
  image: node:20-slim
  rules:
    - changes:
        - frontend/**/*
        - gitlab/**/*
        - .gitlab-ci.yml
  before_script:
    - cd frontend
    - npm ci
  script:
    - mkdir -p ../audit
    - npm audit --audit-level=high --json > ../audit/gitlab-npm-audit-report.json || true
    - npm audit --audit-level=high
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - audit/gitlab-npm-audit-report.json

container_scanning_trivy:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - mkdir -p audit
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL --format json --output audit/gitlab-trivy-report.json backend frontend
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL backend frontend
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - audit/gitlab-trivy-report.json
