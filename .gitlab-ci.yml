stages:
  - classify
  - governance
  - test
  - security
  - evidence
  - deploy

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

include:
  - local: gitlab/ci/classify.yml
  - local: gitlab/ci/governance.yml
  - local: gitlab/ci/runtime.yml
  - local: gitlab/ci/security.yml
  - local: gitlab/ci/devsecops.yml
  - local: gitlab/ci/environments.yml
  - local: gitlab/ci/evidence.yml
  - local: gitlab/ci/deploy.yml
