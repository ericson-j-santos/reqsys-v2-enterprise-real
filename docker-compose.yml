services:
  api:
    build: ./backend
    container_name: reqsys-api
    restart: unless-stopped
    # Porta exposta ao host apenas para debug/testes locais.
    # Em produção real esta linha deve ser removida — acesso somente via gateway.
    ports: ["${BACKEND_PORT:-8210}:8000"]
    environment:
      - DATABASE_URL=sqlite:///./reqsys.db
      - JWT_SECRET=trocar-em-producao
      # CORS aponta apenas para a origem do gateway — nunca porta exposta direta
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:${GATEWAY_PORT:-8082}}
      - SSRS_BASE_URL=${SSRS_BASE_URL:-}
      - SSRS_REPORTS_PATH=${SSRS_REPORTS_PATH:-ReqSys}
      - SSRS_REPORT_NAMES=${SSRS_REPORT_NAMES:-AtvIndividual,Cracha,CracháAula2,RelatorioDetalhado,RelatorioDetalhadoAula2}
      - REDMINE_URL=${REDMINE_URL:-}
      - REDMINE_API_KEY=${REDMINE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ENABLE_GITHUB_REDMINE_IMPORT=${ENABLE_GITHUB_REDMINE_IMPORT:-true}
    networks:
      - reqsys-net
  frontend:
    build: ./frontend
    container_name: reqsys-frontend
    restart: unless-stopped
    # Sem porta exposta ao host — acesso somente via gateway (nginx)
    expose: ["5173"]
    environment:
      # /api é resolvido pelo nginx internamente — sem porta hardcoded
      - VITE_API_URL=/api
    depends_on: [api]
    networks:
      - reqsys-net
  kb:
    build: ../../kb
    container_name: reqsys-kb
    restart: unless-stopped
    expose: ["8080"]
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --root-path /kb
    environment:
      - KB_DB_PATH=/data/kb.db
    volumes:
      - kb-data:/data
    networks:
      - reqsys-net
  nginx:
    image: nginx:alpine
    container_name: reqsys-nginx
    restart: unless-stopped
    # Único ponto de entrada público. Toda porta definida em um lugar só.
    ports: ["${GATEWAY_PORT:-8082}:80"]
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, api, kb]
    networks:
      - reqsys-net

networks:
  reqsys-net:
    driver: bridge

volumes:
  kb-data:
