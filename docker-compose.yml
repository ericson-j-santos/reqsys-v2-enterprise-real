services:
  api:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./reqsys.db
      - JWT_SECRET=trocar-em-producao
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:${GATEWAY_PORT:-8081}}
      - SSRS_BASE_URL=${SSRS_BASE_URL:-}
      - SSRS_REPORTS_PATH=${SSRS_REPORTS_PATH:-ReqSys}
      - SSRS_REPORT_NAMES=${SSRS_REPORT_NAMES:-AtvIndividual,Cracha,CracháAula2,RelatorioDetalhado,RelatorioDetalhadoAula2}
      - REDMINE_URL=${REDMINE_URL:-}
      - REDMINE_API_KEY=${REDMINE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ENABLE_GITHUB_REDMINE_IMPORT=${ENABLE_GITHUB_REDMINE_IMPORT:-true}
    networks:
      - reqsys-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
    depends_on: [api]
    networks:
      - reqsys-net

  kb:
    build: ../../kb
    restart: unless-stopped
    expose: ["8080"]
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --root-path /kb
    environment:
      - KB_DB_PATH=/data/kb.db
    volumes:
      - kb-data:/data
    networks:
      - reqsys-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["${GATEWAY_PORT:-8081}:80"]
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, api, kb]
    networks:
      - reqsys-net

networks:
  reqsys-net:
    driver: bridge

volumes:
  kb-data:
