# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for ReqSys
# Objetivo: reduzir tempo de revisão em micro PRs sem perder cobertura em áreas críticas.

language: pt-BR
tone_instructions: "Responder em português do Brasil, com tom técnico, objetivo, governado e baseado em evidências. Priorizar achados que alterem risco, decisão de merge ou segurança."

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: |
    Produza resumo executivo curto, com foco em risco real, evidência e próxima ação.
    Marque como "Não verificado" qualquer item sem evidência de CI, testes ou segurança.
  poem: false
  review_status: true
  review_details: false
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  assess_linked_issues: true

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 3
    ignore_title_keywords:
      - "wip"
      - "draft:"
      - "docs:"

  path_filters:
    # Revisar primeiro o que muda execução, segurança, runtime e CI.
    - "src/**"
    - "app/**"
    - "backend/**"
    - "api/**"
    - "services/**"
    - "scripts/**"
    - ".github/workflows/**"
    - "tests/**"
    - "package.json"
    - "package-lock.json"
    - "pyproject.toml"
    - "requirements*.txt"
    - "Dockerfile"
    - "docker-compose*.yml"

    # Reduzir ruído e contexto de baixo valor para micro PRs.
    - "!docs/**"
    - "!artifacts/**"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!node_modules/**"
    - "!**/*.html"
    - "!**/*.svg"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.gif"
    - "!**/*.lock"

  path_instructions:
    - path: ".github/workflows/**"
      instructions: |
        Revisar com foco em segurança de GitHub Actions: permissões mínimas, secrets, shell injection, execução condicional, artifacts e rastreabilidade.
    - path: "scripts/**"
      instructions: |
        Revisar idempotência, logs, tratamento de erro, dry-run quando aplicável e ausência de vazamento de segredo/PII.

  pre_merge_checks:
    custom_checks:
      - mode: warning
        name: "CI verde obrigatório"
        instructions: "Alertar se houver check obrigatório ausente, pendente, cancelado ou reprovado."
      - mode: error
        name: "Gates ReqSys produção"
        instructions: "Falhar se produção permitir auth desligada, CORS '*', JWT sem issuer/audience, logs com PII/secrets ou auditoria sem correlation_id."

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
