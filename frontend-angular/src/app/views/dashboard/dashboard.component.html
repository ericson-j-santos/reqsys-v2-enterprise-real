<div class="dashboard">
  <app-institucional-status-banner
    *ngIf="loading()"
    type="loading"
    message="Carregando dados do dashboard..."
  ></app-institucional-status-banner>

  <app-institucional-status-banner
    *ngIf="!loading() && errorMessage()"
    type="warning"
    [message]="errorMessage()"
  ></app-institucional-status-banner>

  <div
    class="grid"
    [style.grid-template-columns]="'repeat(' + cols() + ', 1fr)'"
  >
    <mat-card
      class="metric-card"
      *ngFor="let m of metricas()"
      [routerLink]="m.rota"
      [class.clickable]="!!m.rota"
      role="button"
      tabindex="0"
      [attr.aria-label]="m.titulo + ': ' + m.valor"
    >
      <mat-card-content>
        <div class="metric-icon" [style.color]="m.cor">
          <mat-icon>{{ m.icone }}</mat-icon>
        </div>
        <div class="metric-body">
          <div class="metric-valor">{{ m.valor }}</div>
          <div class="metric-titulo">{{ m.titulo }}</div>
        </div>
        <mat-icon class="metric-nav" *ngIf="m.rota" aria-hidden="true">chevron_right</mat-icon>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="row-cards">
    <mat-card class="panel-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>account_tree</mat-icon> Pipeline CI/CD
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="pipeline-list">
          <div class="pipeline-item" *ngFor="let p of pipeline()">
            <span class="stage">{{ p.nome }}</span>
            <mat-chip [color]="p.cor" selected>{{ p.status }}</mat-chip>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <a mat-button color="primary" routerLink="/pipeline">Ver pipeline completo</a>
      </mat-card-actions>
    </mat-card>

    <mat-card class="panel-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>psychology</mat-icon> Qualidade IA
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="qa-list">
          <div class="qa-item" *ngFor="let q of qualidade()">
            <div class="qa-label">
              <span>{{ q.label }}</span>
              <span>{{ q.valor }}%</span>
            </div>
            <mat-progress-bar
              [color]="q.cor"
              mode="determinate"
              [value]="q.valor"
            ></mat-progress-bar>
          </div>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <a mat-button color="primary" routerLink="/qualidade-ia">Ver qualidade completa</a>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
