<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-logo">
        <mat-icon color="primary">inventory_2</mat-icon>
        <h1>ReqSys <span>Enterprise</span></h1>
      </div>
      <p class="login-subtitle">Sistema de Gestão de Requisitos</p>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            autocomplete="email"
          />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')"
            >E-mail obrigatório</mat-error
          >
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')"
            >E-mail inválido</mat-error
          >
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input
            matInput
            [type]="mostrarSenha() ? 'text' : 'password'"
            formControlName="senha"
            autocomplete="current-password"
          />
          <button
            mat-icon-button
            type="button"
            matSuffix
            (click)="mostrarSenha.set(!mostrarSenha())"
          >
            <mat-icon>{{
              mostrarSenha() ? "visibility_off" : "visibility"
            }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('senha')?.hasError('required')"
            >Senha obrigatória</mat-error
          >
        </mat-form-field>

        <div class="error-msg" *ngIf="erro()">
          <mat-icon>error_outline</mat-icon>
          {{ erro() }}
        </div>

        <button
          mat-flat-button
          color="primary"
          class="full-width submit-btn"
          type="submit"
          [disabled]="loading() || loginForm.invalid"
        >
          <mat-spinner
            *ngIf="loading()"
            diameter="20"
            class="spinner"
          ></mat-spinner>
          <span *ngIf="!loading()">Entrar</span>
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <p class="demo-label">Perfis demo:</p>
      <div class="demo-chips">
        <button
          mat-stroked-button
          *ngFor="let c of credenciais"
          (click)="preencherCredencial(c)"
          type="button"
          class="demo-chip"
        >
          {{ c.label }}
        </button>
      </div>
      <p class="demo-label">Senhas não são versionadas no frontend.</p>
    </mat-card-footer>
  </mat-card>
</div>
