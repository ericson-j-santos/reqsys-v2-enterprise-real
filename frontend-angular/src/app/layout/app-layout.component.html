<mat-sidenav-container class="sidenav-container" autosize>
  <!-- Sidebar -->
  <mat-sidenav
    #sidenav
    [mode]="isMobile ? 'over' : 'side'"
    [opened]="!isMobile"
    [fixedInViewport]="true"
    [class.rail]="railMode && !isMobile"
    class="app-sidenav"
  >
    <!-- Logo -->
    <div class="sidenav-header">
      <mat-icon class="logo-icon" color="primary">inventory_2</mat-icon>
      <span class="logo-text" *ngIf="!railMode || isMobile">ReqSys</span>
    </div>

    <mat-divider></mat-divider>

    <!-- Nav -->
    <mat-nav-list>
      <a
        mat-list-item
        *ngFor="let item of navItems"
        [routerLink]="item.rota"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: item.rota === '/' }"
        [matTooltip]="railMode && !isMobile ? item.label : ''"
        matTooltipPosition="right"
        (click)="isMobile && sidenav.close()"
      >
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle *ngIf="!railMode || isMobile">{{
          item.label
        }}</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-spacer"></div>
    <mat-divider></mat-divider>

    <!-- User info -->
    <div class="sidenav-footer" *ngIf="auth.usuario$ | async as usuario">
      <div class="avatar">{{ auth.iniciais() }}</div>
      <div class="user-info" *ngIf="!railMode || isMobile">
        <div class="user-name">{{ usuario.nome }}</div>
        <div class="user-role">{{ usuario.papel }}</div>
      </div>
      <button
        mat-icon-button
        (click)="sair()"
        matTooltip="Sair"
        matTooltipPosition="right"
        class="logout-btn"
      >
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <!-- Main -->
  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="toggleDrawer()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ paginaAtual }}</span>
      <span class="toolbar-spacer"></span>
      <span class="user-chip" *ngIf="auth.usuario$ | async as usuario">
        {{ usuario.nome }}
      </span>
    </mat-toolbar>

    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
