[tool.coverage.run]
source = ["app"]
branch = true
omit = [
  "app/__init__.py",
  "app/models/__init__.py",
  "app/db.py",
  "app/models/*.py",
  "app/schemas/*.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
precision = 2
exclude_also = [
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.*:",
  "raise NotImplementedError",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
asyncio_mode = "auto"

[tool.ruff.lint.per-file-ignores]
"app/core/runtime_analytics.py" = ["E303", "E305"]
