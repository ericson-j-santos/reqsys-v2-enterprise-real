app = "reqsys-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PUBLIC_ENVIRONMENT = "production"
  DATABASE_URL = "sqlite:////data/reqsys.db"
  CORS_ORIGINS = "https://reqsys-app.fly.dev,https://reqsys-app-dev.fly.dev,https://reqsys-app-stg.fly.dev,http://localhost:5173,http://localhost:8081"

[[mounts]]
  source = "reqsys_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
