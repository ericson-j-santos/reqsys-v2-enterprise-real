# ReqSys — Apache HTTP Server reverse proxy
# Template parametrizado pelo script infra/reverse-proxy/scripts/linux-apache-apply.sh

<VirtualHost *:${GATEWAY_PORT}>
    ServerName ${REQSYS_SERVER_NAME}

    ServerTokens Prod
    ServerSignature Off
    ProxyRequests Off
    ProxyPreserveHost On

    LimitRequestBody 4194304
    Timeout 60
    ProxyTimeout 60

    ErrorLog ${APACHE_LOG_DIR}/reqsys-error.log
    CustomLog ${APACHE_LOG_DIR}/reqsys-access.log combined

    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'"

    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
    RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}

    RewriteEngine On
    RewriteRule ^/favicon.ico$ - [R=204,L]

    ProxyPass        /api/ http://127.0.0.1:${BACKEND_PORT}/ retry=0 timeout=60
    ProxyPassReverse /api/ http://127.0.0.1:${BACKEND_PORT}/

    ProxyPass        /kb/ http://127.0.0.1:${KB_PORT}/ retry=0 timeout=60
    ProxyPassReverse /kb/ http://127.0.0.1:${KB_PORT}/
    RequestHeader set X-Forwarded-Prefix "/kb" early

    ProxyPass        / http://127.0.0.1:${FRONTEND_PORT}/ retry=0 timeout=60
    ProxyPassReverse / http://127.0.0.1:${FRONTEND_PORT}/
</VirtualHost>
