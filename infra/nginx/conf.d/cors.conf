# CORS governado por allowlist.
# Nunca usar Access-Control-Allow-Origin com wildcard em producao.

map $http_origin $cors_allowed_origin {
    default "";
    "https://reqsys-app.fly.dev" $http_origin;
    "https://ericson-j-santos.github.io" $http_origin;
}

add_header Access-Control-Allow-Origin $cors_allowed_origin always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-Correlation-ID" always;
add_header Vary "Origin" always;

if ($request_method = OPTIONS) {
    return 204;
}
