limit_req_zone $binary_remote_addr zone=global:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=10r/s;
limit_req_zone $binary_remote_addr zone=cofre:10m  rate=10r/s;
limit_req_status 429;

server {
  listen 80;

  add_header X-Frame-Options        "DENY"                            always;
  add_header X-Content-Type-Options "nosniff"                         always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  limit_req zone=global burst=100 nodelay;

  location /api/v1/auth/login {
    limit_req zone=login burst=20 nodelay;
    proxy_pass http://api:8000/v1/auth/login;
  }

  location /api/v1/cofre/ {
    limit_req zone=cofre burst=20 nodelay;
    proxy_pass http://api:8000/v1/cofre/;
  }

  location /api/ {
    proxy_pass http://api:8000/;
  }

  location /kb/ {
    proxy_pass http://kb:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Prefix /kb;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    return 204;
  }

  location / {
    proxy_pass http://frontend:5173/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }
}
