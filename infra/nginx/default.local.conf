# Proxy nginx para execução LOCAL sem Docker
# Backend  → 127.0.0.1:8000  (uvicorn)
# Frontend → 127.0.0.1:5173  (vite dev server)
# KB       → 127.0.0.1:8080  (uvicorn)
#
# Uso via executar-local.sh / executar-local.ps1 — não edite a porta aqui,
# o script gera uma config temporária com GATEWAY_PORT substituído.

server {
  listen 8081;
  server_name
    tieridev.duckdns.org
    tierin.duckdns.org
    tieriprod.duckdns.org
    localhost
    127.0.0.1;

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  proxy_read_timeout    60s;
  proxy_connect_timeout 10s;
  client_max_body_size  4m;

  # Autenticação e toda a API passam por aqui → backend
  location /api/ {
    proxy_pass http://127.0.0.1:8000/;
  }

  location /kb/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header X-Forwarded-Prefix /kb;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    return 204;
  }

  # Frontend Vite dev server (WebSocket HMR incluso)
  location / {
    proxy_pass http://127.0.0.1:5173/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
