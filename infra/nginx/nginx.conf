# ReqSys NGINX Secure Profile
# Baseline versionado para reverse proxy seguro em homologacao/producao.

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 15s;
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;
    client_max_body_size 10m;

    include /etc/nginx/conf.d/security-headers.conf;
    include /etc/nginx/conf.d/cors.conf;
    include /etc/nginx/conf.d/rate-limit.conf;
    include /etc/nginx/conf.d/upstreams.conf;

    log_format reqsys_json escape=json '{'
      '"timestamp":"$time_iso8601",'
      '"request_id":"$request_id",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/reqsys_access.log reqsys_json;
    error_log /var/log/nginx/reqsys_error.log warn;

    server {
        listen 80;
        server_name _;
        return 308 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name reqsys.example.com;

        include /etc/nginx/conf.d/tls.conf;

        add_header X-Request-ID $request_id always;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location ~* ^/(admin|internal|debug|actuator|metrics|swagger|openapi)(/|$) {
            deny all;
            return 403;
        }

        location /api/ {
            limit_req zone=reqsys_api burst=20 nodelay;
            limit_conn reqsys_conn 20;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Correlation-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_pass http://reqsys_backend;
        }

        location / {
            limit_req zone=reqsys_web burst=40 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_pass http://reqsys_frontend;
        }
    }
}
