# Rate limiting: max 20 req/s por IP global; 5 req/s na rota de login
limit_req_zone $binary_remote_addr zone=global:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/s;
limit_req_status 429;

server {
  listen 80;
  server_name
    tieridev.duckdns.org
    tierin.duckdns.org
    tieriprod.duckdns.org
    localhost
    127.0.0.1;

  # Redireciona HTTP -> HTTPS quando SSL estiver ativo
  # Descomente apos configurar certificado Let's Encrypt:
  # return 301 https://$host$request_uri;

  # Headers de seguranca HTTP
  add_header X-Frame-Options           "DENY"                              always;
  add_header X-Content-Type-Options    "nosniff"                           always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'"
    always;

  # Headers propagados para o backend
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Timeouts e buffer
  proxy_read_timeout    60s;
  proxy_connect_timeout 10s;
  client_max_body_size  4m;

  # Rate limit global
  limit_req zone=global burst=40 nodelay;

  location /api/v1/auth/login {
    limit_req zone=login burst=10 nodelay;
    proxy_pass http://api:8000/v1/auth/login;
  }

  location /api/ {
    proxy_pass http://api:8000/;
  }

  location /kb/ {
    proxy_pass http://kb:8080/;
    proxy_set_header X-Forwarded-Prefix /kb;
  }

  location = /favicon.ico {
    access_log off;
    log_not_found off;
    return 204;
  }

  location / {
    proxy_pass http://frontend:80/;
  }
}

