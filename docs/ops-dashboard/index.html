<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReqSys Ops Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --muted: #94a3b8;
      --text: #e5e7eb;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #38bdf8;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #111827, #1e293b);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .subtitle { color: var(--muted); margin: 0; }
    main { padding: 24px; max-width: 1280px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    .kpi-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .kpi-value { font-size: 30px; font-weight: 700; margin-top: 8px; }
    .status { display: inline-block; padding: 6px 10px; border-radius: 999px; font-weight: 700; font-size: 12px; }
    .passed { background: rgba(34,197,94,.16); color: var(--green); border: 1px solid rgba(34,197,94,.45); }
    .warning { background: rgba(245,158,11,.16); color: var(--yellow); border: 1px solid rgba(245,158,11,.45); }
    .failed, .critical { background: rgba(239,68,68,.16); color: var(--red); border: 1px solid rgba(239,68,68,.45); }
    .unknown { background: rgba(148,163,184,.16); color: var(--muted); border: 1px solid rgba(148,163,184,.45); }
    section { margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border-bottom: 1px solid var(--border); padding: 12px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; }
    a { color: var(--blue); text-decoration: none; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .link-btn { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: #0b1220; }
    .small { color: var(--muted); font-size: 13px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #020617; padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { main, header { padding: 16px; } .grid { grid-template-columns: 1fr; } table { font-size: 13px; } }
  </style>
</head>
<body>
  <header>
    <h1>ReqSys Ops Dashboard</h1>
    <p class="subtitle">Painel operacional estático para CI, evidências, PRs de risco e saúde da main.</p>
  </header>
  <main>
    <div class="grid">
      <div class="card"><div class="kpi-label">Status geral</div><div id="overall" class="kpi-value">Carregando</div></div>
      <div class="card"><div class="kpi-label">Health score</div><div id="score" class="kpi-value">-</div></div>
      <div class="card"><div class="kpi-label">Falhas críticas</div><div id="critical" class="kpi-value">-</div></div>
      <div class="card"><div class="kpi-label">Alertas</div><div id="warnings" class="kpi-value">-</div></div>
    </div>

    <section class="card">
      <h2>Links operacionais</h2>
      <div class="links" id="links"></div>
      <p class="small" id="generated"></p>
    </section>

    <section class="card">
      <h2>Checks</h2>
      <table>
        <thead><tr><th>Check</th><th>Status</th><th>Severidade</th><th>Recomendação</th><th>Evidência</th></tr></thead>
        <tbody id="checks"><tr><td colspan="5">Carregando...</td></tr></tbody>
      </table>
    </section>
  </main>

  <script>
    const statusClass = (value) => ['passed','warning','failed','critical','unknown'].includes(value) ? value : 'unknown';
    const formatDate = (epoch) => epoch ? new Date(epoch * 1000).toLocaleString('pt-BR') : 'Não informado';

    async function loadDashboard() {
      const response = await fetch('./data/health.json', { cache: 'no-store' });
      const data = await response.json();

      document.getElementById('overall').innerHTML = `<span class="status ${statusClass(data.overall_status)}">${data.overall_status}</span>`;
      document.getElementById('score').textContent = data.health_score ?? '-';
      document.getElementById('critical').textContent = data.critical_failure_count ?? '-';
      document.getElementById('warnings').textContent = data.warning_count ?? '-';
      document.getElementById('generated').textContent = `Gerado em: ${formatDate(data.generated_at_epoch)} | Repositório: ${data.repo}`;

      const links = document.getElementById('links');
      links.innerHTML = '';
      Object.entries(data.links || {}).forEach(([label, url]) => {
        if (!url) return;
        const a = document.createElement('a');
        a.href = url;
        a.className = 'link-btn';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = label;
        links.appendChild(a);
      });

      const tbody = document.getElementById('checks');
      tbody.innerHTML = '';
      const checks = data.checks || [];
      if (!checks.length) {
        tbody.innerHTML = '<tr><td colspan="5">Nenhum check disponível.</td></tr>';
        return;
      }
      checks.forEach((check) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${check.name || '-'}</td>
          <td><span class="status ${statusClass(check.status)}">${check.status || '-'}</span></td>
          <td><span class="status ${statusClass(check.severity)}">${check.severity || '-'}</span></td>
          <td>${check.recommendation || '-'}</td>
          <td><pre>${JSON.stringify(check.evidence || {}, null, 2)}</pre></td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadDashboard().catch((error) => {
      document.getElementById('overall').innerHTML = '<span class="status failed">erro</span>';
      document.getElementById('checks').innerHTML = `<tr><td colspan="5">Falha ao carregar data/health.json: ${error.message}</td></tr>`;
    });
  </script>
</body>
</html>
