# Espelha bootstrap do ReqSys no repo externo (pull model)
# Roda no reqsys-ollama-local-gateway com GITHUB_TOKEN — sem PAT extra no ReqSys
name: Sync from ReqSys

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Espelhar bootstrap ReqSys
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Baixar bootstrap do ReqSys main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO_SRC="ericson-j-santos/reqsys-v2-enterprise-real"
          DEST="bootstrap-sync"
          rm -rf "${DEST}" && mkdir -p "${DEST}"
          gh api "repos/${REPO_SRC}/git/trees/main?recursive=1" \
            --jq '.tree[] | select(.path | startswith("docs/ollama-local-gateway/bootstrap-files/")) | select(.type=="blob") | .path' \
            > /tmp/paths.txt
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            rel="${path#docs/ollama-local-gateway/bootstrap-files/}"
            [ -z "$rel" ] && continue
            mkdir -p "$(dirname "${DEST}/${rel}")"
            gh api "repos/${REPO_SRC}/contents/${path}" --jq '.content' | tr -d '\n' | base64 -d > "${DEST}/${rel}"
          done < /tmp/paths.txt
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name "${DEST}" -exec rm -rf {} +
          cp -a "${DEST}/." .
          rm -rf "${DEST}"
      - name: Validar e commitar
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pytest -q
          ruff check .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteracao."
            exit 0
          fi
          git commit -m "chore: sync bootstrap from ReqSys main"
          git push
