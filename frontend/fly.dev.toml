app = "reqsys-app-dev"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.prod"

  [build.args]
    VITE_API_URL = "https://reqsys-api-dev.fly.dev"
    VITE_PUBLIC_URL = "https://reqsys-app-dev.fly.dev"
    VITE_PUBLIC_DUCKDNS_URL = "https://tieridev.duckdns.org"
    VITE_MSAL_REDIRECT_URI = "https://reqsys-app-dev.fly.dev/auth/callback.html"
    VITE_MSAL_POST_LOGOUT_REDIRECT_URI = "https://reqsys-app-dev.fly.dev/login"
    VITE_MSAL_LOGIN_REDIRECT_START_PAGE = "https://reqsys-app-dev.fly.dev/login"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
