app = "reqsys-app-stg"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.prod"

  [build.args]
    VITE_API_URL = "https://reqsys-api-stg.fly.dev"
    VITE_PUBLIC_URL = "https://reqsys-app-stg.fly.dev"
    VITE_PUBLIC_DUCKDNS_URL = "https://tierin.duckdns.org"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
