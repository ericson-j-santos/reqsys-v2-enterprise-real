services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${BACKEND_PORT:-8212}:8000"
    environment:
      # Banco isolado (reqsys_test) no mesmo Postgres da base, para nao misturar
      # dados de teste com o volume de dev (ADR-042/ADR-043).
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-reqsys_app}:${POSTGRES_PASSWORD:-reqsys_local_dev}@db:5432/reqsys_test
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:${GATEWAY_PORT:-8084},http://reqsys-test.localtest.me:${GATEWAY_PORT:-8084}}

  db:
    environment:
      - POSTGRES_DB=reqsys_test
    volumes:
      - reqsys-test-db-data:/var/lib/postgresql/data

  frontend:
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - reqsys-test-frontend-node-modules:/app/node_modules

  nginx:
    ports:
      - "${GATEWAY_PORT:-8084}:80"
    volumes:
      - ./infra/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  reqsys-test-db-data:
  reqsys-test-frontend-node-modules:
