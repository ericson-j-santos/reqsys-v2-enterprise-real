name: CI — Auto-Remediação e Diagnóstico

on:
  workflow_run:
    workflows: ["CI — ReqSys v2 Enterprise"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "ID do workflow run a analisar (opcional)"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  diagnostico-ci:
    name: Diagnóstico e Remediação CI
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Coletar contexto do CI
        id: contexto
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            RUN_ID="${{ github.event.workflow_run.id }}"
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            RUN_ID="${{ inputs.run_id }}"
            CONCLUSION="manual"
            HEAD_SHA="${{ github.sha }}"
            HEAD_BRANCH="${{ github.ref_name }}"
          fi

          echo "run_id=$RUN_ID"           >> "$GITHUB_OUTPUT"
          echo "conclusion=$CONCLUSION"   >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA"       >> "$GITHUB_OUTPUT"
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências de diagnóstico
        run: python -m pip install --upgrade pip ruff bandit pip-audit

      - name: Diagnóstico Backend — ruff (linting rápido)
        id: ruff
        continue-on-error: true
        working-directory: backend
        run: |
          ruff check app/ --select E,F,W,I --ignore E501 --output-format json \
            --output-file /tmp/ruff-remediation.json || true
          ruff check app/ --select E,F,W,I --ignore E501 2>&1 | tee /tmp/ruff-remediation.txt || true
          ISSUES=$(python -c "import json,sys; d=json.load(open('/tmp/ruff-remediation.json')); print(len(d))" 2>/dev/null || echo 0)
          echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"

      - name: Diagnóstico Backend — bandit (segurança)
        id: bandit
        continue-on-error: true
        working-directory: backend
        run: |
          bandit -r app/ -ll -x app/tests -f json -o /tmp/bandit-remediation.json 2>/dev/null || true
          ISSUES=$(python -c "import json,sys; d=json.load(open('/tmp/bandit-remediation.json')); print(len(d.get('results',[]))) " 2>/dev/null || echo 0)
          echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"

      - name: Diagnóstico Frontend — verificar build
        id: frontend
        continue-on-error: true
        working-directory: frontend
        run: |
          if ! npm ci --prefer-offline 2>&1 | tee /tmp/npm-ci.txt; then
            echo "npm_ci_failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_ci_failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verificar mojibake (anti-regressão encoding)
        id: mojibake
        continue-on-error: true
        working-directory: backend
        run: |
          if grep -rn --include="*.py" -E "Ã§|Ã£|Ã©|Ã¡|Ãº" app/api/ app/services/ 2>/dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verificar import default incorreto no frontend
        id: import_check
        continue-on-error: true
        working-directory: frontend/src
        run: |
          if grep -rn "import api from" . 2>/dev/null; then
            echo "default_import_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "default_import_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gerar relatório de remediação
        shell: bash
        run: |
          RUFF_ISSUES="${{ steps.ruff.outputs.issues }}"
          BANDIT_ISSUES="${{ steps.bandit.outputs.issues }}"
          NPM_FAILED="${{ steps.frontend.outputs.npm_ci_failed }}"
          MOJIBAKE="${{ steps.mojibake.outputs.found }}"
          IMPORT_BUG="${{ steps.import_check.outputs.default_import_found }}"
          RUN_ID="${{ steps.contexto.outputs.run_id }}"
          BRANCH="${{ steps.contexto.outputs.head_branch }}"
          SHA="${{ steps.contexto.outputs.head_sha }}"

          {
            echo "## CI Auto-Remediação — ReqSys v2 Enterprise"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Branch | \`${BRANCH}\` |"
            echo "| SHA | \`${SHA:0:8}\` |"
            echo "| Run ID | ${RUN_ID} |"
            echo ""
            echo "### Diagnóstico"
            echo ""
            echo "| Check | Status | Ação Recomendada |"
            echo "|---|---|---|"

            if [[ "$RUFF_ISSUES" -gt 0 ]]; then
              echo "| Linting (ruff) | ❌ ${RUFF_ISSUES} issues | \`cd backend && ruff check app/ --select E,F,W,I --ignore E501 --fix\` |"
            else
              echo "| Linting (ruff) | ✅ OK | — |"
            fi

            if [[ "$BANDIT_ISSUES" -gt 0 ]]; then
              echo "| Segurança (bandit) | ❌ ${BANDIT_ISSUES} achados | Revisar \`/tmp/bandit-remediation.json\` no log |"
            else
              echo "| Segurança (bandit) | ✅ OK | — |"
            fi

            if [[ "$NPM_FAILED" == "true" ]]; then
              echo "| Frontend deps (npm ci) | ❌ Falhou | Verificar \`frontend/package-lock.json\` ou limpar cache |"
            else
              echo "| Frontend deps (npm ci) | ✅ OK | — |"
            fi

            if [[ "$MOJIBAKE" == "true" ]]; then
              echo "| Encoding (mojibake) | ❌ Detectado | Converter arquivo para UTF-8 sem BOM |"
            else
              echo "| Encoding (mojibake) | ✅ OK | — |"
            fi

            if [[ "$IMPORT_BUG" == "true" ]]; then
              echo "| Frontend import default | ❌ Detectado | Usar \`import { api } from '../services/api'\` |"
            else
              echo "| Frontend import default | ✅ OK | — |"
            fi

            echo ""
            echo "### Remediações rápidas"
            echo ""
            echo "\`\`\`bash"
            echo "# Backend: corrigir linting"
            echo "cd backend && source .venv/bin/activate"
            echo "ruff check app/ --select E,F,W,I --ignore E501 --fix"
            echo ""
            echo "# Backend: rodar testes"
            echo "python -m pytest tests/ -v --tb=short --cov=app --cov-fail-under=60"
            echo ""
            echo "# Frontend: reinstalar dependências"
            echo "cd frontend && rm -rf node_modules && npm ci"
            echo ""
            echo "# Frontend: build de validação"
            echo "VITE_API_URL=/api npm run build"
            echo "\`\`\`"
            echo ""
            echo "### Links úteis"
            echo ""
            if [[ -n "$RUN_ID" ]]; then
              echo "- [Ver run falhada](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})"
            fi
            echo "- [Workflows ativos](https://github.com/${{ github.repository }}/actions)"
            echo "- [AGENTS.md — guia operacional](${{ github.server_url }}/${{ github.repository }}/blob/main/AGENTS.md)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar artefatos de diagnóstico
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-remediation-diagnostics
          path: |
            /tmp/ruff-remediation.json
            /tmp/ruff-remediation.txt
            /tmp/bandit-remediation.json
            /tmp/npm-ci.txt
          if-no-files-found: ignore
          retention-days: 7
