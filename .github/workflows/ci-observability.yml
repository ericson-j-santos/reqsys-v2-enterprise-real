name: CI Observability

# workflow_run removido — schedule + dispatch evitam cascata pós-merge/PR.

on:
  workflow_dispatch:
  schedule:
    - cron: "15 14 * * 1-5"

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-observability
  cancel-in-progress: false

jobs:
  ci-observability:
    name: Dashboard CI Duration & Flaky Signals
    runs-on: ubuntu-latest
    steps:
      - name: Gerar painel operacional em Markdown
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-observability
          RUN_NAME="${{ github.event.workflow_run.name || 'scheduled-scan' }}"
          RUN_CONCLUSION="${{ github.event.workflow_run.conclusion || 'success' }}"
          RUN_STATUS="${{ github.event.workflow_run.status || 'completed' }}"
          RUN_URL="${{ github.event.workflow_run.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}"
          AVG_TIME="3-8 min"
          NEXT_STEP="Validar jobs aplicáveis e liberar revisão quando todos estiverem success/skipped."

          case "$RUN_NAME" in
            "CI — ReqSys v2 Enterprise") AVG_TIME="3-8 min" ;;
            "CI Security Deep Scan") AVG_TIME="8-15 min" ;;
            "CI E2E Governado") AVG_TIME="8-18 min" ;;
            "PR Governed CI Validation") AVG_TIME="1-3 min" ;;
            "scheduled-scan") AVG_TIME="3-8 min" ;;
          esac

          cat > ci-observability/summary.md <<EOF
          # CI Observability — ReqSys
          
          ## Execução analisada
          
          | Campo | Valor |
          |---|---|
          | Workflow | $RUN_NAME |
          | Status | $RUN_STATUS |
          | Conclusão | $RUN_CONCLUSION |
          | Tempo médio estimado | $AVG_TIME |
          | Próximo passo | $NEXT_STEP |
          | URL | $RUN_URL |
          
          ## Referência de tempo por camada
          
          | Camada | Tempo médio alvo |
          |---|---:|
          | PR Governed CI Validation | 1-3 min |
          | CI principal | 3-8 min |
          | Security Deep Scan | 8-15 min |
          | E2E Governado | 8-18 min |
          | Full CI | 15-30 min |
          EOF

          cat ci-observability/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar painel CI Observability
        uses: actions/upload-artifact@v4
        with:
          name: ci-observability-dashboard
          path: ci-observability/
          if-no-files-found: error
          retention-days: 30
