name: Test Quality Gate — Padrão Ouro

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "scripts/validate_test_quality_gate.py"
      - "config/test-quality-gate.json"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "scripts/validate_test_quality_gate.py"
      - "config/test-quality-gate.json"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: test-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-inventory:
    name: Inventário e requisitos mínimos de testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências mínimas do gate
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest==9.0.3"

      - name: Avaliar maturidade da suíte
        run: python scripts/validate_test_quality_gate.py --json

      - name: Executar testes do validador
        run: python -m pytest -q tests/test_validate_test_quality_gate.py

      - name: Publicar evidência auditável
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-quality-gate-report
          path: artifacts/test-quality-gate/report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Resumo executivo
        if: always()
        shell: bash
        run: |
          if [[ -f artifacts/test-quality-gate/report.json ]]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/test-quality-gate/report.json").read_text(encoding="utf-8"))
          print("## Test Quality Gate — Padrão Ouro")
          print()
          print(f"**Status:** `{report['status'].upper()}`")
          print(f"**Cobertura mínima backend:** `{report['minimum_backend_coverage_percent']}%`")
          print()
          print("| Capacidade | Obrigatória | Status | Evidências |")
          print("|---|---:|---:|---:|")
          for name, item in sorted(report["capabilities"].items()):
              print(f"| {name} | {'sim' if item['required'] else 'não'} | {item['status']} | {item['evidence_count']} |")
          print()
          print("Capacidades avançadas pendentes não bloqueiam este incremento; permanecem explicitamente rastreadas.")
          PY
          else
            echo "## Test Quality Gate — Padrão Ouro" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "Relatório não gerado. Consulte os passos anteriores para identificar falha de preparação ou validação." >> "$GITHUB_STEP_SUMMARY"
          fi
