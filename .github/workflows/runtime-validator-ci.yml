name: Runtime Validator CI

on:
  pull_request:
    paths:
      - 'backend/app/runtime/**'
      - 'backend/app/api/runtime_validator.py'
      - 'backend/tests/test_runtime_validator.py'
      - 'frontend/src/views/RuntimeValidatorView.vue'
      - 'frontend/src/services/runtimeValidator.js'
      - 'docs/adr/ADR-0007-runtime-validator-auto-remediation.md'
      - 'docs/runbooks/runtime-validator-auto-remediation.md'
      - '.github/workflows/runtime-validator-ci.yml'
  workflow_dispatch:

jobs:
  backend-runtime-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run runtime validator tests
        working-directory: backend
        run: python -m pytest ../backend/tests/test_runtime_validator.py -v --tb=short

  frontend-runtime-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
