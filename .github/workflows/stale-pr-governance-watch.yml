name: Stale PR Governance Watch

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Executar sem aplicar labels/fechamentos'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: stale-pr-governance-watch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale-governance-dry-run:
    name: PR stale governance dry-run
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Analyze stale pull requests without changes
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 50
          debug-only: 'true'
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 7
          days-before-pr-close: 14
          stale-pr-label: stale-governance
          close-pr-label: stale-governance-close
          exempt-pr-labels: governed-merge-approved,security-critical,do-not-stale
          remove-pr-stale-when-updated: true
          delete-branch: false
          stale-pr-message: |
            PR marcado como stale por inatividade operacional.

            Critérios observados:
            - sem atualização recente;
            - sem progresso de mergeability;
            - sem evidência nova de CI.

            Próximo passo recomendado:
            - rebase sobre main;
            - validar CI;
            - fechar se o escopo já estiver absorvido.
          close-pr-message: |
            PR fechado automaticamente por governança operacional após janela de stale sem evolução.

  stale-governance-apply:
    name: PR stale governance apply
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Mark stale pull requests
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          operations-per-run: 50
          debug-only: 'false'
          days-before-issue-stale: -1
          days-before-issue-close: -1
          days-before-pr-stale: 7
          days-before-pr-close: 14
          stale-pr-label: stale-governance
          close-pr-label: stale-governance-close
          exempt-pr-labels: governed-merge-approved,security-critical,do-not-stale
          remove-pr-stale-when-updated: true
          delete-branch: false
          stale-pr-message: |
            PR marcado como stale por inatividade operacional.

            Critérios observados:
            - sem atualização recente;
            - sem progresso de mergeability;
            - sem evidência nova de CI.

            Próximo passo recomendado:
            - rebase sobre main;
            - validar CI;
            - fechar se o escopo já estiver absorvido.
          close-pr-message: |
            PR fechado automaticamente por governança operacional após janela de stale sem evolução.
