name: PR Scope Labeler

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-scope-labeler-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  label-scope:
    name: Classificar escopo do PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request != null && github.actor != 'dependabot[bot]'
    continue-on-error: true

    steps:
      - name: Classificar por arquivos alterados
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            if (!pr || !pr.number) {
              core.warning('PR Scope Labeler ignorado: payload sem pull_request valido.');
              return;
            }

            const issue_number = pr.number;

            const headRepo = pr.head.repo?.full_name ?? null;
            const baseRepo = pr.base.repo?.full_name ?? null;
            const isFork = headRepo === null || headRepo !== baseRepo;

            let files = [];
            let source = 'github-api';
            let apiWarning = null;

            try {
              files = await github.paginate(
                github.rest.pulls.listFiles,
                { owner, repo, pull_number: issue_number, per_page: 100 }
              );
            } catch (error) {
              source = 'payload-fallback';
              apiWarning = `${error.status ?? 'unknown'} ${error.message ?? error}`;
              core.warning(`Nao foi possivel consultar arquivos do PR via API. Fallback acionado: ${apiWarning}`);
            }

            const paths = files.map(file => file.filename).filter(Boolean);
            const changedFiles = paths.length || Number(pr.changed_files ?? 0);
            const changedLinesFromApi = files.reduce(
              (total, file) => total + Number(file.additions ?? 0) + Number(file.deletions ?? 0),
              0
            );
            const changedLines = changedLinesFromApi || Number(pr.additions ?? 0) + Number(pr.deletions ?? 0);
            const hasPathEvidence = paths.length > 0;

            const isDocs = path =>
              path.startsWith('docs/') ||
              path.endsWith('.md') ||
              path.startsWith('README') ||
              path.startsWith('CHANGELOG');

            const isWorkflow = path => path.startsWith('.github/workflows/');
            const isSecurityCritical = path =>
              path.includes('auth') ||
              path.includes('security') ||
              path.includes('secrets') ||
              path.includes('deploy') ||
              path.includes('production') ||
              path.startsWith('.github/workflows/') ||
              path.startsWith('infra/') ||
              path.startsWith('k8s/') ||
              path.startsWith('terraform/');

            const labelsCalculated = new Set();
            const onlyDocs = hasPathEvidence && paths.every(isDocs);
            const onlyWorkflow = hasPathEvidence && paths.every(isWorkflow);
            const hasSecurityCritical = hasPathEvidence && paths.some(isSecurityCritical);
            const isSmallPr = changedFiles <= 10 && changedLines <= 400;

            if (onlyDocs) labelsCalculated.add('docs-only');
            if (onlyWorkflow) labelsCalculated.add('workflow-only');
            if (hasPathEvidence && isSmallPr && !hasSecurityCritical) labelsCalculated.add('fast-path');
            if (hasSecurityCritical) labelsCalculated.add('security-critical');
            if (!isSmallPr || hasSecurityCritical || !hasPathEvidence) labelsCalculated.add('deep-review');

            core.notice(`PR ${issue_number} (${isFork ? 'fork' : 'same-repo'}) classificado sem mutacao de labels.`);
            core.notice(`Origem dos dados: ${source}`);
            core.notice(`Labels calculadas: ${[...labelsCalculated].join(', ') || 'nenhuma'}`);
            core.notice('PR Scope Labeler opera em modo read-only e fail-safe para evitar 403 Resource not accessible by integration.');

            await core.summary
              .addHeading('PR Scope Labeler')
              .addTable([
                [{ data: 'Metrica', header: true }, { data: 'Valor', header: true }],
                ['Arquivos alterados', String(changedFiles)],
                ['Linhas alteradas', String(changedLines)],
                ['Docs only', String(onlyDocs)],
                ['Workflow only', String(onlyWorkflow)],
                ['Security critical', String(hasSecurityCritical)],
                ['Small PR', String(isSmallPr)],
                ['Fork', String(isFork)],
                ['Evidencia de paths', String(hasPathEvidence)],
                ['Origem dos dados', source],
                ['Aviso API', apiWarning ?? 'nenhum'],
                ['Labels calculadas', [...labelsCalculated].join(', ') || 'nenhuma'],
                ['Modo', 'read-only; fail-safe; sem mutacao de labels']
              ])
              .write();
