name: PR Scope Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-scope:
    name: Classificar escopo do PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Classificar por arquivos alterados
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const headRepo = context.payload.pull_request.head.repo.full_name;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            const isFork = headRepo !== baseRepo;

            const managedLabels = {
              'docs-only': { color: '0366d6', description: 'Mudança exclusivamente documental.' },
              'workflow-only': { color: '5319e7', description: 'Mudança exclusivamente em GitHub Actions/workflows.' },
              'fast-path': { color: '0e8a16', description: 'PR pequeno e objetivo elegível para ciclo rápido.' },
              'deep-review': { color: 'fbca04', description: 'Exige revisão profunda/CodeRabbit/full review por risco ou escopo.' },
              'security-critical': { color: 'd73a4a', description: 'Altera segurança, auth, secrets, deploy, produção ou superfície crítica.' }
            };

            async function ensureLabel(name, metadata) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                try {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color: metadata.color,
                    description: metadata.description
                  });
                } catch (createError) {
                  core.warning(`Não foi possível criar label ${name}: ${createError.message}`);
                }
              }
            }

            for (const [label, metadata] of Object.entries(managedLabels)) {
              await ensureLabel(label, metadata);
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: issue_number, per_page: 100 }
            );

            const paths = files.map(file => file.filename);
            const changedFiles = paths.length;
            const changedLines = files.reduce((total, file) => total + file.additions + file.deletions, 0);

            const isDocs = path =>
              path.startsWith('docs/') ||
              path.endsWith('.md') ||
              path.startsWith('README') ||
              path.startsWith('CHANGELOG');

            const isWorkflow = path => path.startsWith('.github/workflows/');
            const isSecurityCritical = path =>
              path.includes('auth') ||
              path.includes('security') ||
              path.includes('secrets') ||
              path.includes('deploy') ||
              path.includes('production') ||
              path.startsWith('.github/workflows/') ||
              path.startsWith('infra/') ||
              path.startsWith('k8s/') ||
              path.startsWith('terraform/');

            const labelsToAdd = new Set();
            const labelsToRemove = new Set(Object.keys(managedLabels));

            const onlyDocs = paths.length > 0 && paths.every(isDocs);
            const onlyWorkflow = paths.length > 0 && paths.every(isWorkflow);
            const hasSecurityCritical = paths.some(isSecurityCritical);
            const isSmallPr = changedFiles <= 10 && changedLines <= 400;

            if (onlyDocs) labelsToAdd.add('docs-only');
            if (onlyWorkflow) labelsToAdd.add('workflow-only');
            if (isSmallPr && !hasSecurityCritical) labelsToAdd.add('fast-path');
            if (hasSecurityCritical) labelsToAdd.add('security-critical');
            if (!isSmallPr || hasSecurityCritical) labelsToAdd.add('deep-review');

            for (const label of labelsToAdd) {
              labelsToRemove.delete(label);
            }

            if (isFork) {
              core.warning(`PR de fork detectado (${headRepo}). Pulando mutação de labels por segurança.`);
            } else {
              let currentNames = new Set();
              try {
                const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
                currentNames = new Set(current.data.map(label => label.name));
              } catch (error) {
                core.warning(`Não foi possível listar labels atuais: ${error.message}`);
              }

              const removableExisting = [...labelsToRemove].filter(label => currentNames.has(label));
              for (const label of removableExisting) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
                } catch (error) {
                  core.warning(`Não foi possível remover label ${label}: ${error.message}`);
                }
              }

              if (labelsToAdd.size > 0) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number,
                    labels: [...labelsToAdd]
                  });
                } catch (error) {
                  core.warning(`Não foi possível adicionar labels: ${error.message}`);
                }
              }
            }

            core.summary
              .addHeading('PR Scope Labeler')
              .addTable([
                [{ data: 'Métrica', header: true }, { data: 'Valor', header: true }],
                ['Arquivos alterados', String(changedFiles)],
                ['Linhas alteradas', String(changedLines)],
                ['Docs only', String(onlyDocs)],
                ['Workflow only', String(onlyWorkflow)],
                ['Security critical', String(hasSecurityCritical)],
                ['Small PR', String(isSmallPr)],
                ['Fork', String(isFork)],
                ['Labels calculadas', [...labelsToAdd].join(', ') || 'nenhuma']
              ])
              .write();
