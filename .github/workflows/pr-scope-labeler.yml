name: PR Scope Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  label-scope:
    name: Classificar escopo do PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Classificar por arquivos alterados
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const headRepo = context.payload.pull_request.head.repo.full_name;
            const baseRepo = context.payload.pull_request.base.repo.full_name;
            const isFork = headRepo !== baseRepo;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: issue_number, per_page: 100 }
            );

            const paths = files.map(file => file.filename);
            const changedFiles = paths.length;
            const changedLines = files.reduce((total, file) => total + file.additions + file.deletions, 0);

            const isDocs = path =>
              path.startsWith('docs/') ||
              path.endsWith('.md') ||
              path.startsWith('README') ||
              path.startsWith('CHANGELOG');

            const isWorkflow = path => path.startsWith('.github/workflows/');
            const isSecurityCritical = path =>
              path.includes('auth') ||
              path.includes('security') ||
              path.includes('secrets') ||
              path.includes('deploy') ||
              path.includes('production') ||
              path.startsWith('.github/workflows/') ||
              path.startsWith('infra/') ||
              path.startsWith('k8s/') ||
              path.startsWith('terraform/');

            const labelsCalculated = new Set();
            const onlyDocs = paths.length > 0 && paths.every(isDocs);
            const onlyWorkflow = paths.length > 0 && paths.every(isWorkflow);
            const hasSecurityCritical = paths.some(isSecurityCritical);
            const isSmallPr = changedFiles <= 10 && changedLines <= 400;

            if (onlyDocs) labelsCalculated.add('docs-only');
            if (onlyWorkflow) labelsCalculated.add('workflow-only');
            if (isSmallPr && !hasSecurityCritical) labelsCalculated.add('fast-path');
            if (hasSecurityCritical) labelsCalculated.add('security-critical');
            if (!isSmallPr || hasSecurityCritical) labelsCalculated.add('deep-review');

            core.notice(`PR ${issue_number} (${isFork ? 'fork' : 'same-repo'}) classificado sem mutação de labels.`);
            core.notice(`Labels calculadas: ${[...labelsCalculated].join(', ') || 'nenhuma'}`);
            core.notice('PR Scope Labeler opera em modo read-only para evitar 403 Resource not accessible by integration.');

            core.summary
              .addHeading('PR Scope Labeler')
              .addTable([
                [{ data: 'Métrica', header: true }, { data: 'Valor', header: true }],
                ['Arquivos alterados', String(changedFiles)],
                ['Linhas alteradas', String(changedLines)],
                ['Docs only', String(onlyDocs)],
                ['Workflow only', String(onlyWorkflow)],
                ['Security critical', String(hasSecurityCritical)],
                ['Small PR', String(isSmallPr)],
                ['Fork', String(isFork)],
                ['Labels calculadas', [...labelsCalculated].join(', ') || 'nenhuma'],
                ['Modo', 'read-only; sem mutação de labels']
              ])
              .write();
