name: CI E2E Governado

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-e2e-governado.yml"

permissions:
  contents: read

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-router:
    name: E2E Router
    runs-on: ubuntu-latest
    outputs:
      run_e2e: ${{ steps.route.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Definir política de execução E2E
        id: route
        shell: bash
        run: |
          set -euo pipefail
          run_e2e=false
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            run_e2e=true
          fi
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'e2e') }}" == "true" || "${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}" == "true" ]]; then
            run_e2e=true
          fi
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git fetch --no-tags --depth=200 origin || true
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/e2e-changed-files.txt || true
            if grep -Eq '^(frontend/tests/e2e/|frontend/playwright\.config\.|frontend/src/router/|frontend/src/views/Login|frontend/src/views/.*Auth|frontend/src/services/auth|frontend/src/stores/.*auth)' /tmp/e2e-changed-files.txt; then
              run_e2e=true
            fi
          fi
          echo "run_e2e=$run_e2e" >> "$GITHUB_OUTPUT"
          echo "Run E2E: $run_e2e" >> "$GITHUB_STEP_SUMMARY"

  frontend-e2e-responsive:
    name: Frontend Responsive E2E (Playwright)
    runs-on: ubuntu-latest
    needs: e2e-router
    if: needs.e2e-router.outputs.run_e2e == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Instalar dependências
        run: npm ci
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Subir Vite
        env:
          GATEWAY_PORT: "5173"
          VITE_API_URL: /api
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > /tmp/reqsys-vite.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              echo "Vite disponível"
              exit 0
            fi
            sleep 2
          done
          cat /tmp/reqsys-vite.log || true
          exit 1
      - name: Executar E2E responsivo
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
        run: npx playwright test tests/e2e/responsividade.spec.js
      - name: Publicar evidências E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-evidence
          path: |
            frontend/test-results/
            frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 30
