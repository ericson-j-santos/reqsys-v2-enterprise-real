name: Governance Quality Gates

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  governance-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate governance structure
        run: |
          test -f docs/ai-governance/00_PRIORITY_RULES.md
          test -f docs/ai-governance/INDEX.md
          test -f docs/ai-governance/06-DEVOPS/QUALITY_GATES.md
          test -f docs/ai-governance/09-CHECKLISTS/PR_CHECKLIST.md

      - name: Validate governance content
        run: |
          grep -q "P0" docs/ai-governance/00_PRIORITY_RULES.md
          grep -q "CI" docs/ai-governance/06-DEVOPS/QUALITY_GATES.md
          grep -q "LGPD" docs/ai-governance/02-SEGURANCA/SECURITY_BASELINE.md
