name: Executive Final Sync History Public Smoke Trend Public

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo"
        required: true
        type: choice
        options: [dev, stg, prod]
      base_url:
        description: "URL pública base do Ops Dashboard"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: executive-final-sync-history-public-smoke-trend-public-${{ github.event.deployment.environment || inputs.environment }}
  cancel-in-progress: true

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'deployment_status' &&
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.environment != 'github-pages'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      TARGET_ENVIRONMENT: ${{ github.event.deployment.environment || inputs.environment }}
      TARGET_URL: ${{ github.event.deployment_status.environment_url || inputs.base_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate implementation
        run: |
          set -euo pipefail
          python -m py_compile scripts/smoke_executive_final_sync_history_public_smoke_trend.py
          python -m unittest tests/test_smoke_executive_final_sync_history_public_smoke_trend.py

      - name: Resolve governed target
        run: |
          set -euo pipefail
          test -n "$TARGET_ENVIRONMENT"
          test -n "$TARGET_URL"
          case "$TARGET_ENVIRONMENT" in
            dev|development|stg|staging|prod|production) ;;
            *) echo "Ambiente não governado: $TARGET_ENVIRONMENT" >&2; exit 1 ;;
          esac

      - name: Smoke synchronized public trend
        run: |
          set -euo pipefail
          python scripts/smoke_executive_final_sync_history_public_smoke_trend.py \
            --base-url "$TARGET_URL" \
            --environment "$TARGET_ENVIRONMENT" \
            --output "artifacts/executive-final-sync-history-public-smoke-trend/${TARGET_ENVIRONMENT}.json"

      - name: Publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executive-final-sync-history-public-smoke-trend-${{ env.TARGET_ENVIRONMENT }}
          path: artifacts/executive-final-sync-history-public-smoke-trend
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        if: always()
        run: |
          {
            echo "# Executive Final Sync History Public Smoke Trend"
            echo ""
            echo "- Ambiente: ${TARGET_ENVIRONMENT}"
            echo "- URL: ${TARGET_URL}"
            echo "- Sincronização: Estado Único + contrato + Ops Dashboard"
            echo "- Modo: report-only"
            echo "- Bloqueio automático: proibido"
            echo "- Aprovação humana: obrigatória"
          } >> "$GITHUB_STEP_SUMMARY"
