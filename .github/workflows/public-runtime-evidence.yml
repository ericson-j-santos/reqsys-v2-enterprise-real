name: Public Runtime Evidence Gate

on:
  workflow_dispatch:
    inputs:
      public_url:
        description: "URL pública da API ReqSys"
        required: true
        default: "https://reqsys-api.fly.dev"
      strict:
        description: "Falhar o workflow se algum endpoint público falhar"
        required: true
        type: boolean
        default: true
      publish_comment:
        description: "Publicar resumo como comentário em issue/PR"
        required: true
        type: boolean
        default: false
      issue_number:
        description: "Número da issue/PR para receber o comentário quando publish_comment=true"
        required: false
        default: ""
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  issues: write

defaults:
  run:
    shell: bash

jobs:
  public-runtime-evidence:
    name: Public runtime evidence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve inputs
        id: inputs
        env:
          INPUT_PUBLIC_URL: ${{ inputs.public_url }}
          INPUT_STRICT: ${{ inputs.strict }}
          INPUT_PUBLISH_COMMENT: ${{ inputs.publish_comment }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          public_url="${INPUT_PUBLIC_URL:-https://reqsys-api.fly.dev}"
          # Scheduled runs collect evidence without blocking on Fly deploy lag / transient outages.
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            strict="${INPUT_STRICT:-false}"
          else
            strict="${INPUT_STRICT:-true}"
          fi
          publish_comment="${INPUT_PUBLISH_COMMENT:-false}"
          issue_number="${INPUT_ISSUE_NUMBER:-}"
          mkdir -p artifacts/runtime
          echo "public_url=${public_url}" >> "$GITHUB_OUTPUT"
          echo "strict=${strict}" >> "$GITHUB_OUTPUT"
          echo "publish_comment=${publish_comment}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"

      - name: Validate public runtime endpoints
        id: smoke
        continue-on-error: true
        run: |
          python scripts/validate_public_runtime.py \
            --base-url "${{ steps.inputs.outputs.public_url }}" \
            --environment prod \
            --include-optional-evidence \
            --output artifacts/runtime/public-runtime-validation.json \
            --readiness-output artifacts/runtime/ops-readiness-report.json

      - name: Build executive summary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          
          evidence_path = Path("artifacts/runtime/public-runtime-validation.json")
          summary_path = Path("artifacts/runtime/public-runtime-summary.md")
          if not evidence_path.exists():
              payload = {
                  "base_url": "${{ steps.inputs.outputs.public_url }}",
                  "success_percentual": 0,
                  "ok": 0,
                  "total": 0,
                  "failed": 0,
                  "readiness": {"operational_status": "unavailable", "readiness_percent": 0, "blocking_issues": ["artifact ausente"]},
                  "results": [],
              }
          else:
              payload = json.loads(evidence_path.read_text(encoding="utf-8"))
          readiness = payload.get("readiness", {})
          
          rows = []
          for result in payload.get("results", []):
              status = "OK" if result.get("ok") else "FAIL"
              rows.append(
                  f"| {result.get('endpoint')} | {status} | {result.get('status_code')} | {result.get('elapsed_ms')} | {result.get('error') or ''} |"
              )
          
          summary = [
              "# Public Runtime Evidence Gate",
              "",
              f"- Base URL: `{payload.get('base_url')}`",
              f"- Success: `{payload.get('success_percentual', 0)}%`",
              f"- OK: `{payload.get('ok', 0)}/{payload.get('total', 0)}`",
              f"- Failed: `{payload.get('failed', 0)}`",
              f"- Operational status: `{readiness.get('operational_status', 'unknown')}`",
              f"- Readiness: `{readiness.get('readiness_percent', 0)}%`",
              "",
              "| Endpoint | Status | HTTP | ms | Error |",
              "|---|---:|---:|---:|---|",
              *rows,
              "",
          ]
          summary_path.write_text("\n".join(summary), encoding="utf-8")
          print("\n".join(summary))
          PY

      - name: Persist public runtime evidence to audit
        if: always()
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          SHA: ${{ github.sha }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        run: |
          strict_passed=false
          if [ "${SMOKE_OUTCOME}" = "success" ]; then
            strict_passed=true
          fi
          python scripts/persist_public_runtime_evidence.py \
            --validation artifacts/runtime/public-runtime-validation.json \
            --readiness artifacts/runtime/ops-readiness-report.json \
            --output-dir audit/runtime \
            --repository "${REPOSITORY}" \
            --run-id "${RUN_ID}" \
            --event-name "${EVENT_NAME}" \
            --sha "${SHA}" \
            --strict-gate-passed "${strict_passed}"

      - name: Upload public runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-runtime-evidence
          path: |
            artifacts/runtime/
            audit/runtime/
          if-no-files-found: error

      - name: Publish evidence comment
        if: ${{ always() && github.event_name == 'workflow_dispatch' && steps.inputs.outputs.publish_comment == 'true' && steps.inputs.outputs.issue_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ steps.inputs.outputs.issue_number }}" \
            --body-file artifacts/runtime/public-runtime-summary.md

      - name: Enforce strict gate
        if: ${{ always() && steps.inputs.outputs.strict == 'true' && steps.smoke.outcome != 'success' }}
        run: |
          echo "Public runtime evidence gate failed in strict mode."
          exit 1
