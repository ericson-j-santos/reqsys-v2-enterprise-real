name: Ops Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "5 13 * * 1-5"

permissions:
  contents: read
  actions: read

concurrency:
  group: ops-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dashboard:
    name: Build ops dashboard artifact
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate dashboard generator
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/generate_ops_dashboard_data.py
          python -m py_compile scripts/build_runtime_executive_index.py
          python -m py_compile scripts/build_strategic_governance_index.py
          python -m py_compile scripts/enrich_runtime_executive_deeplinks.py
          python -m py_compile scripts/validate_runtime_executive_public_page.py
          python -m py_compile scripts/validate_runtime_executive_deeplink_state.py
          python -m py_compile scripts/smoke_runtime_executive_static_publication.py

      - name: Generate fallback dashboard data
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_ops_dashboard_data.py \
            --repo "${{ github.repository }}" \
            --watchdog-report artifacts/repository-health-watchdog/repository-health-report.json \
            --delivery-finalization-report artifacts/delivery-finalization/delivery-finalization-report.json \
            --public-runtime-validation audit/runtime/public-runtime-validation.json \
            --public-runtime-fallback artifacts/runtime/public-runtime-validation.json \
            --public-runtime-evidence-index audit/runtime/public-runtime-evidence-index.json \
            --output docs/ops-dashboard/data/health.json

      - name: Hydrate conflict risk report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/ops-dashboard/data
          if [ -f artifacts/pr-conflict-guard/conflict-risk-report.json ]; then
            cp artifacts/pr-conflict-guard/conflict-risk-report.json docs/ops-dashboard/data/conflict-risk-report.json
          elif [ -f artifacts/conflict-risk-report/conflict-risk-report.json ]; then
            cp artifacts/conflict-risk-report/conflict-risk-report.json docs/ops-dashboard/data/conflict-risk-report.json
          elif [ -f audit/conflict-risk-report.json ]; then
            cp audit/conflict-risk-report.json docs/ops-dashboard/data/conflict-risk-report.json
          else
            test -f docs/ops-dashboard/data/conflict-risk-report.json
          fi
          python -m json.tool docs/ops-dashboard/data/conflict-risk-report.json >/tmp/conflict-risk-report.validated.json

      - name: Generate runtime validation snapshot
        shell: bash
        run: |
          set -euo pipefail
          python scripts/runtime_validation_consolidator.py \
            --repo "${{ github.repository }}" \
            --branch main \
            --output-dir artifacts/runtime-validation-consolidator \
            --publish-executive-brief docs/ops-dashboard/data/executive-brief.json

      - name: Generate runtime executive index
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_runtime_executive_index.py \
            --repo "${{ github.repository }}" \
            --health docs/ops-dashboard/data/health.json \
            --merge-intelligence docs/ops-dashboard/data/merge-intelligence-index.json \
            --lane-priority docs/ops-dashboard/data/merge-lane-priority.json \
            --evidence-gate audit/pr-evidence-gate.json \
            --delivery-finalization artifacts/delivery-finalization/delivery-finalization-report.json \
            --conflict-risk-report docs/ops-dashboard/data/conflict-risk-report.json \
            --runtime-validation artifacts/runtime-validation-consolidator/runtime-validation-snapshot.json \
            --output docs/ops-dashboard/data/runtime-executive-index.json

      - name: Generate strategic governance index
        shell: bash
        run: |
          set -euo pipefail
          python scripts/build_strategic_governance_index.py \
            --repo "${{ github.repository }}" \
            --runtime-index docs/ops-dashboard/data/runtime-executive-index.json \
            --output docs/ops-dashboard/data/strategic-governance-index.json

      - name: Enrich Runtime Executive deep links
        shell: bash
        run: |
          set -euo pipefail
          python scripts/enrich_runtime_executive_deeplinks.py \
            --runtime-index docs/ops-dashboard/data/runtime-executive-index.json \
            --strategic-governance docs/ops-dashboard/data/strategic-governance-index.json \
            --executive-brief docs/ops-dashboard/data/executive-brief.json

      - name: Prepare dashboard artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ops-dashboard
          cp -R docs/ops-dashboard/* artifacts/ops-dashboard/
          test -f artifacts/ops-dashboard/index.html
          test -f artifacts/ops-dashboard/runtime-executive.html
          test -f artifacts/ops-dashboard/data/health.json
          test -f artifacts/ops-dashboard/data/runtime-executive-index.json
          test -f artifacts/ops-dashboard/data/strategic-governance-index.json
          test -f artifacts/ops-dashboard/data/conflict-risk-report.json
          test -f artifacts/ops-dashboard/data/executive-brief.json

      - name: Validate ops dashboard contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_ops_dashboard_navigation.py
          python3 scripts/validate_ops_dashboard_trilha_d_pareto_cards.py
          python3 scripts/validate_ops_dashboard_runtime_validation.py
          python3 scripts/validate_runtime_executive_public_page.py
          python3 scripts/validate_runtime_executive_deeplink_state.py

      - name: Smoke Runtime Executive static publication
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/smoke_runtime_executive_static_publication.py \
            --root artifacts/ops-dashboard \
            --output artifacts/runtime-executive-public-smoke/runtime-executive-public-smoke.json

      - name: Publish Runtime Executive smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-executive-public-smoke
          path: artifacts/runtime-executive-public-smoke
          if-no-files-found: error
          retention-days: 15

      - name: Publish ops dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-dashboard-static
          path: artifacts/ops-dashboard
          if-no-files-found: error
          retention-days: 15

      - name: Summarize dashboard
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Ops Dashboard"
            echo ""
            echo "Artifact publicado: ops-dashboard-static"
            echo "Smoke publicado: runtime-executive-public-smoke"
            echo ""
            echo "Runtime executive index publicado em data/runtime-executive-index.json."
            echo "Runtime executive page publicada em runtime-executive.html."
            echo "Runtime executive deep link oficial integrado aos contratos do Estado Unico."
            echo "Runtime executive static publication smoke validado."
            echo "Strategic governance index publicado em data/strategic-governance-index.json."
            echo "Conflict risk report publicado em data/conflict-risk-report.json."
            echo ""
            echo "Escopo: painel estatico, priorizacao report-only e governanca executiva."
          } >> "$GITHUB_STEP_SUMMARY"
