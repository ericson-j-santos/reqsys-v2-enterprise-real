name: ReqSys Next Increment Auto Evaluation

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'
  push:
    branches: [main]
    paths:
      - 'scripts/evaluate_reqsys_next_increment.py'
      - 'tests/test_evaluate_reqsys_next_increment.py'
      - '.github/workflows/reqsys-next-increment-auto-evaluation.yml'
      - 'docs/contracts/reqsys-next-increment-auto-evaluation.md'

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: reqsys-next-increment-auto-evaluation
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run focused tests
        run: python -m pytest -q tests/test_evaluate_reqsys_next_increment.py
      - name: Collect PRs, merged delivery velocity and workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp artifacts/reqsys-next-increment-auto-evaluation
          gh api --paginate --slurp "repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            --jq 'add | [.[] | {number, state, draft, mergeable: (.mergeable // null), auto_merge_enabled: (.auto_merge != null), created_at, updated_at, html_url}]' \
            > .tmp/prs.json
          gh api --paginate --slurp "repos/${{ github.repository }}/pulls?state=closed&sort=updated&direction=desc&per_page=100" \
            --jq 'add | [.[] | select(.merged_at != null) | {number, created_at, merged_at, updated_at, html_url}]' \
            > .tmp/merged-prs.json
          gh api --paginate --slurp "repos/${{ github.repository }}/actions/runs?per_page=100" \
            --jq 'add.workflow_runs | [.[] | {id, name, status, conclusion, event, head_branch, head_sha, created_at, updated_at, html_url}]' \
            > .tmp/runs.json
      - name: Collect public runtime and smoke evidence
        env:
          REQSYS_RUNTIME_BASE_URL: https://reqsys-api.fly.dev
        run: |
          python - <<'PY'
          import json, os, time, urllib.error, urllib.request
          base = os.environ['REQSYS_RUNTIME_BASE_URL'].rstrip('/')
          paths = ['/health', '/api/runtime/health', '/api/runtime/readiness', '/api/runtime/liveness']
          endpoints = []
          for path in paths:
              started = time.perf_counter()
              code = None
              error = None
              try:
                  with urllib.request.urlopen(base + path, timeout=15) as response:
                      code = response.status
                      response.read(4096)
              except urllib.error.HTTPError as exc:
                  code = exc.code
                  error = str(exc)
              except Exception as exc:
                  error = f'{type(exc).__name__}: {exc}'
              endpoints.append({
                  'name': path,
                  'url': base + path,
                  'http_code': code,
                  'ok': code == 200,
                  'latency_ms': round((time.perf_counter() - started) * 1000, 2),
                  'error': error,
              })
          with open('.tmp/runtime.json', 'w', encoding='utf-8') as handle:
              json.dump({'base_url': base, 'endpoints': endpoints}, handle, indent=2)
          PY
      - name: Download latest instrumented artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp/readiness .tmp/history
          READINESS_RUN="$(gh run list --workflow instrumented-executive-readiness.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          HISTORY_RUN="$(gh run list --workflow instrumented-executive-history.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          if [ -n "$READINESS_RUN" ]; then gh run download "$READINESS_RUN" -n instrumented-executive-readiness -D .tmp/readiness || true; fi
          if [ -n "$HISTORY_RUN" ]; then gh run download "$HISTORY_RUN" -n instrumented-executive-history -D .tmp/history || true; fi
          READINESS_FILE="$(find .tmp/readiness -name '*.json' -print -quit)"
          HISTORY_FILE="$(find .tmp/history -name '*.json' -print -quit)"
          [ -n "$READINESS_FILE" ] && cp "$READINESS_FILE" .tmp/readiness.json || echo '{}' > .tmp/readiness.json
          [ -n "$HISTORY_FILE" ] && cp "$HISTORY_FILE" .tmp/history.json || echo '{}' > .tmp/history.json
      - name: Evaluate next safe increment
        run: |
          python scripts/evaluate_reqsys_next_increment.py \
            --prs .tmp/prs.json \
            --merged-prs .tmp/merged-prs.json \
            --runs .tmp/runs.json \
            --readiness .tmp/readiness.json \
            --history .tmp/history.json \
            --runtime .tmp/runtime.json \
            --output-json artifacts/reqsys-next-increment-auto-evaluation/report.json \
            --output-md artifacts/reqsys-next-increment-auto-evaluation/report.md
      - name: Publish executive summary
        run: cat artifacts/reqsys-next-increment-auto-evaluation/report.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: reqsys-next-increment-auto-evaluation
          path: artifacts/reqsys-next-increment-auto-evaluation/
          retention-days: 90
