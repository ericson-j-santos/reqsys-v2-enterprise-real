name: Parallel Development Acceleration

on:
  pull_request:
    paths:
      - 'docs/runbooks/parallel-development-acceleration.md'
      - 'scripts/validate_parallel_development_acceleration.py'
      - '.github/workflows/parallel-development-acceleration.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-parallel-development-acceleration:
    name: Validate Parallel Development Acceleration
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate acceleration runbook
        run: python3 scripts/validate_parallel_development_acceleration.py
