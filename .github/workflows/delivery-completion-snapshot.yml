name: Delivery Completion Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '45 */6 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/delivery-completion-snapshot.yml'

concurrency:
  group: delivery-completion-snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  delivery-completion:
    name: Build delivery completion snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Build completion artifact
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          
          milestones = [
              {'name': 'observability_foundation', 'percent': 100, 'status': 'completed'},
              {'name': 'command_center_foundation', 'percent': 100, 'status': 'completed'},
              {'name': 'delivery_status', 'percent': 100, 'status': 'completed'},
              {'name': 'delivery_evidence', 'percent': 99, 'status': 'consolidated'},
              {'name': 'delivery_readiness', 'percent': 99.5, 'status': 'consolidated'},
          ]
          score = round(sum(item['percent'] for item in milestones) / len(milestones), 2)
          report = {
              'schema_version': '1.0.0',
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'completion_percent': score,
              'target_percent': 99.5,
              'remaining_gap_pp': round(99.5 - score, 2),
              'status': 'completed_with_observation' if score >= 99.5 else 'consolidating',
              'milestones': milestones,
              'mode': 'report_only',
          }
          Path('audit/delivery-completion').mkdir(parents=True, exist_ok=True)
          Path('audit/delivery-completion/delivery-completion-snapshot.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          lines = ['# Delivery Completion Snapshot', '', f"- Completion: {score}%", '- Target: 99.5%', f"- Remaining gap: {report['remaining_gap_pp']} p.p.", f"- Status: {report['status']}", '', '## Milestones']
          lines.extend([f"- {item['name']}: {item['percent']}% ({item['status']})" for item in milestones])
          Path('audit/delivery-completion/delivery-completion-snapshot.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Upload delivery completion artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delivery-completion-snapshot-${{ github.run_id }}
          path: audit/delivery-completion/
          if-no-files-found: error
          retention-days: 30
