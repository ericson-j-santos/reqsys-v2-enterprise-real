name: Observability Contract

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/observability-contract.yml"
      - "backend/app/core/telemetry_contract.py"
      - "backend/app/api/telemetry_analytics.py"
      - "backend/tests/test_telemetry_contract.py"
      - "scripts/validate_observability_contract.py"
      - "docs/observabilidade/**"
  push:
    branches:
      - main
      - ai/observability
    paths:
      - ".github/workflows/observability-contract.yml"
      - "backend/app/core/telemetry_contract.py"
      - "backend/app/api/telemetry_analytics.py"
      - "backend/tests/test_telemetry_contract.py"
      - "scripts/validate_observability_contract.py"
      - "docs/observabilidade/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-observability-contract:
    name: Validate OBS-P0.1 telemetry contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate contract gate
        run: python scripts/validate_observability_contract.py

      - name: Run contract tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          PYTHONPATH=backend python -m pytest backend/tests/test_telemetry_contract.py -q
