name: Atualizador Planilha CI

on:
  pull_request:
    paths:
      - 'tools/atualizador_planilha/**'
      - '.github/workflows/atualizador-planilha-ci.yml'
  push:
    branches: [main]
    paths:
      - 'tools/atualizador_planilha/**'
      - '.github/workflows/atualizador-planilha-ci.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Instalar dependência XLSX
        run: python -m pip install 'openpyxl>=3.1,<4'
      - name: Executar testes
        run: python -m unittest discover -s tools/atualizador_planilha/tests -v
      - name: Validar geração do pacote portátil
        run: |
          python tools/atualizador_planilha/atualizador_planilha.py --generate-package dist/atualizador_planilha_portatil.zip
          test -s dist/atualizador_planilha_portatil.zip
