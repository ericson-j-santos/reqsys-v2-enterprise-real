name: Product Intelligence Completion Statistical Projection

on:
  pull_request:
    paths:
      - "tools/product_intelligence/generate_completion_statistical_projection.py"
      - "tests/test_completion_statistical_projection.py"
      - "docs/product-intelligence/reqsys-completion-statistical-projection.md"
      - ".github/workflows/product-intelligence-completion-statistical-projection.yml"
  push:
    branches:
      - main
    paths:
      - "tools/product_intelligence/generate_completion_statistical_projection.py"
      - "tests/test_completion_statistical_projection.py"
      - "docs/product-intelligence/reqsys-completion-statistical-projection.md"
      - ".github/workflows/product-intelligence-completion-statistical-projection.yml"

jobs:
  completion-statistical-projection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate projection contract
        run: python -m unittest tests.test_completion_statistical_projection -v
      - name: Build completion statistical projection
        run: python tools/product_intelligence/generate_completion_statistical_projection.py reports/product-intelligence
      - name: Publish summary
        run: cat reports/product-intelligence/reqsys-completion-statistical-projection.md >> "$GITHUB_STEP_SUMMARY"
