name: Ollama Gateway Bootstrap

on:
  pull_request:
    paths:
      - 'docs/ollama-local-gateway/**'
      - 'scripts/sincronizar_ollama_gateway_repo.sh'
      - 'scripts/configurar_ollama_gateway_sync.sh'
      - 'backend/app/services/codex_governado.py'
      - 'backend/tests/test_codex_governado*.py'
      - '.github/workflows/ollama-gateway-bootstrap.yml'
  push:
    branches: [main]
    paths:
      - 'docs/ollama-local-gateway/**'
      - 'scripts/sincronizar_ollama_gateway_repo.sh'
      - 'scripts/configurar_ollama_gateway_sync.sh'
      - 'backend/app/services/codex_governado.py'
      - 'backend/tests/test_codex_governado*.py'
      - '.github/workflows/ollama-gateway-bootstrap.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch destino no repo externo (use main para espelho direto)'
        required: false
        default: 'main'
      force_sync:
        description: 'Forcar sync mesmo sem mudancas no bootstrap'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-bootstrap:
    name: Validar bootstrap gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar e testar bootstrap
        working-directory: docs/ollama-local-gateway/bootstrap-files
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pytest -q
          ruff check .
      - name: Testes Codex ollama_gateway
        working-directory: backend
        run: |
          python -m pip install -r requirements.txt
          python -m pytest tests/test_codex_governado.py tests/test_codex_governado_critical_paths.py -q --tb=short
      - name: Evidencia
        run: |
          echo "## Ollama Gateway Bootstrap" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bootstrap pytest: OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provider ollama_gateway: OK" >> "$GITHUB_STEP_SUMMARY"

  sync-external:
    name: Publicar repo externo
    needs: validate-bootstrap
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync para reqsys-ollama-local-gateway
        env:
          OLLAMA_GATEWAY_SYNC_TOKEN: ${{ secrets.OLLAMA_GATEWAY_SYNC_TOKEN }}
          GH_PAT_ACTIONS: ${{ secrets.GH_PAT_ACTIONS }}
        run: |
          set -euo pipefail
          if [ -n "${OLLAMA_GATEWAY_SYNC_TOKEN}" ]; then
            export GH_TOKEN="${OLLAMA_GATEWAY_SYNC_TOKEN}"
            echo "Token: OLLAMA_GATEWAY_SYNC_TOKEN"
          elif [ -n "${GH_PAT_ACTIONS}" ]; then
            export GH_TOKEN="${GH_PAT_ACTIONS}"
            echo "Token: GH_PAT_ACTIONS (fallback canonico)"
          else
            echo "## Sync externo ignorado" >> "$GITHUB_STEP_SUMMARY"
            echo "Configure GH_PAT_ACTIONS ou OLLAMA_GATEWAY_SYNC_TOKEN." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          type -p gh >/dev/null || (sudo apt-get update && sudo apt-get install -y gh)
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          export OLLAMA_GATEWAY_SYNC_BRANCH="${BRANCH}"
          bash scripts/sincronizar_ollama_gateway_repo.sh "${BRANCH}"
          echo "## Sync externo" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repo: ericson-j-santos/reqsys-ollama-local-gateway" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: ${BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Token: ${GH_TOKEN:+configurado}" >> "$GITHUB_STEP_SUMMARY"
