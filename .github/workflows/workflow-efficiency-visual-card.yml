name: Workflow Efficiency Visual Card

on:
  pull_request:
    paths:
      - "scripts/inject_workflow_efficiency_visual_card.py"
      - "scripts/validate_workflow_efficiency_visual_card.py"
      - "tests/test_workflow_efficiency_visual_card.py"
      - ".github/workflows/workflow-efficiency-visual-card.yml"
      - "docs/ops-dashboard/index.html"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Workflow Efficiency visual card
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile and test injector
        run: |
          set -euo pipefail
          python -m py_compile scripts/inject_workflow_efficiency_visual_card.py
          python -m py_compile scripts/validate_workflow_efficiency_visual_card.py
          python -m unittest tests/test_workflow_efficiency_visual_card.py

      - name: Inject visual card into dashboard build
        run: |
          set -euo pipefail
          python scripts/inject_workflow_efficiency_visual_card.py
          python scripts/validate_workflow_efficiency_visual_card.py

      - name: Assert static contract consumption
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          html = Path('docs/ops-dashboard/index.html').read_text(encoding='utf-8')
          assert 'payload?.cards?.workflow_efficiency' in html
          assert 'payload?.links?.workflow_efficiency' in html
          assert 'renderWorkflowEfficiency(payload);' in html
          assert html.count('id="workflow-efficiency-visual-card"') == 1
          PY

      - name: Publish patched dashboard evidence
        uses: actions/upload-artifact@v4
        with:
          name: workflow-efficiency-visual-card
          path: docs/ops-dashboard/index.html
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          {
            echo "# Workflow Efficiency Visual Card"
            echo ""
            echo "- Fonte única: runtime-executive-index.json"
            echo "- Cálculo duplicado no frontend: não"
            echo "- Chamadas externas: não"
            echo "- Modo: report-only"
          } >> "$GITHUB_STEP_SUMMARY"
