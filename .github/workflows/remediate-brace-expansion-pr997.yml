name: Remediate brace-expansion PR 997

on:
  pull_request:
    types: [reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remediate-brace-expansion-pr997
  cancel-in-progress: false

jobs:
  remediate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 997
    name: Update vulnerable npm transitive dependency
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: agent/prompt-coordinator-api
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Update lockfile safely
        working-directory: frontend
        run: |
          npm ci
          npm audit fix --package-lock-only
          npm ci

      - name: Validate security and production build
        working-directory: frontend
        run: |
          npm audit --audit-level=high
          npm run build

      - name: Commit remediation and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/remediate-brace-expansion-pr997.yml
          git add frontend/package-lock.json frontend/package.json
          git commit -m "fix(frontend): remediate brace-expansion vulnerability"
          git push origin HEAD:agent/prompt-coordinator-api
