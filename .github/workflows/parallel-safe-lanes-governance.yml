name: Parallel Safe Lanes Governance

on:
  pull_request:
    paths:
      - 'docs/ops-dashboard/data/parallel-safe-lanes-governance.json'
      - 'scripts/validate_parallel_safe_lanes_governance.py'
      - '.github/workflows/parallel-safe-lanes-governance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-parallel-safe-lanes-governance:
    name: Validate Parallel Safe Lanes Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate governance artifact
        run: python3 scripts/validate_parallel_safe_lanes_governance.py
