name: ReqSys Fly Runtime P0

on:
  pull_request:
    paths:
      - "fly.toml"
      - "Dockerfile.fly"
      - "scripts/fly_boot.sh"
      - "backend/**"
      - "scripts/validate_fly_runtime_config.py"
      - "scripts/validate_public_runtime.py"
      - "scripts/runtime_public_validator.py"
      - ".github/workflows/fly-runtime-p0.yml"
  workflow_dispatch:
    inputs:
      public_url:
        description: "URL pública da API ReqSys"
        required: true
        default: "https://reqsys-api.fly.dev"
      deploy:
        description: "Executar deploy no Fly após validação"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate-config:
    name: Validate Fly runtime config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Trilha A runtime público
        run: |
          python scripts/runtime_public_validator.py \
            --artifact-root . \
            --output artifacts/runtime/runtime-public-validation.json \
            --strict

      - name: Upload Trilha A validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-public-validation
          path: artifacts/runtime/runtime-public-validation.json
          if-no-files-found: warn

  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    needs: validate-config
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.toml

  public-smoke:
    name: Public runtime smoke
    runs-on: ubuntu-latest
    needs:
      - validate-config
      - deploy
    if: ${{ always() && github.event_name == 'workflow_dispatch' && (inputs.deploy == false || needs.deploy.result == 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate public runtime (Trilha A probe)
        run: |
          python scripts/runtime_public_validator.py \
            --probe \
            --base-url "${{ inputs.public_url }}" \
            --environment prod \
            --include-optional-evidence \
            --artifact-root . \
            --output artifacts/runtime/runtime-public-validation.json

      - name: Upload runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-runtime-validation
          path: |
            artifacts/runtime/runtime-public-validation.json
            artifacts/runtime/runtime-public-probe.json
            artifacts/runtime/runtime-public-readiness.json
