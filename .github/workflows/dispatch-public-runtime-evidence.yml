name: Dispatch Public Runtime Evidence

on:
  workflow_dispatch:
    inputs:
      public_url:
        description: "URL pública da API ReqSys"
        required: true
        default: "https://reqsys-api.fly.dev"
      strict:
        description: "Executar gate strict"
        required: true
        type: boolean
        default: true
      publish_comment:
        description: "Publicar comentário governado"
        required: true
        type: boolean
        default: false
      issue_number:
        description: "Issue/PR para receber comentário"
        required: false
        default: ""
      ref:
        description: "Ref alvo do workflow Public Runtime Evidence Gate"
        required: true
        default: "main"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  dispatch-public-runtime-evidence:
    name: Dispatch public runtime evidence
    runs-on: ubuntu-latest
    steps:
      - name: Validate governed token
        env:
          GH_PAT_ACTIONS: ${{ secrets.GH_PAT_ACTIONS }}
        run: |
          if [ -z "${GH_PAT_ACTIONS}" ]; then
            echo "Secret GH_PAT_ACTIONS não configurado."
            exit 1
          fi

      - name: Dispatch Public Runtime Evidence Gate
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPOSITORY: ${{ github.repository }}
          PUBLIC_URL: ${{ inputs.public_url }}
          STRICT: ${{ inputs.strict }}
          PUBLISH_COMMENT: ${{ inputs.publish_comment }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          TARGET_REF: ${{ inputs.ref }}
        run: |
          args=(
            -R "${REPOSITORY}"
            --ref "${TARGET_REF}"
            -f "public_url=${PUBLIC_URL}"
            -f "strict=${STRICT}"
            -f "publish_comment=${PUBLISH_COMMENT}"
            -f "issue_number=${ISSUE_NUMBER}"
          )

          gh workflow run public-runtime-evidence.yml "${args[@]}"

      - name: Show dispatched runs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_ACTIONS }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh run list \
            -R "${REPOSITORY}" \
            --workflow="public-runtime-evidence.yml" \
            -L 5
