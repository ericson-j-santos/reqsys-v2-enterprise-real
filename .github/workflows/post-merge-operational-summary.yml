name: Post Merge Operational Summary

on:
  push:
    branches:
      - main

jobs:
  operational-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build operational summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "# ReqSys Operational Summary" > operational-summary.md
          echo "" >> operational-summary.md
          echo "- Repository: ${REPOSITORY}" >> operational-summary.md
          echo "- Commit: ${SHA}" >> operational-summary.md
          echo "- Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> operational-summary.md
          echo "" >> operational-summary.md

          echo "## Workflow Status" >> operational-summary.md
          gh run list \
            --repo "$REPOSITORY" \
            --commit "$SHA" \
            --json name,status,conclusion,url \
            --limit 20 > runs.json

          python - <<'PY'
          import json
          from pathlib import Path
          
          runs = json.loads(Path('runs.json').read_text())
          
          summary = []
          summary.append('| Workflow | Status | Conclusion |')
          summary.append('|---|---|---|')
          
          failed = []
          
          for run in runs:
              name = run.get('name', '-')
              status = run.get('status', '-')
              conclusion = run.get('conclusion', '-')
          
              summary.append(f'| {name} | {status} | {conclusion} |')
          
              if conclusion in ('failure', 'cancelled', 'timed_out'):
                  failed.append(name)
          
          summary.append('')
          summary.append('## Incident Classification')
          
          if not failed:
              summary.append('- No critical workflow failures detected.')
          else:
              for item in failed:
                  summary.append(f'- Potential structural/flaky incident detected: {item}')
          
          Path('summary-table.md').write_text('\n'.join(summary), encoding='utf-8')
          PY

          cat summary-table.md >> operational-summary.md

      - name: Publish GitHub Step Summary
        run: |
          cat operational-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload operational summary
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-operational-summary
          path: operational-summary.md
          if-no-files-found: error
