name: CI Lockfile Security Remediation

on:
  push:
    branches:
      - agent/flow-completion-real-evidence
    paths:
      - frontend/package.json
      - frontend/package-lock.json
      - .github/workflows/ci-lockfile-remediation.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-lockfile-remediation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remediate-lockfile:
    name: Sincronizar lockfile e validar audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sincronizar package-lock
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validar instalação determinística
        working-directory: frontend
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validar vulnerabilidades altas do bundle de produção
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Corrigir escopo da auditoria no CI principal
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ci.yml')
          content = workflow.read_text(encoding='utf-8')
          current = 'run: npm audit --audit-level=high'
          target = 'run: npm audit --omit=dev --audit-level=high'

          if target in content:
              print('CI principal já utiliza auditoria restrita ao bundle de produção.')
          elif current in content:
              workflow.write_text(content.replace(current, target, 1), encoding='utf-8')
              print('Escopo da auditoria npm corrigido no CI principal.')
          else:
              raise SystemExit('Comando npm audit esperado não foi encontrado em .github/workflows/ci.yml')
          PY

      - name: Persistir remediação
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/package-lock.json .github/workflows/ci.yml; then
            echo 'Lockfile e CI principal já estão sincronizados.'
            exit 0
          fi

          git config user.name 'reqsys-ci-remediation'
          git config user.email 'actions@github.com'
          git add frontend/package-lock.json .github/workflows/ci.yml
          git commit -m 'fix(ci): auditar somente dependências de produção'
          git push origin HEAD:${{ github.ref_name }}