name: CI Lockfile Security Remediation

on:
  push:
    branches:
      - agent/flow-completion-real-evidence
    paths:
      - frontend/package.json
      - frontend/package-lock.json
      - .github/workflows/ci-lockfile-remediation.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-lockfile-remediation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remediate-lockfile:
    name: Sincronizar lockfile e validar audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout da branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sincronizar package-lock
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Validar instalação determinística
        working-directory: frontend
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validar vulnerabilidades altas do bundle de produção
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Persistir lockfile corrigido
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/package-lock.json; then
            echo 'package-lock.json já está sincronizado.'
            exit 0
          fi

          git config user.name 'reqsys-ci-remediation'
          git config user.email 'actions@github.com'
          git add frontend/package-lock.json
          git commit -m 'fix(frontend): sincronizar lockfile de segurança'
          git push origin HEAD:${{ github.ref_name }}
