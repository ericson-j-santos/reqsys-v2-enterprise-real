name: Figma Design System Gate

on:
  pull_request:
    paths:
      - 'frontend/src/theme/**'
      - 'frontend/scripts/validate-design-tokens.mjs'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/figma-design-system-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/src/theme/**'
      - 'frontend/scripts/validate-design-tokens.mjs'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/figma-design-system-gate.yml'
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: figma-design-system-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-design-system:
    name: Validate Figma tokens and runtime mapping
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate canonical design tokens
        run: npm run validate:design-tokens

      - name: Validate token-to-Vuetify contract
        run: npm run test:unit -- src/theme/__tests__/figmaPadraoOuro.spec.js

      - name: Build frontend
        run: npm run build
