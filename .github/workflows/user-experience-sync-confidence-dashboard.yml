name: User Experience Sync Confidence Dashboard

on:
  pull_request:
    paths:
      - 'scripts/inject_user_experience_sync_confidence_card.py'
      - 'scripts/smoke_user_experience_sync_confidence_card.py'
      - 'tests/test_user_experience_sync_confidence_dashboard.py'
      - '.github/workflows/user-experience-sync-confidence-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile
        run: |
          python -m py_compile scripts/inject_user_experience_sync_confidence_card.py
          python -m py_compile scripts/smoke_user_experience_sync_confidence_card.py
      - name: Tests
        run: python -m unittest tests/test_user_experience_sync_confidence_dashboard.py
      - name: Build audit artifact
        run: |
          mkdir -p artifacts
          cat > artifacts/user-experience-sync-confidence-dashboard.json <<'JSON'
          {
            "mode": "report-only",
            "production_blocker": false,
            "human_approval_required": true,
            "deploy_changed": false,
            "readiness_changed": false
          }
          JSON
      - uses: actions/upload-artifact@v4
        with:
          name: user-experience-sync-confidence-dashboard
          path: artifacts/user-experience-sync-confidence-dashboard.json
          retention-days: 90
