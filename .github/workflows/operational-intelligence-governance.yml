name: Operational Intelligence Governance

on:
  pull_request:
    paths:
      - 'backend/app/**'
      - 'backend/sql/**'
      - 'docs/adr/**'
      - 'docs/monitoramento-operacional/**'
      - 'docs/runbooks/**'
      - 'backend/tests/**'
      - 'tests/backend/**'

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required operational intelligence files
        run: |
          test -f docs/adr/ADR-022-operational-intelligence-platform.md
          test -f docs/monitoramento-operacional/operational-intelligence-platform.md
          test -f docs/runbooks/RUNBOOK-operational-intelligence-platform.md
          test -f backend/sql/002_operational_intelligence_platform.sql
          test -f backend/app/api/operational_intelligence.py

      - name: Validate mandatory governance terms
        run: |
          grep -Ri "correlation_id" backend/app docs backend/sql
          grep -Ri "dead_letter" backend/sql backend/app
          grep -Ri "runtime intelligence" docs/adr docs/monitoramento-operacional
