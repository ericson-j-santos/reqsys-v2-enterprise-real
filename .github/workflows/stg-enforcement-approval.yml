name: STG Enforcement Approval

on:
  workflow_run:
    workflows: ["Environment Promotion History"]
    types: [completed]
  workflow_dispatch:
    inputs:
      decision:
        description: Break-glass governance decision
        required: true
        default: approve
        type: choice
        options: [approve, reject]
      rationale:
        description: Break-glass decision rationale
        required: false
        default: Temporary automated approval override during delivery acceleration
        type: string
      ticket:
        description: Governance ticket or change record
        required: false
        default: REQSYS-TEMP-AUTO-APPROVAL
        type: string
      history_run_id:
        description: Successful Environment Promotion History run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: stg-enforcement-approval-${{ github.event.workflow_run.id || inputs.history_run_id || github.run_id }}
  cancel-in-progress: false

jobs:
  approve:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run focused tests
        run: python -m pytest -q tests/test_build_stg_enforcement_approval.py
      - name: Resolve automated approval context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_RUN_ID: ${{ github.event.workflow_run.id }}
          EVENT_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_RUN_ID: ${{ inputs.history_run_id }}
          INPUT_DECISION: ${{ inputs.decision }}
          INPUT_RATIONALE: ${{ inputs.rationale }}
          INPUT_TICKET: ${{ inputs.ticket }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "history_run_id=$EVENT_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "decision=approve" >> "$GITHUB_OUTPUT"
            echo "rationale=Automated temporary approval based on successful immutable environment promotion history evidence" >> "$GITHUB_OUTPUT"
            echo "ticket=REQSYS-TEMP-AUTO-APPROVAL" >> "$GITHUB_OUTPUT"
            echo "source_sha=$EVENT_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "approval_mode=automatic-temporary" >> "$GITHUB_OUTPUT"
          else
            case "$INPUT_RUN_ID" in
              ''|*[!0-9]*) echo "::error::history_run_id must be numeric"; exit 1 ;;
            esac
            echo "history_run_id=$INPUT_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "decision=${INPUT_DECISION:-approve}" >> "$GITHUB_OUTPUT"
            echo "rationale=${INPUT_RATIONALE:-Temporary automated approval override during delivery acceleration}" >> "$GITHUB_OUTPUT"
            echo "ticket=${INPUT_TICKET:-REQSYS-TEMP-AUTO-APPROVAL}" >> "$GITHUB_OUTPUT"
            echo "source_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
            echo "approval_mode=break-glass-manual-dispatch" >> "$GITHUB_OUTPUT"
          fi
      - name: Download immutable maturity evidence
        env:
          GH_TOKEN: ${{ github.token }}
          HISTORY_RUN_ID: ${{ steps.context.outputs.history_run_id }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/history artifacts/stg-enforcement-approval
          gh run download "$HISTORY_RUN_ID" -n environment-promotion-history -D .tmp/history
          HISTORY_FILE="$(find .tmp/history -name history.json -print -quit)"
          test -n "$HISTORY_FILE"
          cp "$HISTORY_FILE" .tmp/history.json
      - name: Build approval record
        run: |
          python scripts/build_stg_enforcement_approval.py \
            --history .tmp/history.json \
            --decision "${{ steps.context.outputs.decision }}" \
            --approver "github-actions[bot]" \
            --rationale "${{ steps.context.outputs.rationale }}" \
            --ticket "${{ steps.context.outputs.ticket }}" \
            --source-run-id "${{ steps.context.outputs.history_run_id }}" \
            --source-sha "${{ steps.context.outputs.source_sha }}" \
            --output artifacts/stg-enforcement-approval/approval.json
      - name: Publish decision summary
        env:
          APPROVAL_MODE: ${{ steps.context.outputs.approval_mode }}
        run: |
          python - <<'PY'
          import json, os
          data = json.load(open('artifacts/stg-enforcement-approval/approval.json', encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as out:
              out.write('# STG Enforcement Approval\n\n')
              out.write(f"- Status: **{data['status']}**\n")
              out.write(f"- Effective approval: **{data['effective_approval']}**\n")
              out.write(f"- Approval mode: **{os.environ['APPROVAL_MODE']}**\n")
              out.write(f"- Correlation ID: `{data['correlation_id']}`\n")
              out.write(f"- Ticket: **{data['approval']['ticket']}**\n")
              out.write(f"- Evidence maturity: **{data['evidence']['maturity_status']}**\n")
              out.write(f"- Next action: **{data['next_action']}**\n")
              out.write('- Automatic policy change: **disabled**\n')
              out.write('- Automatic deploy: **disabled**\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: stg-enforcement-approval
          path: artifacts/stg-enforcement-approval/approval.json
          retention-days: 365
