name: Merge Guardrails

on:
  pull_request:
    types: [opened, edited, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-merge-guardrails:
    name: Validar Merge Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Validar estado e checklist do PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr?.body || '';
            const errors = [];

            if (!pr) {
              core.setFailed('Evento não contém pull_request.');
              return;
            }

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const hasChecklistItem = (item) => {
              const pattern = new RegExp(`^\\s*-\\s*\\[[ xX]\\]\\s+${escapeRegExp(item)}\\s*$`, 'm');
              return pattern.test(body);
            };

            const isChecklistItemChecked = (item) => {
              const pattern = new RegExp(`^\\s*-\\s*\\[[xX]\\]\\s+${escapeRegExp(item)}\\s*$`, 'm');
              return pattern.test(body);
            };

            if (!body.includes('## Merge Guardrails')) {
              errors.push('PR sem seção obrigatória: ## Merge Guardrails');
            }

            if (!body.includes('## Ambiente alvo')) {
              errors.push('PR sem seção obrigatória: ## Ambiente alvo');
            }

            if (!body.includes('## Plano de validação pós-merge')) {
              errors.push('PR sem seção obrigatória: ## Plano de validação pós-merge');
            }

            const requiredItems = [
              'PR mantido em draft durante implementação.',
              'CI executado e verde.',
              'Revisão concluída.',
              'Sem comentários bloqueantes pendentes.',
              'Ambiente alvo declarado.',
              'Plano de validação pós-merge documentado.',
              'Merge autorizado somente após confirmação final.'
            ];

            for (const item of requiredItems) {
              if (!hasChecklistItem(item)) {
                errors.push(`Checklist obrigatório ausente: ${item}`);
              }
            }

            const environmentChecked = /^\s*-\s*\[[xX]\]\s+(Desenvolvimento|Homologação|Produção|Documentação\/governança sem impacto runtime)\s*$/m.test(body);
            if (!environmentChecked) {
              errors.push('Nenhum ambiente alvo foi marcado no checklist.');
            }

            if (pr.draft === false && /^draft:/i.test(pr.title || '')) {
              errors.push('PR não está em draft, mas o título ainda começa com draft:.');
            }

            if (pr.draft === false) {
              for (const item of requiredItems) {
                if (!isChecklistItemChecked(item)) {
                  errors.push(`PR pronto para revisão exige checklist marcado: ${item}`);
                }
              }
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'));
              return;
            }

            core.info('Merge Guardrails validado com sucesso.');
