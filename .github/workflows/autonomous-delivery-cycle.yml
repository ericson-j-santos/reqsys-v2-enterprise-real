name: Autonomous Delivery Cycle

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Executar em modo simulação sem merge"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      required_label:
        description: "Label obrigatória para autorizar o ciclo autônomo"
        required: true
        default: "cycle:auto-merge-approved"
        type: string
      max_prs:
        description: "Quantidade máxima de PRs processados por ciclo"
        required: true
        default: "1"
        type: string
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read
  statuses: read

concurrency:
  group: autonomous-delivery-cycle-main
  cancel-in-progress: false

env:
  REQUIRED_WORKFLOWS: >-
    CI Enterprise Fast
    CI — ReqSys v2 Enterprise
    Governance Quality Gates
    Governança Padrão Ouro
    Branch Protection Audit
    PR Conflict Guard
    Governed Merge Queue
  DEFAULT_REQUIRED_LABEL: cycle:auto-merge-approved
  DEFAULT_MAX_PRS: "1"

jobs:
  delivery-cycle:
    name: Validar, mergear e monitorar ciclo governado
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar ciclo autônomo governado
        id: cycle
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || github.event.inputs.dry_run }}
          REQUIRED_LABEL: ${{ github.event_name == 'schedule' && env.DEFAULT_REQUIRED_LABEL || github.event.inputs.required_label }}
          MAX_PRS: ${{ github.event_name == 'schedule' && env.DEFAULT_MAX_PRS || github.event.inputs.max_prs }}
          REQUIRED_WORKFLOWS: ${{ env.REQUIRED_WORKFLOWS }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const dryRun = String(process.env.DRY_RUN || 'true') === 'true';
            const requiredLabel = process.env.REQUIRED_LABEL || process.env.DEFAULT_REQUIRED_LABEL || 'cycle:auto-merge-approved';
            const maxPrs = Math.max(1, Number(process.env.MAX_PRS || '1'));
            const requiredWorkflows = (process.env.REQUIRED_WORKFLOWS || '')
              .split('\n')
              .map((item) => item.trim())
              .filter(Boolean);

            const outputDir = 'artifacts/autonomous-delivery-cycle';
            fs.mkdirSync(outputDir, { recursive: true });

            const searchQuery = `repo:${owner}/${repo} is:pr is:open base:main label:"${requiredLabel}" -is:draft`;
            const search = await github.rest.search.issuesAndPullRequests({ q: searchQuery, per_page: maxPrs });
            const candidates = search.data.items.slice(0, maxPrs);
            const decisions = [];
            const nextIncrements = [];

            async function latestRunsByWorkflow(headSha) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                head_sha: headSha,
                event: 'pull_request',
                per_page: 100,
              });
              const latest = new Map();
              for (const run of runs) {
                const existing = latest.get(run.name);
                if (!existing || new Date(run.created_at) > new Date(existing.created_at)) {
                  latest.set(run.name, run);
                }
              }
              return latest;
            }

            function extractNextIncrements(text, prNumber, prUrl) {
              const body = text || '';
              const matches = [];
              const markerRegex = /(próximo incremento natural|proximo incremento natural|next increment|próximas ações|proximas acoes)[:\s\n-]*(?<value>[^#\n][\s\S]{0,600})/i;
              const match = body.match(markerRegex);
              if (match?.groups?.value) {
                const raw = match.groups.value
                  .split('\n')
                  .map((line) => line.replace(/^[-*\s]+/, '').trim())
                  .filter(Boolean)
                  .slice(0, 5);
                for (const item of raw) {
                  matches.push({ source_pr: prNumber, source_url: prUrl, title: item.slice(0, 180), status: 'queued_for_chat_execution' });
                }
              }
              return matches;
            }

            for (const candidate of candidates) {
              const prNumber = candidate.number;
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              const decision = {
                pr_number: prNumber,
                pr_url: pr.html_url,
                title: pr.title,
                head_sha: pr.head.sha,
                dry_run: dryRun,
                eligible: false,
                merged: false,
                blockers: [],
                required_workflows: [],
                post_merge: null,
              };

              if (pr.state !== 'open') decision.blockers.push(`PR não está aberto: ${pr.state}`);
              if (pr.draft) decision.blockers.push('PR em draft.');
              if (pr.mergeable === false) decision.blockers.push('PR não está mergeable.');

              const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              });
              const labelNames = labels.map((label) => label.name);
              if (!labelNames.includes(requiredLabel)) decision.blockers.push(`Label obrigatória ausente: ${requiredLabel}`);
              if (!labelNames.includes('merge-queue:eligible')) decision.blockers.push('Label de fila governada ausente: merge-queue:eligible');

              const runs = await latestRunsByWorkflow(pr.head.sha);
              for (const workflow of requiredWorkflows) {
                const run = runs.get(workflow);
                const status = run ? run.status : 'missing';
                const conclusion = run ? run.conclusion : 'missing';
                decision.required_workflows.push({ workflow, status, conclusion, url: run?.html_url || '' });
                if (!run) decision.blockers.push(`Workflow obrigatório ausente: ${workflow}`);
                else if (run.status !== 'completed') decision.blockers.push(`Workflow ainda não completou: ${workflow} (${run.status})`);
                else if (run.conclusion !== 'success') decision.blockers.push(`Workflow sem sucesso: ${workflow} (${run.conclusion})`);
              }

              decision.eligible = decision.blockers.length === 0;
              if (decision.eligible && !dryRun) {
                const merge = await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: prNumber,
                  merge_method: 'squash',
                  sha: pr.head.sha,
                  commit_title: `chore: autonomous governed merge PR #${prNumber}`,
                  commit_message: 'Merge executado pelo Autonomous Delivery Cycle após validação de CI verde, fila governada e label explícita.',
                });
                decision.merged = Boolean(merge.data.merged);
                decision.merge_sha = merge.data.sha;

                if (decision.merged && decision.merge_sha) {
                  await new Promise((resolve) => setTimeout(resolve, 30000));
                  const postRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                    owner,
                    repo,
                    head_sha: decision.merge_sha,
                    event: 'push',
                    per_page: 50,
                  });
                  const completed = postRuns.filter((run) => run.status === 'completed');
                  const failures = completed.filter((run) => run.conclusion !== 'success' && run.conclusion !== 'skipped');
                  decision.post_merge = {
                    observed_push_runs: postRuns.length,
                    completed_runs: completed.length,
                    failing_runs: failures.map((run) => ({ name: run.name, conclusion: run.conclusion, url: run.html_url })),
                    status: failures.length ? 'post_merge_attention_required' : 'post_merge_observed_green_or_pending',
                  };
                }
              }

              nextIncrements.push(...extractNextIncrements(pr.body, prNumber, pr.html_url));
              decisions.push(decision);
            }

            const payload = {
              schema_version: '1.0.0',
              generated_at: new Date().toISOString(),
              repo: `${owner}/${repo}`,
              mode: dryRun ? 'dry_run' : 'merge_enabled',
              required_label: requiredLabel,
              max_prs: maxPrs,
              candidate_count: candidates.length,
              merged_count: decisions.filter((item) => item.merged).length,
              eligible_count: decisions.filter((item) => item.eligible).length,
              decisions,
              next_increments: nextIncrements,
              guardrails: [
                'requires_explicit_cycle_label',
                'requires_merge_queue_eligible_label',
                'requires_all_required_workflows_green',
                'requires_expected_head_sha',
                'squash_merge_only',
                'post_merge_push_observation',
                'next_increment_capture_report_only',
              ],
            };
            const queuePayload = {
              schema_version: '1.0.0',
              generated_at: payload.generated_at,
              repo: payload.repo,
              queue: nextIncrements,
              status: nextIncrements.length ? 'queued' : 'empty',
              source: 'autonomous-delivery-cycle',
              usage: 'Fila report-only para o chat/agente capturar próximos incrementos após merges governados.',
              guardrails: [
                'report_only_queue',
                'no_automatic_code_generation_from_queue',
                'requires_human_or_agent_execution_context',
                'preserve_ci_green_before_next_increment',
              ],
            };

            fs.writeFileSync(path.join(outputDir, 'delivery-cycle-report.json'), JSON.stringify(payload, null, 2) + '\n');
            fs.mkdirSync('docs/ops-dashboard/data', { recursive: true });
            fs.writeFileSync('docs/ops-dashboard/data/autonomous-delivery-cycle-latest.json', JSON.stringify(payload, null, 2) + '\n');
            fs.writeFileSync('docs/ops-dashboard/data/autonomous-delivery-cycle-next-increments.json', JSON.stringify(queuePayload, null, 2) + '\n');

            const summary = [
              '# Autonomous Delivery Cycle',
              '',
              `Modo: \`${payload.mode}\``,
              `Label obrigatória: \`${requiredLabel}\``,
              `PRs candidatos: \`${payload.candidate_count}\``,
              `PRs elegíveis: \`${payload.eligible_count}\``,
              `PRs mergeados: \`${payload.merged_count}\``,
              '',
              '| PR | Elegível | Mergeado | Bloqueios |',
              '|---|---:|---:|---|',
              ...decisions.map((item) => `| [#${item.pr_number}](${item.pr_url}) | ${item.eligible} | ${item.merged} | ${item.blockers.length ? item.blockers.join('<br>') : 'nenhum'} |`),
              '',
              '## Próximos incrementos capturados',
              nextIncrements.length ? nextIncrements.map((item) => `- PR #${item.source_pr}: ${item.title}`).join('\n') : '- Nenhum incremento natural capturado nos PRs processados.',
            ];
            await core.summary.addRaw(summary.join('\n')).write();

            core.setOutput('merged_count', String(payload.merged_count));
            core.setOutput('eligible_count', String(payload.eligible_count));
            core.setOutput('report_path', path.join(outputDir, 'delivery-cycle-report.json'));

      - name: Publicar evidência do ciclo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-delivery-cycle-report
          path: |
            artifacts/autonomous-delivery-cycle/delivery-cycle-report.json
            docs/ops-dashboard/data/autonomous-delivery-cycle-latest.json
            docs/ops-dashboard/data/autonomous-delivery-cycle-next-increments.json
          if-no-files-found: error
          retention-days: 30
