name: PR Conflict Guard

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  conflict-guard:
    name: Detectar conflito antes do merge
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout head do PR
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar base do evento
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          case "${BASE_REF}" in
            ''|*[!A-Za-z0-9._/-]*)
              echo "ERRO: base ref invalida."
              exit 1
              ;;
          esac
          git fetch origin "${BASE_REF}"

      - name: Coletar arquivos alterados
        id: collect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/pr-conflict-guard
          git diff --name-only "origin/${BASE_REF}"...HEAD \
            | sort -u \
            | tee artifacts/pr-conflict-guard/changed-paths.txt
          if [[ ! -s artifacts/pr-conflict-guard/changed-paths.txt ]]; then
            echo "no_net_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_net_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resumo — PR sem alteracoes netas
        if: steps.collect.outputs.no_net_changes == 'true'
        run: |
          echo "## PR Conflict Guard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "PR sem alteracoes netas contra a base do evento." >> "$GITHUB_STEP_SUMMARY"

      - name: Detectar hotspots concorrentes em PRs abertos
        if: steps.collect.outputs.no_net_changes != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          current_pr = int(os.environ["PR_NUMBER"])
          base_ref = os.environ["BASE_REF"]
          out_dir = Path("artifacts/pr-conflict-guard")
          changed_paths = {
              path.strip()
              for path in (out_dir / "changed-paths.txt").read_text(encoding="utf-8").splitlines()
              if path.strip()
          }

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "reqsys-pr-conflict-guard",
          }

          def api_json(path: str, attempts: int = 3):
              last_error: Exception | None = None
              for attempt in range(1, attempts + 1):
                  request = urllib.request.Request(f"https://api.github.com{path}", headers=headers)
                  try:
                      with urllib.request.urlopen(request, timeout=20) as response:
                          return json.loads(response.read().decode("utf-8"))
                  except (urllib.error.HTTPError, urllib.error.URLError, TimeoutError) as error:
                      last_error = error
                      if attempt < attempts:
                          time.sleep(attempt * 2)
              raise RuntimeError(f"GitHub API indisponivel para {path}: {last_error}")

          def paginated(path: str) -> list[dict]:
              items: list[dict] = []
              page = 1
              while True:
                  separator = "&" if "?" in path else "?"
                  batch = api_json(f"{path}{separator}per_page=100&page={page}")
                  if not isinstance(batch, list):
                      raise RuntimeError(f"Resposta inesperada da API para {path}")
                  items.extend(batch)
                  if len(batch) < 100:
                      return items
                  page += 1

          query = urllib.parse.urlencode({"state": "open", "base": base_ref})
          pulls = paginated(f"/repos/{repo}/pulls?{query}")

          concurrent_paths: set[str] = set()
          overlapping_prs: list[dict] = []
          scan_errors: list[dict] = []

          for pr in pulls:
              number = int(pr["number"])
              if number == current_pr:
                  continue
              try:
                  files = paginated(f"/repos/{repo}/pulls/{number}/files")
              except RuntimeError as error:
                  scan_errors.append({"number": number, "error": str(error)})
                  print(f"::warning::PR #{number} nao foi varrido: {error}")
                  continue

              other_paths = {item["filename"] for item in files if item.get("filename")}
              overlap = sorted(changed_paths.intersection(other_paths))
              if overlap:
                  concurrent_paths.update(overlap)
                  overlapping_prs.append(
                      {
                          "number": number,
                          "title": pr.get("title", ""),
                          "url": pr.get("html_url", ""),
                          "overlapping_paths": overlap,
                      }
                  )

          (out_dir / "concurrent-hotspots.txt").write_text(
              "\n".join(sorted(concurrent_paths)) + ("\n" if concurrent_paths else ""),
              encoding="utf-8",
          )
          (out_dir / "open-pr-overlap.json").write_text(
              json.dumps(
                  {
                      "base_ref": base_ref,
                      "current_pr": current_pr,
                      "overlapping_prs": overlapping_prs,
                      "concurrent_hotspots": sorted(concurrent_paths),
                      "scan_errors": scan_errors,
                      "scan_complete": not scan_errors,
                  },
                  indent=2,
                  ensure_ascii=False,
              ) + "\n",
              encoding="utf-8",
          )
          print(
              f"hotspots_concorrentes={len(concurrent_paths)} "
              f"prs_sobrepostos={len(overlapping_prs)} "
              f"erros_varredura={len(scan_errors)}"
          )
          PY

      - name: Executar conflict prediction gate
        if: steps.collect.outputs.no_net_changes != 'true'
        id: prediction
        run: |
          set +e
          python scripts/conflict_prediction_gate.py \
            --paths-file artifacts/pr-conflict-guard/changed-paths.txt \
            --hotspots-file artifacts/pr-conflict-guard/concurrent-hotspots.txt \
            --output artifacts/pr-conflict-guard/conflict-risk-report.json \
            --json | tee artifacts/pr-conflict-guard/conflict-risk-report.pretty.json
          code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"

      - name: Publicar artifact de risco de conflito
        if: always() && steps.collect.outputs.no_net_changes != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: conflict-risk-report
          path: artifacts/pr-conflict-guard
          if-no-files-found: error
          retention-days: 14

      - name: Reportar conflito preditivo bloqueante
        if: steps.collect.outputs.no_net_changes != 'true' && steps.prediction.outputs.exit_code != '0'
        continue-on-error: true
        run: |
          echo "AVISO: conflict_prediction_gate reportou risco bloqueante preditivo."
          echo "A validacao Git de merge limpo permanece obrigatoria."

      - name: Validar merge limpo com a base do evento
        if: steps.collect.outputs.no_net_changes != 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git config user.name "reqsys-conflict-guard"
          git config user.email "actions@users.noreply.github.com"
          if git merge --no-commit --no-ff "origin/${BASE_REF}"; then
            echo "OK: PR sem conflitos contra origin/${BASE_REF}."
            git merge --abort || true
          else
            echo "ERRO: PR possui conflitos contra origin/${BASE_REF}."
            git status --short
            exit 1
          fi
