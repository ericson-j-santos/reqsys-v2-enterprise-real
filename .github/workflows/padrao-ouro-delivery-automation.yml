name: Padrão Ouro Delivery Automation

on:
  push:
    branches:
      - "cursor/**"
      - main
    paths:
      - ".github/workflows/padrao-ouro-delivery-automation.yml"
      - ".github/pr-metadata/**"
      - ".github/workflows/fly-runtime-p0.yml"
      - "backend/**"
      - "frontend/**"
      - "fly.toml"
      - "frontend/fly.toml"
      - "Dockerfile.fly"
      - "scripts/fly_boot.sh"
      - "scripts/auto_open_agent_pr.py"
      - "scripts/generate_operational_artifacts_baseline.py"
      - "scripts/post_workflow_evidence_snapshot.py"
      - "scripts/validate_public_runtime.py"
      - "scripts/validate_publication_sync.py"
      - "scripts/configurar_fly_auth_azure.py"
      - "scripts/validar_login_multi_ambiente.py"
      - "scripts/runtime_public_validator.py"
      - "config/external-sources-registry.json"
      - "docs/ops-dashboard/**"
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Ação forçada"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - open_pr_only
          - deploy_runtime_only

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: padrao-ouro-delivery-${{ github.ref }}
  cancel-in-progress: false

env:
  CORRELATION_ID: padrao-ouro-delivery-${{ github.run_id }}-${{ github.run_attempt }}
  PUBLIC_API_URL: https://reqsys-api.fly.dev
  PUBLIC_FRONTEND_URL: https://reqsys-app.fly.dev

jobs:
  auto-open-pr:
    name: Auto-open draft PR (cursor/*)
    if: >-
      (github.event_name == 'push' && startsWith(github.ref_name, 'cursor/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'open_pr_only')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Criar ou atualizar PR draft
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GITHUB_TOKEN}"
          if [ -n "${{ secrets.GH_PAT_ACTIONS }}" ]; then
            echo "::notice::GH_PAT_ACTIONS ignorado neste job; usando GITHUB_TOKEN com pull-requests: write."
          fi
          python scripts/auto_open_agent_pr.py

      - name: Publicar artifact de PR automático
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-pr-request
          path: artifacts/auto-pr-request/
          if-no-files-found: warn

      - name: Resumo
        run: |
          {
            echo "## Auto-open PR"
            echo "- Branch: `${{ github.ref_name }}`"
            echo "- Correlation ID: `$CORRELATION_ID`"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-runtime:
    name: Validate runtime público (Trilha A)
    if: >-
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy_runtime_only' || github.event.inputs.action == 'auto'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar configuração Fly/runtime
        run: |
          python scripts/runtime_public_validator.py \
            --artifact-root . \
            --output artifacts/runtime/runtime-public-validation.json \
            --strict

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: padrao-ouro-runtime-validation
          path: artifacts/runtime/runtime-public-validation.json
          if-no-files-found: warn

  configure-prod-secrets:
    name: Configurar secrets auth produção
    runs-on: ubuntu-latest
    needs: validate-runtime
    if: >-
      needs.validate-runtime.result == 'success' &&
      ((github.event_name == 'push' && github.ref_name == 'main') ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy_runtime_only' || github.event.inputs.action == 'auto')))
    environment: production
    timeout-minutes: 10
    outputs:
      configured: ${{ steps.apply.outputs.configured || 'false' }}
    steps:
      - name: Preflight de secrets externos
        id: preflight
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          COFRE_API_URL: ${{ secrets.COFRE_API_URL }}
          VAULT_API_TOKEN: ${{ secrets.VAULT_API_TOKEN }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          configured=true
          reason="ready"

          if [ -z "${FLY_API_TOKEN}" ]; then
            configured=false
            reason="missing_fly_api_token"
          elif { [ -z "${AZURE_TENANT_ID_SECRET}" ] || [ -z "${AZURE_CLIENT_ID_SECRET}" ]; } && { [ -z "${COFRE_API_URL}" ] || [ -z "${VAULT_API_TOKEN}" ]; }; then
            configured=false
            reason="missing_azure_or_vault_source"
          fi

          echo "configured=${configured}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"

          {
            echo "## Secrets auth produção"
            echo "- Preflight: ${configured}"
            echo "- Reason: ${reason}"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v4
        if: steps.preflight.outputs.configured == 'true'
      - uses: actions/setup-python@v5
        if: steps.preflight.outputs.configured == 'true'
        with:
          python-version: "3.12"
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.preflight.outputs.configured == 'true'
      - name: Aplicar secrets JWT/Azure no reqsys-api
        id: apply
        if: steps.preflight.outputs.configured == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          COFRE_API_URL: ${{ secrets.COFRE_API_URL }}
          VAULT_API_TOKEN: ${{ secrets.VAULT_API_TOKEN }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -uo pipefail
          python scripts/configurar_fly_auth_azure.py \
            --fly-app reqsys-api \
            --app-env production \
            --app-public-url "$PUBLIC_FRONTEND_URL" \
            --api-public-url "$PUBLIC_API_URL" \
            --azure-tenant-id "$AZURE_TENANT_ID_SECRET" \
            --azure-client-id "$AZURE_CLIENT_ID_SECRET" \
            --cofre-tenant-key AZURE_TENANT_ID \
            --cofre-client-key AZURE_CLIENT_ID \
            | tee fly-auth-azure-report-production.json
          status="${PIPESTATUS[0]}"

          if [ "$status" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets auth produção aplicados e validados."
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Configuração de secrets auth produção falhou com exit code ${status}; deploy runtime será bloqueado de forma governada."
          exit 0

      - name: Registrar skip governado de secrets
        if: steps.preflight.outputs.configured != 'true'
        run: |
          set -euo pipefail
          echo "::notice::Configuração de secrets produção ignorada de forma governada; dependência externa ausente."

  deploy-fly-prod:
    name: Deploy Fly.io produção (runtime)
    runs-on: ubuntu-latest
    needs: [validate-runtime, configure-prod-secrets]
    if: >-
      needs.validate-runtime.result == 'success' &&
      needs.configure-prod-secrets.result == 'success' &&
      needs.configure-prod-secrets.outputs.configured == 'true' &&
      ((github.event_name == 'push' && github.ref_name == 'main') ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy_runtime_only' || github.event.inputs.action == 'auto')))
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy reqsys-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail

          deploy_log="$(mktemp)"
          max_attempts=3

          for attempt in $(seq 1 "$max_attempts"); do
            echo "::group::Fly deploy attempt ${attempt}/${max_attempts}"
            set +e
            flyctl deploy --remote-only --config fly.toml --app reqsys-api --build-arg "GITHUB_SHA=${{ github.sha }}" 2>&1 | tee "$deploy_log"
            status="${PIPESTATUS[0]}"
            set -e
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              echo "Fly deploy concluído na tentativa ${attempt}."
              exit 0
            fi

            if ! grep -Eiq "timeout reached waiting for health checks|request canceled|failed to get VM" "$deploy_log"; then
              echo "Falha não classificada como transitória no Fly deploy."
              exit "$status"
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Fly deploy falhou após ${max_attempts} tentativas por timeout transitório recorrente."
              exit "$status"
            fi

            echo "::warning::Fly deploy teve timeout transitório; aguardando estabilização antes do retry."
            sleep 60
          done

      - name: Resumo deploy
        run: |
          {
            echo "## Fly deploy produção"
            echo "- App: `reqsys-api`"
            echo "- SHA: `${{ github.sha }}`"
            echo "- Correlation ID: `$CORRELATION_ID`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-fly-frontend-prod:
    name: Deploy Fly.io produção (frontend)
    runs-on: ubuntu-latest
    needs: validate-runtime
    if: >-
      needs.validate-runtime.result == 'success' &&
      ((github.event_name == 'push' && github.ref_name == 'main') ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy_runtime_only' || github.event.inputs.action == 'auto')))
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy reqsys-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: frontend
        run: flyctl deploy --remote-only --config fly.toml --app reqsys-app

      - name: Resumo deploy frontend
        run: |
          {
            echo "## Fly deploy frontend produção"
            echo "- App: \`reqsys-app\`"
            echo "- SHA: \`${{ github.sha }}\`"
            echo "- Correlation ID: \`$CORRELATION_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"

  public-runtime-smoke:
    name: Smoke público /api/runtime/*
    runs-on: ubuntu-latest
    needs: [validate-runtime, deploy-fly-prod, deploy-fly-frontend-prod]
    if: >-
      always() &&
      needs.validate-runtime.result == 'success' &&
      needs.deploy-fly-prod.result == 'success' &&
      (needs.deploy-fly-frontend-prod.result == 'success' || needs.deploy-fly-frontend-prod.result == 'skipped') &&
      ((github.event_name == 'push' && github.ref_name == 'main') ||
       (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
       (github.event_name == 'workflow_dispatch' && (github.event.inputs.action == 'deploy_runtime_only' || github.event.inputs.action == 'auto')))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Probe endpoints runtime públicos
        run: |
          python scripts/runtime_public_validator.py \
            --probe \
            --base-url "$PUBLIC_API_URL" \
            --environment prod \
            --include-optional-evidence \
            --timeout 25 \
            --probe-attempts 4 \
            --probe-delay 15 \
            --artifact-root . \
            --output artifacts/runtime/runtime-public-probe.json

      - name: Falhar se /api/runtime/* indisponível
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("artifacts/runtime/runtime-public-probe.json")
          if not path.exists():
              raise SystemExit("probe artifact ausente")
          payload = json.loads(path.read_text(encoding="utf-8"))
          summary = payload.get("summary") or {}
          blocking = summary.get("blocking_issues") or payload.get("blocking_issues") or []
          for key in ("operational_status", "confidence", "probe_ready"):
              print(f"{key}={summary.get(key)}")
          if blocking:
              raise SystemExit(f"Runtime público ainda indisponível: {blocking}")
          print("Runtime público OK")
          PY

      - name: Validar sincronização repo ↔ runtime
        run: |
          python scripts/validate_publication_sync.py \
            --environment prod \
            --expected-sha "${{ github.sha }}" \
            --timeout 25 \
            --output publication-sync.json

      - name: Validar login produção
        run: |
          set -euo pipefail
          python scripts/validar_login_multi_ambiente.py \
            --environment prod \
            --timeout 25 \
            --output login-validation-prod.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: padrao-ouro-public-runtime-smoke
          path: |
            artifacts/runtime/runtime-public-probe.json
            artifacts/runtime/runtime-public-validation.json
            publication-sync.json
            login-validation-prod.json
          if-no-files-found: warn

  delivery-summary:
    name: Delivery summary
    runs-on: ubuntu-latest
    needs: [auto-open-pr, validate-runtime, configure-prod-secrets, deploy-fly-prod, deploy-fly-frontend-prod, public-runtime-smoke]
    if: always()
    steps:
      - name: Resumo consolidado
        run: |
          {
            echo "## Padrão Ouro Delivery Automation"
            echo ""
            echo "| Job | Resultado |"
            echo "|---|---|"
            echo "| Auto-open PR | ${{ needs.auto-open-pr.result || 'skipped' }} |"
            echo "| Validate runtime | ${{ needs.validate-runtime.result || 'skipped' }} |"
            echo "| Configure secrets | ${{ needs.configure-prod-secrets.result || 'skipped' }} |"
            echo "| Deploy Fly prod | ${{ needs.deploy-fly-prod.result || 'skipped' }} |"
            echo "| Deploy Fly frontend | ${{ needs.deploy-fly-frontend-prod.result || 'skipped' }} |"
            echo "| Public smoke | ${{ needs.public-runtime-smoke.result || 'skipped' }} |"
            echo ""
            echo "Correlation ID: `$CORRELATION_ID`"
            if [ "${{ needs.auto-open-pr.result }}" = "failure" ]; then
              echo ""
              echo "> PR automático falhou: configure o secret `GH_PAT_ACTIONS` com escopo `repo` e permissão de PR."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
