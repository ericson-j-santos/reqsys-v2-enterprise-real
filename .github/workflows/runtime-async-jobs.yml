name: Runtime Async Jobs

on:
  pull_request:
    paths:
      - 'runtime/**'
      - 'docs-site/assets/openapi/**'
      - '.github/workflows/runtime-async-jobs.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  runtime-tests:
    name: Runtime async jobs tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runtime/requirements.txt

      - name: Install dependencies
        working-directory: runtime
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: runtime
        run: pytest -q

      - name: Validate generated OpenAPI sync
        id: openapi-check
        continue-on-error: true
        working-directory: runtime
        run: python scripts/export_openapi.py --check

      - name: Synchronize canonical OpenAPI on PR branch
        if: steps.openapi-check.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.head_ref }}"
          git checkout -B "${{ github.head_ref }}" "origin/${{ github.head_ref }}"
          cd runtime
          python scripts/export_openapi.py
          cd ..
          if git diff --quiet -- docs-site/assets/openapi/reqsys-runtime-openapi-v0.6.0.json; then
            echo "OpenAPI generator reported divergence but produced no file diff." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs-site/assets/openapi/reqsys-runtime-openapi-v0.6.0.json
          git commit -m "docs(runtime): synchronize generated OpenAPI contract"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Fail when OpenAPI remains divergent
        if: steps.openapi-check.outcome == 'failure'
        run: |
          echo "OpenAPI canonical contract was divergent. A synchronization commit was requested; this run remains failed by design." >&2
          exit 1

      - name: Publish OpenAPI mismatch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-openapi-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: runtime/.tmp/openapi-diff/
          if-no-files-found: ignore
          retention-days: 7
