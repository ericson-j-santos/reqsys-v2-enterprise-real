name: Runtime Async Jobs

on:
  pull_request:
    paths:
      - 'runtime/**'
      - 'docs-site/assets/openapi/**'
      - '.github/workflows/runtime-async-jobs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runtime-tests:
    name: Runtime async jobs tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runtime/requirements.txt

      - name: Install dependencies
        working-directory: runtime
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: runtime
        run: pytest -q

      - name: Validate generated OpenAPI sync
        id: openapi-check
        continue-on-error: true
        working-directory: runtime
        run: python scripts/export_openapi.py --check

      - name: Persist OpenAPI diff on PR branch
        if: steps.openapi-check.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sourcePath = 'runtime/.tmp/openapi-diff/openapi.diff';
            const targetPath = 'artifacts/runtime-openapi-diff.txt';
            if (!fs.existsSync(sourcePath)) {
              core.setFailed(`Diagnostic file not found: ${sourcePath}`);
              return;
            }
            const content = fs.readFileSync(sourcePath, 'utf8');
            let sha;
            try {
              const current = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: targetPath,
                ref: context.payload.pull_request.head.ref,
              });
              sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: targetPath,
              branch: context.payload.pull_request.head.ref,
              message: 'chore(runtime): persist OpenAPI diff diagnostic',
              content: Buffer.from(content, 'utf8').toString('base64'),
              ...(sha ? { sha } : {}),
            });

      - name: Fail while OpenAPI is divergent
        if: steps.openapi-check.outcome == 'failure'
        run: exit 1
