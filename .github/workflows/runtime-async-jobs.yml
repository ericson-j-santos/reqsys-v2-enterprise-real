name: Runtime Async Jobs

on:
  pull_request:
    paths:
      - 'runtime/**'
      - 'docs-site/assets/openapi/**'
      - '.github/workflows/runtime-async-jobs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  runtime-tests:
    name: Runtime async jobs tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runtime/requirements.txt

      - name: Install dependencies
        working-directory: runtime
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: runtime
        run: pytest -q

      - name: Validate generated OpenAPI sync
        working-directory: runtime
        run: python scripts/export_openapi.py --check

      - name: Publish OpenAPI mismatch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-openapi-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: runtime/.tmp/openapi-diff/
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment OpenAPI mismatch on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'runtime/.tmp/openapi-diff/openapi.diff';
            if (!fs.existsSync(path)) {
              core.info('OpenAPI diff file not found; skipping diagnostic comment.');
              return;
            }
            const diff = fs.readFileSync(path, 'utf8').slice(0, 60000);
            const marker = '<!-- reqsys-runtime-openapi-diff -->';
            const body = `${marker}\n## Runtime OpenAPI mismatch\n\n\`\`\`diff\n${diff}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
