name: Runtime Async Jobs

on:
  pull_request:
    paths:
      - 'runtime/**'
      - 'docs-site/assets/openapi/**'
      - '.github/workflows/runtime-async-jobs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runtime-tests:
    name: Runtime async jobs tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runtime/requirements.txt

      - name: Install dependencies
        working-directory: runtime
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: runtime
        run: pytest -q

      - name: Validate generated OpenAPI sync
        id: openapi-check
        continue-on-error: true
        working-directory: runtime
        run: python scripts/export_openapi.py --check

      - name: Generate canonical OpenAPI for synchronization
        if: steps.openapi-check.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        working-directory: runtime
        run: python scripts/export_openapi.py

      - name: Synchronize canonical OpenAPI through GitHub API
        if: steps.openapi-check.outcome == 'failure' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const targetPath = 'docs-site/assets/openapi/reqsys-runtime-openapi-v0.6.0.json';
            const generated = fs.readFileSync(targetPath, 'utf8');
            const current = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: targetPath,
              ref: context.payload.pull_request.head.ref,
            });
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: targetPath,
              branch: context.payload.pull_request.head.ref,
              message: 'docs(runtime): synchronize generated OpenAPI contract',
              content: Buffer.from(generated, 'utf8').toString('base64'),
              sha: current.data.sha,
            });

      - name: Fail current run after synchronization request
        if: steps.openapi-check.outcome == 'failure'
        run: |
          echo "OpenAPI was divergent. The canonical file was synchronized on the PR branch; a new CI run will validate it." >&2
          exit 1

      - name: Publish OpenAPI mismatch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-openapi-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: runtime/.tmp/openapi-diff/
          if-no-files-found: ignore
          retention-days: 7
