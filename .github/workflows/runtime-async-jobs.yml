name: Runtime Async Jobs

on:
  pull_request:
    paths:
      - 'runtime/**'
      - 'docs-site/assets/openapi/**'
      - '.github/workflows/runtime-async-jobs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-tests:
    name: Runtime async jobs tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runtime/requirements.txt

      - name: Install dependencies
        working-directory: runtime
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: runtime
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .tmp/test-results
          pytest -q --tb=short --maxfail=2 2>&1 | tee .tmp/test-results/pytest.log

      - name: Validate generated OpenAPI sync
        working-directory: runtime
        run: python scripts/export_openapi.py --check

      - name: Publish test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-test-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: runtime/.tmp/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish OpenAPI mismatch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-openapi-diff-${{ github.run_id }}-${{ github.run_attempt }}
          path: runtime/.tmp/openapi-diff/
          if-no-files-found: ignore
          retention-days: 7
