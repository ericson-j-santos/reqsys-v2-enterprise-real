name: Runtime Async Jobs

on:
  pull_request:
    paths:
      - 'runtime/**'
      - '.github/workflows/runtime-async-jobs.yml'
  workflow_dispatch:

jobs:
  runtime-tests:
    name: Runtime async jobs tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: runtime/requirements.txt

      - name: Install dependencies
        working-directory: runtime
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: runtime
        run: pytest -q
