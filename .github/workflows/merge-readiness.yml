name: Merge Readiness Pareto Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
    paths:
      - ".github/workflows/merge-readiness.yml"
      - "scripts/merge_readiness_gate.py"
      - "scripts/build_merge_readiness_history.py"
      - "tests/test_build_merge_readiness_history.py"
      - "docs/ops-dashboard/data/merge-readiness-history.json"
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Branch base para validação"
        required: true
        default: "main"
        type: string

permissions:
  contents: read
  pull-requests: read

env:
  CORRELATION_ID: merge-readiness-${{ github.run_id }}-${{ github.run_attempt }}

concurrency:
  group: merge-readiness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  readiness-router:
    name: Readiness Router
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      run_gate: ${{ steps.route.outputs.run_gate }}
    steps:
      - name: Definir política de execução
        id: route
        shell: bash
        run: |
          set -euo pipefail
          run_gate=true
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.draft }}" == "true" ]]; then
            run_gate=false
          fi
          echo "run_gate=$run_gate" >> "$GITHUB_OUTPUT"
          echo "Run merge readiness gate: $run_gate" >> "$GITHUB_STEP_SUMMARY"

  merge-readiness:
    name: Merge readiness
    runs-on: ubuntu-latest
    needs: readiness-router
    if: needs.readiness-router.outputs.run_gate == 'true'
    timeout-minutes: 6
    steps:
      - name: Checkout head com histórico completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar prontidão objetiva de merge
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.inputs.base_ref || 'main' }}
        run: |
          set -euo pipefail
          python scripts/merge_readiness_gate.py \
            --base-ref "$BASE_REF" \
            --max-changed-files 25 \
            --max-workflow-files 3 \
            --max-domains 4 \
            --output artifacts/merge-readiness/merge-readiness.json

      - name: Validar superfície merge-readiness history
        if: always()
        run: |
          set -euo pipefail
          python -m pytest tests/test_build_merge_readiness_history.py tests/test_build_trilha_d_history.py::test_merge_readiness_history_increment_ready_detecta_arquivos -q

      - name: Atualizar histórico merge-readiness
        if: always()
        run: |
          set -euo pipefail
          REPORT="artifacts/merge-readiness/merge-readiness.json"
          OUTPUT="docs/ops-dashboard/data/merge-readiness-history.json"
          if [[ ! -f "${REPORT}" ]]; then
            echo "::warning::Relatório merge-readiness ausente; histórico não atualizado."
            exit 0
          fi
          python scripts/build_merge_readiness_history.py \
            --ingest-report "${REPORT}" \
            --run-id "${{ github.run_id }}" \
            --correlation-id "${CORRELATION_ID}" \
            --output "${OUTPUT}"

      - name: Publicar evidência de merge-readiness
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-readiness-evidence
          path: |
            artifacts/merge-readiness/merge-readiness.json
            docs/ops-dashboard/data/merge-readiness-history.json
          if-no-files-found: warn

      - name: Resumo executivo
        if: always()
        run: |
          echo "## Merge Readiness Pareto Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Correlation ID: \`$CORRELATION_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Evidência: \`artifacts/merge-readiness/merge-readiness.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/merge-readiness/merge-readiness.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          payload = json.loads(Path('artifacts/merge-readiness/merge-readiness.json').read_text(encoding='utf-8'))
          print(f"- Status: `{payload.get('status')}`")
          print(f"- Ahead: `{payload.get('ahead_by')}`")
          print(f"- Behind: `{payload.get('behind_by')}`")
          print(f"- Arquivos alterados: `{payload.get('changed_files')}`")
          print(f"- Workflows alterados: `{payload.get('workflow_files')}`")
          blocking = payload.get('blocking_issues') or []
          warnings = payload.get('warnings') or []
          if blocking:
              print('')
              print('### Bloqueios')
              for item in blocking:
                  print(f"- {item}")
          if warnings:
              print('')
              print('### Alertas')
              for item in warnings:
                  print(f"- {item}")
          PY
          else
            echo "- Status: \`sem artifact\`" >> "$GITHUB_STEP_SUMMARY"
          fi
