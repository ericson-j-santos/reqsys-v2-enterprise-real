name: Deploy Production Sync

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "Deploy API produção (reqsys-api)"
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: "Deploy frontend produção (reqsys-app)"
        required: true
        type: boolean
        default: true
      approve_prod_deploy:
        description: "Confirmação obrigatória para produção: APROVO-PROD"
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-production-sync.yml"
      - "scripts/validate_publication_sync.py"
      - "frontend/**"
      - "backend/**"
      - "fly.toml"
      - "backend/fly.toml"
      - "frontend/fly.toml"
      - "Dockerfile.fly"
      - "scripts/fly_boot.sh"
      - "scripts/configurar_fly_auth_azure.py"
      - "scripts/validar_login_multi_ambiente.py"
      - ".github/workflows/configurar-fly-auth-azure.yml"
      - ".github/workflows/login-multi-ambiente-gate.yml"
      - ".github/workflows/padrao-ouro-delivery-automation.yml"

permissions:
  contents: read

concurrency:
  group: deploy-production-sync
  cancel-in-progress: false

env:
  CORRELATION_ID: deploy-production-sync-${{ github.run_id }}-${{ github.run_attempt }}
  PUBLIC_API_URL: https://reqsys-api.fly.dev
  PUBLIC_FRONTEND_URL: https://reqsys-app.fly.dev

jobs:
  gate:
    name: Gate publicação produção
    runs-on: ubuntu-latest
    steps:
      - name: Exigir confirmação textual em produção
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.approve_prod_deploy }}" != "APROVO-PROD" ]; then
            echo "Produção exige approve_prod_deploy=APROVO-PROD" >&2
            exit 1
          fi

  pre-sync-check:
    name: Diagnóstico pré-sync (read-only)
    runs-on: ubuntu-latest
    needs: gate
    if: always() && needs.gate.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar drift repo ↔ runtime
        continue-on-error: true
        run: |
          python scripts/validate_publication_sync.py \
            --environment prod \
            --expected-sha "${{ github.sha }}" \
            --output publication-sync-pre.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publication-sync-pre
          path: publication-sync-pre.json
          if-no-files-found: warn

  validate-runtime:
    name: Validar config Fly/runtime
    runs-on: ubuntu-latest
    needs: gate
    if: always() && needs.gate.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar Trilha A
        run: |
          python scripts/runtime_public_validator.py \
            --artifact-root . \
            --output artifacts/runtime/runtime-public-validation.json \
            --strict
      - name: Validar matriz enterprise Fly
        run: python scripts/validate_fly_enterprise_sync.py --output fly-enterprise-sync-validation.json

  configure-prod-secrets:
    name: Configurar secrets auth produção
    runs-on: ubuntu-latest
    needs: [gate, validate-runtime]
    if: >-
      always() &&
      needs.gate.result == 'success' &&
      needs.validate-runtime.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_backend == true) ||
        (github.event_name == 'push')
      )
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Aplicar secrets JWT/Azure no reqsys-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          COFRE_API_URL: ${{ secrets.COFRE_API_URL }}
          VAULT_API_TOKEN: ${{ secrets.VAULT_API_TOKEN }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_TENANT_ID_SECRET:-}" ] || [ -z "${AZURE_CLIENT_ID_SECRET:-}" ]; then
            echo "::warning::AZURE_TENANT_ID/AZURE_CLIENT_ID ausentes no GitHub — pulando apply (assumindo secrets já configurados no Fly)"
            printf '%s\n' '{"success": true, "skipped": true, "reason": "github_azure_secrets_empty"}' > fly-auth-azure-report-production.json
            exit 0
          fi
          python scripts/configurar_fly_auth_azure.py \
            --fly-app reqsys-api \
            --app-env production \
            --app-public-url "$PUBLIC_FRONTEND_URL" \
            --api-public-url "$PUBLIC_API_URL" \
            --azure-tenant-id "$AZURE_TENANT_ID_SECRET" \
            --azure-client-id "$AZURE_CLIENT_ID_SECRET" \
            --cofre-tenant-key AZURE_TENANT_ID \
            --cofre-client-key AZURE_CLIENT_ID \
            | tee fly-auth-azure-report-production.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fly-auth-azure-report-production
          path: fly-auth-azure-report-production.json
          if-no-files-found: warn

  deploy-backend:
    name: Deploy API produção
    runs-on: ubuntu-latest
    needs: [gate, validate-runtime, configure-prod-secrets]
    if: >-
      always() &&
      needs.gate.result == 'success' &&
      needs.validate-runtime.result == 'success' &&
      needs.configure-prod-secrets.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_backend == true) ||
        (github.event_name == 'push')
      )
    environment: production
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy reqsys-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          deploy_log="$(mktemp)"
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "::group::API deploy attempt ${attempt}/${max_attempts}"
            set +e
            flyctl deploy --remote-only \
              --config fly.toml \
              --app reqsys-api \
              --build-arg "GITHUB_SHA=${{ github.sha }}" 2>&1 | tee "$deploy_log"
            status="${PIPESTATUS[0]}"
            set -e
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if ! grep -Eiq "timeout reached waiting for health checks|request canceled|failed to get VM" "$deploy_log"; then
              exit "$status"
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              exit "$status"
            fi
            sleep 60
          done

  deploy-frontend:
    name: Deploy frontend produção
    runs-on: ubuntu-latest
    needs: [gate, validate-runtime]
    if: >-
      always() &&
      needs.gate.result == 'success' &&
      needs.validate-runtime.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_frontend == true) ||
        (github.event_name == 'push')
      )
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy reqsys-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: frontend
        run: flyctl deploy --remote-only --config fly.toml --app reqsys-app

  post-sync-check:
    name: Validar sync pós-deploy
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: >-
      always() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Aguardar estabilização do runtime
        if: needs.deploy-backend.result == 'success'
        run: sleep 45
      - name: Smoke API /api/runtime/*
        if: needs.deploy-backend.result == 'success'
        run: |
          python scripts/runtime_public_validator.py \
            --probe \
            --base-url "$PUBLIC_API_URL" \
            --environment prod \
            --include-optional-evidence \
            --timeout 20 \
            --probe-attempts 4 \
            --probe-delay 15 \
            --artifact-root . \
            --output artifacts/runtime/runtime-public-probe.json
      - name: Validar publicação sincronizada
        if: needs.deploy-backend.result == 'success'
        run: |
          python scripts/validate_publication_sync.py \
            --environment prod \
            --expected-sha "${{ github.sha }}" \
            --timeout 20 \
            --output publication-sync-post.json
      - name: Validar login produção
        if: needs.deploy-backend.result == 'success'
        run: |
          python scripts/validar_login_multi_ambiente.py \
            --environment prod \
            --timeout 20 \
            --output login-validation-prod.json
      - name: Validar bundle frontend publicado
        if: needs.deploy-frontend.result == 'success'
        run: |
          set -euo pipefail
          python scripts/validar_frontend_auth_redirect.py \
            --frontend-url "$PUBLIC_FRONTEND_URL" \
            | tee login-frontend-prod-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publication-sync-post
          path: |
            publication-sync-post.json
            artifacts/runtime/runtime-public-probe.json
            login-validation-prod.json
            login-frontend-prod-report.json
          if-no-files-found: warn

  summary:
    name: Resumo publicação
    runs-on: ubuntu-latest
    needs: [pre-sync-check, validate-runtime, configure-prod-secrets, deploy-backend, deploy-frontend, post-sync-check]
    if: always()
    steps:
      - name: Resumo
        run: |
          {
            echo "## Deploy Production Sync"
            echo "- Correlation ID: \`$CORRELATION_ID\`"
            echo "- SHA alvo: \`${{ github.sha }}\`"
            echo "| Job | Resultado |"
            echo "|---|---|"
            echo "| Pré-sync | ${{ needs.pre-sync-check.result || 'skipped' }} |"
            echo "| Validate runtime | ${{ needs.validate-runtime.result || 'skipped' }} |"
            echo "| Configure secrets | ${{ needs.configure-prod-secrets.result || 'skipped' }} |"
            echo "| Deploy API | ${{ needs.deploy-backend.result || 'skipped' }} |"
            echo "| Deploy frontend | ${{ needs.deploy-frontend.result || 'skipped' }} |"
            echo "| Pós-sync | ${{ needs.post-sync-check.result || 'skipped' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
