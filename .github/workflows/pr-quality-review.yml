name: PR Quality Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número do PR para revisar"
        required: true
        type: string
      comment:
        description: "Comentar diagnóstico no PR"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: pr-quality-review-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-quality-review:
    name: PR Quality Review governado
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      REPORT_DIR: artifacts/pr-quality-review

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver contexto
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ github.event.pull_request.draft }}" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "comment=${{ github.event.inputs.comment }}" >> "$GITHUB_OUTPUT"
          else
            echo "Evento não suportado: ${{ github.event_name }}" >&2
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar PR Quality Review
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          COMMENT_FLAG=""
          if [ "${{ steps.ctx.outputs.comment }}" = "true" ]; then
            COMMENT_FLAG="--comment"
          fi

          python scripts/pr_quality_review.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ steps.ctx.outputs.pr_number }}" \
            --report-dir "${REPORT_DIR}" \
            ${COMMENT_FLAG}

      - name: Publicar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-quality-review-report
          path: artifacts/pr-quality-review
          if-no-files-found: error
          retention-days: 15
