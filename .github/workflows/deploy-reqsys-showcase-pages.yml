name: Deploy ReqSys Public Showcase

on:
  workflow_dispatch:
  schedule:
    - cron: "19 10 * * 1-5"
  push:
    branches:
      - main
    paths:
      - 'docs/public-showcase/reqsys-linkedin/**'
      - 'docs/index.html'
      - 'docs/assets/**'
      - '.github/workflows/deploy-reqsys-showcase-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: reqsys-public-showcase-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static showcase
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate public showcase files
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/public-showcase/reqsys-linkedin/index.html
          test -f docs/public-showcase/reqsys-linkedin/assets/styles.css
          # README.md lista termos proibidos como documentação; validar só HTML/CSS/SVG publicáveis.
          scan_targets=(
            docs/public-showcase/reqsys-linkedin/index.html
            docs/public-showcase/reqsys-linkedin/assets
          )
          if grep -RniE \
            '(api[_-]?key|client[_-]?secret|password\s*[:=]|bearer\s+[a-z0-9._-]{20,}|connection\s+string|cpf|cnpj)' \
            "${scan_targets[@]}"; then
            echo 'Sensitive-looking term found in public showcase. Review required.'
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public-showcase/reqsys-linkedin

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
