name: ReqSys Single State

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Unified Executive Integration Index"]
    types: [completed]
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: read

env:
  SOURCE: .tmp/reqsys-single-state/unified-executive-integration-index.json
  OUTPUT: .tmp/reqsys-single-state/reqsys-single-state.json

jobs:
  publish-single-state:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate publisher and source builder
        run: |
          python -m pytest -q \
            tests/test_publish_reqsys_single_state.py \
            tests/test_build_unified_executive_integration_index.py
      - name: Build deterministic executive source
        shell: bash
        run: |
          set -euo pipefail
          workdir=.tmp/reqsys-single-state
          mkdir -p "$workdir"
          cp docs/ops-dashboard/data/runtime-executive-index.json "$workdir/runtime.json" 2>/dev/null || echo '{}' > "$workdir/runtime.json"
          cp docs/ops-dashboard/data/merge-intelligence-index.json "$workdir/quality.json" 2>/dev/null || echo '{}' > "$workdir/quality.json"
          echo '{}' > "$workdir/parallelism.json"
          python scripts/build_unified_executive_integration_index.py \
            --parallelism "$workdir/parallelism.json" \
            --runtime "$workdir/runtime.json" \
            --quality "$workdir/quality.json" \
            --output "$SOURCE"
      - name: Validate governance invariants
        run: jq -e '.production.promotion_allowed == false and .production.human_approval_required == true' "$SOURCE" >/dev/null
      - name: Publish canonical contract
        run: python scripts/publish_reqsys_single_state.py --source "$SOURCE" --output "$OUTPUT"
      - name: Add executive summary
        run: |
          python - <<'PY'
          import json, os
          data = json.load(open(os.environ["OUTPUT"], encoding="utf-8"))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write("# ReqSys Single State\n\n")
              out.write(f"- Status: **{data['status']}**\n")
              out.write(f"- Confidence: **{data['confidence']}**\n")
              out.write(f"- Human approval required: **{data['human_approval_required']}**\n")
              out.write("- Consumers: **Governance, Runtime, Analytics**\n")
              out.write(f"- Next safe increment: {data['state']['next_safe_increment']}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: reqsys-single-state
          path: ${{ env.OUTPUT }}
          retention-days: 90
