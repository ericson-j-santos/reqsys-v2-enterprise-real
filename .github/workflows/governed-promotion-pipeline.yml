name: Governed Promotion Pipeline

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch/tag/sha de origem para promoção'
        required: true
        default: 'dev'
        type: string
      target_environment:
        description: 'Ambiente alvo'
        required: true
        default: 'homolog'
        type: choice
        options:
          - homolog
          - prod
      dry_run:
        description: 'Executar somente simulação, sem criar PR/tag/promoção'
        required: true
        default: true
        type: boolean
      change_ticket:
        description: 'Ticket/issue/change request obrigatório para produção'
        required: false
        type: string
      approve_prod_promotion:
        description: 'Confirmação textual obrigatória para produção: APROVO-PROD'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: governed-promotion-${{ github.event.inputs.target_environment }}
  cancel-in-progress: false

env:
  CORRELATION_ID: governed-promotion-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  promotion-policy:
    name: Promotion Policy
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.policy.outputs.approved }}
      target_branch: ${{ steps.policy.outputs.target_branch }}
      blocked_reason: ${{ steps.policy.outputs.blocked_reason }}
      risk_level: ${{ steps.policy.outputs.risk_level }}
      release_readiness_score: ${{ steps.policy.outputs.release_readiness_score }}
      release_readiness: ${{ steps.policy.outputs.release_readiness }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Release Validation Layer artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: release-validation-layer-evidence
          path: audit/release-validation

      - name: Download coordenador status for fallback generation
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coordenador-status-evidence
          path: artifacts/coordenador-status

      - name: Gerar release validation quando artifact ausente
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f audit/release-validation/release-validation-layer.json ]]; then
            python scripts/release_validation_layer.py \
              --repo "${GITHUB_REPOSITORY}" \
              --branch main \
              --run-id "${GITHUB_RUN_ID}" \
              --event-name "${GITHUB_EVENT_NAME}" \
              --output-dir audit/release-validation
          fi

      - name: Avaliar pre-condicao release validation
        id: release_gate
        shell: bash
        env:
          TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/governed-promotion
          set +e
          python scripts/evaluate_promotion_release_gate.py \
            --target-environment "$TARGET_ENVIRONMENT" \
            --dry-run "$DRY_RUN" \
            --output-json artifacts/governed-promotion/release-validation-gate.json
          gate_exit=$?
          set -e
          gate=$(cat artifacts/governed-promotion/release-validation-gate.json)
          echo "$gate"
          echo "approved=$(echo "$gate" | jq -r '.approved')" >> "$GITHUB_OUTPUT"
          echo "blocked_reason=$(echo "$gate" | jq -r '.blocked_reason // .promotion_block_reason // empty')" >> "$GITHUB_OUTPUT"
          echo "release_readiness_score=$(echo "$gate" | jq -r '.release_readiness_score // empty')" >> "$GITHUB_OUTPUT"
          echo "release_readiness=$(echo "$gate" | jq -r '.readiness // empty')" >> "$GITHUB_OUTPUT"
          echo "promotion_would_block=$(echo "$gate" | jq -r '.promotion_would_block // false')" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Avaliar política de promoção
        id: policy
        env:
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
          TARGET_ENVIRONMENT: ${{ github.event.inputs.target_environment }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          CHANGE_TICKET: ${{ github.event.inputs.change_ticket }}
          APPROVE_PROD_PROMOTION: ${{ github.event.inputs.approve_prod_promotion }}
          RELEASE_GATE_APPROVED: ${{ steps.release_gate.outputs.approved }}
          RELEASE_GATE_BLOCKED_REASON: ${{ steps.release_gate.outputs.blocked_reason }}
          RELEASE_READINESS_SCORE: ${{ steps.release_gate.outputs.release_readiness_score }}
          RELEASE_READINESS: ${{ steps.release_gate.outputs.release_readiness }}
          PROMOTION_WOULD_BLOCK: ${{ steps.release_gate.outputs.promotion_would_block }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/governed-promotion

          target_branch=""
          blocked_reason=""
          risk_level="medium"

          case "$TARGET_ENVIRONMENT" in
            homolog)
              target_branch="homolog"
              risk_level="medium"
              ;;
            prod)
              target_branch="main"
              risk_level="high"
              ;;
            *)
              blocked_reason="ambiente alvo inválido"
              ;;
          esac

          git fetch origin "$SOURCE_REF" || blocked_reason="source_ref não encontrado: $SOURCE_REF"
          git fetch origin "$target_branch" || true

          if [ "$TARGET_ENVIRONMENT" = "prod" ]; then
            if [ -z "$CHANGE_TICKET" ]; then
              blocked_reason="produção exige change_ticket"
            fi
            if [ "$APPROVE_PROD_PROMOTION" != "APROVO-PROD" ]; then
              blocked_reason="produção exige confirmação textual APROVO-PROD"
            fi
            if [ "$DRY_RUN" = "false" ]; then
              blocked_reason="promoção real para produção permanece bloqueada neste incremento inicial"
            fi
          fi

          if [ -n "$target_branch" ] && git rev-parse --verify "origin/$target_branch" >/dev/null 2>&1; then
            git diff --name-only "origin/$target_branch...origin/$SOURCE_REF" | tee artifacts/governed-promotion/changed-files.txt
          else
            touch artifacts/governed-promotion/changed-files.txt
          fi

          sensitive_count=$(grep -Eic '(^|/)(auth|security|secrets|vault|cofre|jwt|cors|deploy|fly|terraform|infra|migrations|database|db|prod|production|homolog|environments?)/|(^|/)\.env|(^|/)docker-compose\.prod\.ya?ml$|(^|/)\.github/workflows/(release|deploy|production|prod|fly).*\.ya?ml$' artifacts/governed-promotion/changed-files.txt || true)

          if [ "$sensitive_count" -gt 0 ]; then
            risk_level="high"
            if [ "$TARGET_ENVIRONMENT" = "homolog" ]; then
              blocked_reason="promoção para homolog com alterações sensíveis exige revisão manual fora do auto-promotion"
            fi
          fi

          if [ "$RELEASE_GATE_APPROVED" = "false" ]; then
            if [ -z "$blocked_reason" ]; then
              blocked_reason="$RELEASE_GATE_BLOCKED_REASON"
            elif [ -n "$RELEASE_GATE_BLOCKED_REASON" ]; then
              blocked_reason="$blocked_reason; $RELEASE_GATE_BLOCKED_REASON"
            fi
          fi

          if [ "$PROMOTION_WOULD_BLOCK" = "true" ] && [ "$DRY_RUN" = "true" ]; then
            risk_level="high"
          fi

          approved="false"
          if [ -z "$blocked_reason" ]; then
            approved="true"
          fi

          jq -n \
            --arg schema_version "1.1.0" \
            --arg correlation_id "$CORRELATION_ID" \
            --arg source_ref "$SOURCE_REF" \
            --arg target_environment "$TARGET_ENVIRONMENT" \
            --arg target_branch "$target_branch" \
            --arg dry_run "$DRY_RUN" \
            --arg approved "$approved" \
            --arg risk_level "$risk_level" \
            --arg blocked_reason "$blocked_reason" \
            --arg change_ticket "$CHANGE_TICKET" \
            --arg release_readiness_score "$RELEASE_READINESS_SCORE" \
            --arg release_readiness "$RELEASE_READINESS" \
            --arg promotion_would_block "$PROMOTION_WOULD_BLOCK" \
            --slurpfile release_gate artifacts/governed-promotion/release-validation-gate.json \
            '{schema_version:$schema_version,correlation_id:$correlation_id,source_ref:$source_ref,target_environment:$target_environment,target_branch:$target_branch,dry_run:($dry_run=="true"),approved:($approved=="true"),risk_level:$risk_level,blocked_reason:$blocked_reason,change_ticket:$change_ticket,release_readiness_score:(if $release_readiness_score=="" then null else ($release_readiness_score|tonumber) end),release_readiness:(if $release_readiness=="" then null else $release_readiness end),promotion_would_block:($promotion_would_block=="true"),release_validation_gate:$release_gate[0]}' \
            > artifacts/governed-promotion/promotion-policy.json

          cat artifacts/governed-promotion/promotion-policy.json

          echo "approved=$approved" >> "$GITHUB_OUTPUT"
          echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"
          echo "blocked_reason=$blocked_reason" >> "$GITHUB_OUTPUT"
          echo "risk_level=$risk_level" >> "$GITHUB_OUTPUT"
          echo "release_readiness_score=$RELEASE_READINESS_SCORE" >> "$GITHUB_OUTPUT"
          echo "release_readiness=$RELEASE_READINESS" >> "$GITHUB_OUTPUT"

      - name: Publicar artifact de política
        uses: actions/upload-artifact@v4
        with:
          name: governed-promotion-evidence
          path: artifacts/governed-promotion/
          if-no-files-found: error

  create-promotion-pr:
    name: Create Promotion PR
    runs-on: ubuntu-latest
    needs: promotion-policy
    if: needs.promotion-policy.outputs.approved == 'true' && github.event.inputs.dry_run == 'false' && github.event.inputs.target_environment == 'homolog'
    environment: homolog
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar PR de promoção para homolog
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
          TARGET_BRANCH: ${{ needs.promotion-policy.outputs.target_branch }}
          CORRELATION_ID: ${{ env.CORRELATION_ID }}
        run: |
          set -euo pipefail

          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$SOURCE_REF" \
            --title "promotion(homolog): promover $SOURCE_REF" \
            --body "Promoção governada para homolog. Correlation ID: $CORRELATION_ID. Artifacts: governed-promotion-evidence, release-validation-layer-evidence." \
            --draft

  summary:
    name: Promotion Summary
    runs-on: ubuntu-latest
    needs: promotion-policy
    if: always()
    steps:
      - name: Resumo operacional
        run: |
          set -euo pipefail
          {
            echo "## Governed Promotion Pipeline"
            echo ""
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Correlation ID | $CORRELATION_ID |"
            echo "| Origem | ${{ github.event.inputs.source_ref }} |"
            echo "| Ambiente alvo | ${{ github.event.inputs.target_environment }} |"
            echo "| Dry run | ${{ github.event.inputs.dry_run }} |"
            echo "| Aprovado | ${{ needs.promotion-policy.outputs.approved }} |"
            echo "| Risco | ${{ needs.promotion-policy.outputs.risk_level }} |"
            echo "| Release readiness score | ${{ needs.promotion-policy.outputs.release_readiness_score }} |"
            echo "| Release readiness | ${{ needs.promotion-policy.outputs.release_readiness }} |"
            echo "| Bloqueio | ${{ needs.promotion-policy.outputs.blocked_reason }} |"
          } >> "$GITHUB_STEP_SUMMARY"
