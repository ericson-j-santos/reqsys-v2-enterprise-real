name: Testes Monitorador APIs Python

on:
  pull_request:
    paths:
      - "examples/monitorador_apis_python/**"
      - ".github/workflows/testes-monitorador-apis-python.yml"
  push:
    branches:
      - main
    paths:
      - "examples/monitorador_apis_python/**"
      - ".github/workflows/testes-monitorador-apis-python.yml"

jobs:
  testes:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/monitorador_apis_python

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar testes com cobertura mínima
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=60

      - name: Validar import FastAPI
        run: |
          python -c "from app.api import app; print(app.title)"

      - name: Validar Docker build
        run: |
          docker build -t monitorador-apis-python:test .
