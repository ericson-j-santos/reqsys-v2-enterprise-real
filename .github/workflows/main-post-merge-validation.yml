name: Main Post-Merge Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to validate. Defaults to current github.sha.'
        required: false
        type: string
  schedule:
    - cron: '15 * * * *'

concurrency:
  group: main-post-merge-validation-${{ github.event.inputs.commit_sha || github.sha }}
  cancel-in-progress: false

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  validate-main:
    name: Validate main commit evidence
    runs-on: ubuntu-latest
    env:
      REQUIRED_MAIN_WORKFLOWS: |
        CI — ReqSys v2 Enterprise
        Governance Quality Gates
        Governança Padrão Ouro
      OPTIONAL_MAIN_WORKFLOWS: |
        Main Post-Merge Validation
        PR Evidence Gate
        NGINX Security Profile
      MAX_WAIT_SECONDS: '180'
      POLL_SECONDS: '15'
    steps:
      - name: Build main post-merge evidence
        id: evidence
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            function parseList(value) {
              return String(value || '')
                .split('\n')
                .map((item) => item.trim())
                .filter(Boolean);
            }

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            async function resolveMainSha() {
              const inputSha = core.getInput('commit_sha');
              if (inputSha) return inputSha;
              if (context.eventName === 'schedule') {
                const { data } = await github.rest.repos.getBranch({ owner, repo, branch: 'main' });
                return data.commit.sha;
              }
              return context.sha;
            }

            async function listRuns(headSha) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                head_sha: headSha,
                per_page: 100,
              });

              const summaries = [];
              for (const run of runs) {
                const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 100,
                });

                summaries.push({
                  id: run.id,
                  name: run.name,
                  event: run.event,
                  status: run.status,
                  conclusion: run.conclusion,
                  head_branch: run.head_branch,
                  head_sha: run.head_sha,
                  html_url: run.html_url,
                  created_at: run.created_at,
                  updated_at: run.updated_at,
                  artifacts: artifacts.map((artifact) => ({
                    id: artifact.id,
                    name: artifact.name,
                    expired: artifact.expired,
                    size_in_bytes: artifact.size_in_bytes,
                    digest: artifact.digest || null,
                    created_at: artifact.created_at,
                    expires_at: artifact.expires_at,
                  })),
                });
              }
              return summaries;
            }

            function evaluate({ mainSha, runs, requiredWorkflows, optionalWorkflows }) {
              const failures = [];
              const pending = [];
              const warnings = [];

              if (!mainSha) failures.push('Main commit SHA was not resolved.');
              if (runs.length === 0) failures.push(`No workflow runs found for main commit SHA ${mainSha}.`);

              const required = requiredWorkflows.map((name) => {
                const matching = runs.filter((run) => run.name === name);
                const successful = matching.filter((run) => run.status === 'completed' && run.conclusion === 'success');
                const active = matching.filter((run) => run.status !== 'completed');
                const failed = matching.filter((run) => run.status === 'completed' && run.conclusion && run.conclusion !== 'success' && run.conclusion !== 'cancelled' && run.conclusion !== 'skipped');
                const cancelled = matching.filter((run) => run.status === 'completed' && run.conclusion === 'cancelled');
                const latest = matching.sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)))[0] || null;

                if (matching.length === 0) failures.push(`Required main workflow has no run on commit SHA: ${name}`);
                else if (active.length > 0 && successful.length === 0) pending.push(`Required main workflow still running on commit SHA: ${name}`);
                else if (successful.length === 0 && failed.length > 0) failures.push(`Required main workflow failed on commit SHA: ${name}`);
                else if (successful.length === 0 && cancelled.length > 0) warnings.push(`Required main workflow was cancelled and should be superseded by a newer run: ${name}`);

                return {
                  name,
                  matching_runs: matching.length,
                  successful_runs: successful.length,
                  active_runs: active.length,
                  failed_runs: failed.length,
                  cancelled_runs: cancelled.length,
                  latest,
                };
              });

              const optional = optionalWorkflows.map((name) => {
                const matching = runs.filter((run) => run.name === name);
                return { name, matching_runs: matching.length };
              });

              const artifacts = runs.flatMap((run) => run.artifacts.map((artifact) => ({ ...artifact, workflow: run.name, run_id: run.id })));
              const auditArtifacts = artifacts.filter((artifact) => {
                const name = artifact.name.toLowerCase();
                return name.includes('evidence') || name.includes('audit') || name.includes('report');
              });

              if (auditArtifacts.length === 0) {
                warnings.push(`No previous audit/report/evidence artifact found for main commit SHA ${mainSha}; this workflow will publish main-post-merge-validation evidence for this SHA.`);
              }

              return {
                status: failures.length === 0 && pending.length === 0 ? 'passed' : failures.length > 0 ? 'failed' : 'pending',
                failures,
                pending,
                warnings,
                required_workflows: required,
                optional_workflows: optional,
                audit_artifacts: auditArtifacts,
                self_evidence_artifact_expected: true,
              };
            }

            const mainSha = await resolveMainSha();
            const requiredWorkflows = parseList(process.env.REQUIRED_MAIN_WORKFLOWS);
            const optionalWorkflows = parseList(process.env.OPTIONAL_MAIN_WORKFLOWS);
            const maxWaitSeconds = Number(process.env.MAX_WAIT_SECONDS || '180');
            const pollSeconds = Number(process.env.POLL_SECONDS || '15');
            const deadline = Date.now() + maxWaitSeconds * 1000;

            let runs = [];
            let gate = null;

            do {
              runs = await listRuns(mainSha);
              gate = evaluate({ mainSha, runs, requiredWorkflows, optionalWorkflows });
              if (gate.status !== 'pending') break;
              core.info(`Main post-merge evidence pending. Waiting ${pollSeconds}s before rechecking.`);
              await sleep(pollSeconds * 1000);
            } while (Date.now() < deadline);

            if (gate.status === 'pending') {
              gate.failures.push(...gate.pending);
              gate.status = 'failed';
            }

            const audit = {
              schema_version: '1.1.0',
              generated_at: new Date().toISOString(),
              repository: `${owner}/${repo}`,
              branch: 'main',
              validated_sha: mainSha,
              event_name: context.eventName,
              run_id: context.runId,
              gate,
              workflow_runs: runs,
            };

            fs.mkdirSync('audit', { recursive: true });
            fs.writeFileSync('audit/main-post-merge-validation.json', JSON.stringify(audit, null, 2));
            fs.writeFileSync('audit/main-post-merge-validation.md', [
              '# Main Post-Merge Validation',
              '',
              `- Repository: ${owner}/${repo}`,
              `- Branch: main`,
              `- Validated SHA: ${mainSha}`,
              `- Status: ${gate.status}`,
              `- Failures: ${gate.failures.length}`,
              `- Warnings: ${gate.warnings.length}`,
              '',
              '## Failures',
              gate.failures.length ? gate.failures.map((failure) => `- ${failure}`).join('\n') : '- None',
              '',
              '## Warnings',
              gate.warnings.length ? gate.warnings.map((warning) => `- ${warning}`).join('\n') : '- None',
            ].join('\n'));

            core.setOutput('validated_sha', mainSha);
            core.setOutput('status', gate.status);

            if (gate.status !== 'passed') {
              core.setFailed(gate.failures.join('\n'));
            }

      - name: Upload main validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-post-merge-validation-${{ steps.evidence.outputs.validated_sha || github.sha }}
          path: audit/
          if-no-files-found: error
          retention-days: 30
