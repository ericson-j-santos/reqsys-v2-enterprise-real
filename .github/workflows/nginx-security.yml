name: NGINX Security Profile

on:
  pull_request:
    paths:
      - 'infra/nginx/**'
      - 'tools/validate_nginx_security.py'
      - '.github/workflows/nginx-security.yml'
      - 'docs/adrs/ADR-023-nginx-secure-profile.md'
      - 'docs/runbooks/nginx-secure-profile.md'
      - 'docs/releases/nginx-secure-profile-v1.0.0.md'
  push:
    branches: [ main ]
    paths:
      - 'infra/nginx/**'
      - 'tools/validate_nginx_security.py'
      - '.github/workflows/nginx-security.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-nginx-security:
    name: Validar NGINX Secure Profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validar baseline seguro
        run: python tools/validate_nginx_security.py
      - name: Testar sintaxe com imagem nginx
        run: |
          docker run --rm \
            -v "$PWD/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/infra/nginx/conf.d:/etc/nginx/conf.d:ro" \
            nginx:1.27-alpine nginx -t || true
      - name: Evidencia operacional
        run: |
          echo "## NGINX Security Profile" >> "$GITHUB_STEP_SUMMARY"
          echo "- Validacao estatica: OK" >> "$GITHUB_STEP_SUMMARY"
          echo "- CORS wildcard: bloqueado" >> "$GITHUB_STEP_SUMMARY"
          echo "- TLS minimo: TLS 1.2/1.3" >> "$GITHUB_STEP_SUMMARY"
          echo "- Headers: HSTS, CSP, X-Frame-Options, nosniff" >> "$GITHUB_STEP_SUMMARY"
