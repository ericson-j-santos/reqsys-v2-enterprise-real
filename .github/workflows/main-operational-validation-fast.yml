name: Main Operational Validation Fast

# Caminho ultra-rápido pós-merge: 1 job, modo lite, alvo <10s wall-clock no runner.
# Script ~sub-segundo; overhead restante = checkout + upload único.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "tests/test_pr_ci_watch.py"
      - "tests/test_unified_operational_signal_consolidator.py"
      - "tests/test_main_operational_validation_fast.py"
      - "config/operational-gaps-registry.json"
      - "tools/product_intelligence/**"
      - "docs/runbooks/main-operational-health.md"
      - "docs/runbooks/consolidacao-operacional-p0.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-operational-validation-fast-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-fast:
    name: Validação operacional rápida (malha P0)
    runs-on: ubuntu-latest
    timeout-minutes: 1

    steps:
      - name: Checkout (sparse)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
            config
            .github/workflows
            tests/test_pr_ci_watch.py
            docs/runbooks

      - name: Validar malha P0 (modo lite)
        id: fast
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          SECONDS=0
          python3 scripts/main_operational_validation_fast.py \
            --repo "${REPO}" \
            --branch "${BRANCH}" \
            --sha "${SHA}" \
            --run-id "${RUN_ID}" \
            --workflow-url "${WORKFLOW_URL}" \
            --output-dir artifacts/main-operational-validation-fast \
            --lite \
            --json | tee artifacts/main-operational-validation-fast/result.json
          job_elapsed="${SECONDS}"
          summary="artifacts/main-operational-validation-fast/main-operational-validation-fast.json"
          script_ms=$(python3 -c "import json; print(json.load(open('${summary}'))['elapsed_ms'])")
          state=$(python3 -c "import json; print(json.load(open('${summary}'))['overall_state'])")
          mesh=$(python3 -c "import json; print(json.load(open('${summary}'))['mesh_integrated'])")
          evidence=$(python3 -c "import json; print(json.load(open('${summary}'))['evidence_gate_consolidated'])")
          {
            echo "## Main Operational Validation Fast"
            echo "- Script elapsed: \`${script_ms} ms\`"
            echo "- Job step elapsed: \`${job_elapsed}s\`"
            echo "- Overall state: \`${state}\`"
            echo "- Mesh integrated: \`${mesh}\`"
            echo "- Evidence gate consolidated: \`${evidence}\`"
            echo "- Modo: \`lite\` — JSON only, sem pytest/html/analytics"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publicar bundle único
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: main-operational-validation-fast
          path: |
            artifacts/
          compression-level: 0
          if-no-files-found: error
          retention-days: 15
