name: Executive Sync Stability Index Public Smoke Trend Sync

on:
  workflow_run:
    workflows:
      - Executive Sync Stability Index Public Smoke Trend Dashboard
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente alvo
        required: true
        type: choice
        options: [dev, stg, prod]
      base_url:
        description: URL pública do Ops Dashboard
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: executive-sync-stability-index-public-smoke-trend-sync-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  public-smoke-sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      TARGET_BASE_URL: ${{ inputs.base_url || vars.REQSYS_OPS_DASHBOARD_DEV_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile and test
        run: |
          python -m py_compile scripts/smoke_executive_sync_stability_index_public_smoke_trend_sync.py
          python -m unittest tests/test_smoke_executive_sync_stability_index_public_smoke_trend_sync.py

      - name: Recover previous history
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: executive-sync-stability-index-public-smoke-trend-sync.yml
          name: executive-sync-stability-index-public-smoke-trend-sync-history-${{ env.TARGET_ENVIRONMENT }}
          path: artifacts
          branch: main

      - name: Validate public surfaces and synchronization
        run: |
          test -n "$TARGET_BASE_URL"
          python scripts/smoke_executive_sync_stability_index_public_smoke_trend_sync.py \
            --base-url "$TARGET_BASE_URL" \
            --environment "$TARGET_ENVIRONMENT"

      - name: Validate guardrails
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('artifacts/executive-sync-stability-index-public-smoke-trend-sync.json').read_text())
          assert payload['mode'] == 'report-only'
          assert payload['production_blocker'] is False
          assert payload['human_approval_required'] is True
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: executive-sync-stability-index-public-smoke-trend-sync-history-${{ env.TARGET_ENVIRONMENT }}
          path: artifacts/
          retention-days: 90
          if-no-files-found: error
