name: CI Security Deep Scan

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/ci-security.yml"

permissions:
  contents: read

concurrency:
  group: ci-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-router:
    name: Security Router
    runs-on: ubuntu-latest
    outputs:
      run_deep_security: ${{ steps.route.outputs.run_deep_security }}
    steps:
      - name: Definir política de execução
        id: route
        shell: bash
        run: |
          set -euo pipefail
          run_deep_security=false
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            run_deep_security=true
          fi
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'security') }}" == "true" || "${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}" == "true" ]]; then
            run_deep_security=true
          fi
          echo "run_deep_security=$run_deep_security" >> "$GITHUB_OUTPUT"
          echo "Security deep scan: $run_deep_security" >> "$GITHUB_STEP_SUMMARY"

  backend-security:
    name: Backend Security Deep Scan
    runs-on: ubuntu-latest
    needs: security-router
    if: needs.security-router.outputs.run_deep_security == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-audit.txt
      - name: Instalar ferramentas
        run: python -m pip install --upgrade pip pip-audit bandit
      - name: Auditoria de dependências Python
        run: |
          pip-audit -r requirements-audit.txt --no-deps --format json --output /tmp/pip-audit-report.json
          pip-audit -r requirements-audit.txt --no-deps
      - name: Auditoria estática Bandit
        run: bandit -r app/ -ll -x app/tests -f json -o /tmp/bandit-report.json
      - name: Publicar evidências backend security
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-reports
          path: |
            /tmp/pip-audit-report.json
            /tmp/bandit-report.json
          if-no-files-found: ignore
          retention-days: 30

  frontend-security:
    name: Frontend Security Deep Scan
    runs-on: ubuntu-latest
    needs: security-router
    if: needs.security-router.outputs.run_deep_security == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependências
        run: npm ci
      - name: Auditoria npm
        run: npm audit --audit-level=high --json > /tmp/npm-audit-report.json
      - name: Publicar evidências frontend security
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-reports
          path: /tmp/npm-audit-report.json
          if-no-files-found: ignore
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [security-router, backend-security, frontend-security]
    if: always()
    steps:
      - name: Consolidar resultado
        shell: bash
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # CI Security Deep Scan

          | Job | Resultado |
          |---|---:|
          | Router | ${{ needs.security-router.result }} |
          | Backend security | ${{ needs.backend-security.result }} |
          | Frontend security | ${{ needs.frontend-security.result }} |
          EOF
          for result in "${{ needs.backend-security.result }}" "${{ needs.frontend-security.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              exit 1
            fi
          done
