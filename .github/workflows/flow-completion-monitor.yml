name: Flow Completion Monitor

on:
  pull_request:
    paths:
      - "scripts/build_flow_completion_monitor.py"
      - "scripts/collect_flow_completion_evidence.py"
      - "config/flow-completion/**"
      - "tests/test_build_flow_completion_monitor.py"
      - "tests/test_collect_flow_completion_evidence.py"
      - ".github/workflows/flow-completion-monitor.yml"
  workflow_dispatch:
  workflow_run:
    workflows:
      - "CI — ReqSys v2 Enterprise"
      - "Fast CI - Operational Guardrails"
      - "Governança Padrão Ouro"
      - "Fly Environment Homologation Gate"
    types: [completed]
  schedule:
    - cron: "41 * * * *"

permissions:
  actions: read
  contents: read

concurrency:
  group: flow-completion-monitor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GH_TOKEN: ${{ github.token }}
      PROD_BASE_URL: https://reqsys-api.fly.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tests
        run: python -m pip install --disable-pip-version-check pytest
      - name: Validate monitor and collectors
        run: >-
          python -m pytest -q
          tests/test_build_flow_completion_monitor.py
          tests/test_collect_flow_completion_evidence.py
      - name: Collect GitHub Actions runs and artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/flow-completion artifacts/flow-completion-monitor
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=main&per_page=100" > .tmp/flow-completion/runs.json
          echo '{"artifacts":[]}' > .tmp/flow-completion/artifacts.json
          jq -r '.workflow_runs[] | select(.name == "Fly Environment Homologation Gate") | .id' \
            .tmp/flow-completion/runs.json | head -20 | while read -r run_id; do
              [ -n "$run_id" ] || continue
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100" \
                | jq --argjson run_id "$run_id" '.artifacts |= map(. + {workflow_run_id: $run_id})' \
                > ".tmp/flow-completion/artifacts-${run_id}.json"
          done
          python - <<'PY'
          import glob, json
          artifacts = []
          for path in glob.glob('.tmp/flow-completion/artifacts-*.json'):
              artifacts.extend(json.load(open(path, encoding='utf-8')).get('artifacts', []))
          json.dump({'artifacts': artifacts}, open('.tmp/flow-completion/artifacts.json', 'w', encoding='utf-8'), indent=2)
          PY
      - name: Probe production runtime
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          runs = json.loads(Path('.tmp/flow-completion/runs.json').read_text(encoding='utf-8')).get('workflow_runs', [])
          artifacts = json.loads(Path('.tmp/flow-completion/artifacts.json').read_text(encoding='utf-8')).get('artifacts', [])
          prod_run_ids = {int(item.get('workflow_run_id') or 0) for item in artifacts if item.get('name') == 'fly-homologation-prod'}
          prod_runs = [run for run in runs if int(run.get('id') or 0) in prod_run_ids and run.get('conclusion') == 'success']
          latest = max(prod_runs, key=lambda run: run.get('updated_at', ''), default={})
          Path('.tmp/flow-completion/prod-context.json').write_text(json.dumps(latest), encoding='utf-8')
          PY
          python - <<'PY'
          import json, os, urllib.error, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          context = json.loads(Path('.tmp/flow-completion/prod-context.json').read_text(encoding='utf-8'))
          base = os.environ['PROD_BASE_URL'].rstrip('/')
          paths = ['/health', '/api/runtime/health', '/api/runtime/readiness', '/api/runtime/liveness']
          checks = []
          for path in paths:
              url = base + path
              try:
                  with urllib.request.urlopen(url, timeout=12) as response:
                      body = response.read(4096).decode('utf-8', errors='replace')
                      checks.append({'url': url, 'status_code': response.status, 'healthy': response.status == 200, 'body_excerpt': body[:500]})
              except (urllib.error.URLError, TimeoutError, OSError) as exc:
                  checks.append({'url': url, 'status_code': None, 'healthy': False, 'error': str(exc)[:300]})
          payload = {
              'commit_sha': context.get('head_sha'),
              'run_id': context.get('id'),
              'observed_at': datetime.now(timezone.utc).isoformat(),
              'evidence_url': base + '/api/runtime/health',
              'checks': checks,
          }
          Path('.tmp/flow-completion/health.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          PY
      - name: Normalize real evidence
        run: |
          python scripts/collect_flow_completion_evidence.py \
            --runs .tmp/flow-completion/runs.json \
            --artifacts .tmp/flow-completion/artifacts.json \
            --health .tmp/flow-completion/health.json \
            --output .tmp/flow-completion/executions.json
      - name: Build completion report
        run: |
          python scripts/build_flow_completion_monitor.py \
            --definition config/flow-completion/application-delivery.json \
            --executions .tmp/flow-completion/executions.json \
            --output artifacts/flow-completion-monitor/report.json
          cp .tmp/flow-completion/health.json artifacts/flow-completion-monitor/runtime-health.json
      - name: Publish summary
        run: |
          python - <<'PY'
          import json, os
          report = json.load(open('artifacts/flow-completion-monitor/report.json', encoding='utf-8'))
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as out:
              out.write('# Flow Completion Monitor\n\n')
              out.write(f"- Fluxo: **{report['flow']}**\n")
              out.write(f"- Última etapa: **{report['final_environment']} / {report['final_stage']}**\n")
              out.write(f"- Abertos: **{report['summary']['open']}**\n")
              out.write(f"- Concluídos: **{report['summary']['completed']}**\n")
              out.write(f"- Falhos: **{report['summary']['failed']}**\n")
              out.write(f"- Bloqueados: **{report['summary']['blocked']}**\n")
              out.write(f"- Sem atividade: **{report['summary']['stale']}**\n")
              out.write('- Fontes: **GitHub Actions, artifacts Fly e runtime PROD**\n')
              out.write('- Modo: **report-only**\n')
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: reqsys-flow-completion-monitor
          path: artifacts/flow-completion-monitor/
          retention-days: 90
