name: Operational Alert Intelligence

on:
  workflow_run:
    workflows:
      - "Operational Runtime Mesh Hub"
      - "Operational Executive Dashboard Generator"
      - "Operational Data Lake & Historical Intelligence"
      - "Workflow Reliability Analytics"
      - "Operational Stability Score"
      - "CI Incident Intelligence"
      - "Post Merge Operational Summary"
      - "Operational Observability Hub"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: operational-alert-intelligence
  cancel-in-progress: true

jobs:
  governance-gate:
    name: Classificar alerta e suprimir ruído
    runs-on: ubuntu-latest
    outputs:
      should_alert: ${{ steps.govern.outputs.should_alert }}
      alert_level: ${{ steps.govern.outputs.alert_level }}
      alert_type: ${{ steps.govern.outputs.alert_type }}
      noise_level: ${{ steps.govern.outputs.noise_level }}
      action_policy: ${{ steps.govern.outputs.action_policy }}
    steps:
      - name: Avaliar necessidade de alerta
        id: govern
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'manual' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'success' }}
        run: |
          set -euo pipefail
          INFORMATIVE=(
            "Operational Runtime Mesh Hub"
            "Workflow Governance Consolidator"
            "Operational Intelligence Hub"
            "Workflow Reliability Analytics"
            "Operational Stability Score"
            "CI Incident Intelligence"
            "Post Merge Operational Summary"
          )

          ALERT_LEVEL="INFO"
          ALERT_TYPE="OPERATIONAL_SIGNAL"
          NOISE_LEVEL="LOW"
          ACTION_POLICY="OBSERVE"
          SHOULD_ALERT=true

          for item in "${INFORMATIVE[@]}"; do
            if [ "$WORKFLOW_NAME" = "$item" ]; then
              ALERT_TYPE="INFORMATIVE_EVIDENCE"
              NOISE_LEVEL="SUPPRESSED"
              if [ "$WORKFLOW_CONCLUSION" = "success" ] || [ "$WORKFLOW_CONCLUSION" = "cancelled" ]; then
                SHOULD_ALERT=false
              else
                ALERT_LEVEL="LOW"
                ACTION_POLICY="VERIFY_CONTEXT"
              fi
              break
            fi
          done

          if [ "$SHOULD_ALERT" = true ] && [ "$WORKFLOW_CONCLUSION" != "success" ]; then
            ALERT_LEVEL="HIGH"
            ALERT_TYPE="POTENTIAL_REGRESSION"
            ACTION_POLICY="MANUAL_REVIEW_REQUIRED"
          fi

          if [ "$WORKFLOW_CONCLUSION" = "cancelled" ]; then
            ALERT_LEVEL="INFO"
            ALERT_TYPE="CANCELLED_RUN"
            ACTION_POLICY="GOVERNED_SKIP"
            SHOULD_ALERT=false
          fi

          {
            echo "should_alert=${SHOULD_ALERT}"
            echo "alert_level=${ALERT_LEVEL}"
            echo "alert_type=${ALERT_TYPE}"
            echo "noise_level=${NOISE_LEVEL}"
            echo "action_policy=${ACTION_POLICY}"
          } >> "$GITHUB_OUTPUT"

  operational-alert-intelligence:
    runs-on: ubuntu-latest
    needs: governance-gate
    if: needs.governance-gate.outputs.should_alert == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate operational alert intelligence
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'manual' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'success' }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/operational-alert-intelligence
          python scripts/operational_alert_intelligence.py \
            --workflow "${WORKFLOW_NAME}" \
            --conclusion "${WORKFLOW_CONCLUSION}" \
            --branch "${HEAD_BRANCH}" \
            --commit "${HEAD_SHA}" \
            --workflow-url "${WORKFLOW_URL}" \
            --out-dir artifacts/operational-alert-intelligence

      - name: Publish operational alert summary
        run: |
          cat artifacts/operational-alert-intelligence/operational-alert-intelligence.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload operational alert artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operational-alert-intelligence
          path: artifacts/operational-alert-intelligence
          if-no-files-found: error

  skip-noise:
    name: Alerta suprimido (informativo)
    runs-on: ubuntu-latest
    needs: governance-gate
    if: needs.governance-gate.outputs.should_alert != 'true' && github.event_name != 'workflow_dispatch'
    steps:
      - name: Registrar supressão de alerta
        run: |
          echo "## Operational Alert Intelligence — supressão governada" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workflow informativo com conclusão success; alerta não emitido" >> "$GITHUB_STEP_SUMMARY"
          echo "- Classificação: \`governed_skip\`" >> "$GITHUB_STEP_SUMMARY"
