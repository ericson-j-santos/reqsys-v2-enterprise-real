name: Operational Alert Intelligence

on:
  workflow_run:
    workflows:
      - "Operational Realtime Event Mesh"
      - "Live Operational Control Center"
      - "Operational Executive Dashboard Generator"
      - "Operational Data Lake & Historical Intelligence"
      - "Workflow Reliability Analytics"
      - "Operational Stability Score"
      - "CI Incident Intelligence"
    types:
      - completed

jobs:
  operational-alert-intelligence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate operational alert intelligence
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ALERT_LEVEL="INFO"
          ALERT_TYPE="OPERATIONAL_SIGNAL"
          RECOMMENDATION="No intervention required. Keep monitoring operational trend."
          NOISE_LEVEL="LOW"
          ACTION_POLICY="OBSERVE"

          if [ "${WORKFLOW_CONCLUSION}" != "success" ]; then
            ALERT_LEVEL="HIGH"
            ALERT_TYPE="POTENTIAL_REGRESSION"
            RECOMMENDATION="Inspect failed workflow, correlate with recent PRs, avoid retry storms, and preserve mandatory gates."
            NOISE_LEVEL="LOW"
            ACTION_POLICY="MANUAL_REVIEW_REQUIRED"
          fi

          if [ "${WORKFLOW_CONCLUSION}" = "cancelled" ]; then
            ALERT_LEVEL="MEDIUM"
            ALERT_TYPE="CANCELLED_RUN"
            RECOMMENDATION="Confirm whether cancellation was intentional, superseded, or caused by concurrency."
            NOISE_LEVEL="MEDIUM"
            ACTION_POLICY="VERIFY_CONTEXT"
          fi

          cat > operational-alert-intelligence.json <<JSON
{
  "alert_intelligence": "ACTIVE",
  "workflow": "${WORKFLOW_NAME}",
  "conclusion": "${WORKFLOW_CONCLUSION}",
  "branch": "${HEAD_BRANCH}",
  "commit": "${HEAD_SHA}",
  "workflow_url": "${WORKFLOW_URL}",
  "alert_level": "${ALERT_LEVEL}",
  "alert_type": "${ALERT_TYPE}",
  "noise_level": "${NOISE_LEVEL}",
  "action_policy": "${ACTION_POLICY}",
  "recommendation": "${RECOMMENDATION}"
}
JSON

          cat > operational-alert-intelligence.md <<MD
# Operational Alert Intelligence

| Field | Value |
|---|---|
| Workflow | ${WORKFLOW_NAME} |
| Conclusion | ${WORKFLOW_CONCLUSION} |
| Branch | ${HEAD_BRANCH} |
| Commit | ${HEAD_SHA} |
| Alert level | ${ALERT_LEVEL} |
| Alert type | ${ALERT_TYPE} |
| Noise level | ${NOISE_LEVEL} |
| Action policy | ${ACTION_POLICY} |

## Recommendation

${RECOMMENDATION}

## Workflow link

${WORKFLOW_URL}
MD

          cat > operational-alert-intelligence.html <<HTML
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Alert Intelligence</title>
<style>
body{font-family:Arial,sans-serif;background:#020617;color:#e2e8f0;margin:0;padding:24px}
.container{max-width:1400px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.title{font-size:32px;font-weight:bold}
.badge{padding:10px 18px;border-radius:999px;background:#1e3a8a;color:#bfdbfe;font-weight:bold}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:22px}
.label{color:#94a3b8;font-size:14px}.metric{font-size:34px;font-weight:bold;margin-top:10px}.ok{color:#22c55e}.warn{color:#f59e0b}.risk{color:#ef4444}
table{width:100%;border-collapse:collapse;margin-top:18px}th,td{padding:12px;border-bottom:1px solid #1f2937;text-align:left}.section{margin-top:28px}
</style>
</head>
<body>
<div class="container">
<div class="header"><div class="title">Operational Alert Intelligence</div><div class="badge">ACTIVE</div></div>
<div class="grid">
<div class="card"><div class="label">Alert Level</div><div class="metric warn">${ALERT_LEVEL}</div></div>
<div class="card"><div class="label">Alert Type</div><div class="metric ok">${ALERT_TYPE}</div></div>
<div class="card"><div class="label">Noise Level</div><div class="metric ok">${NOISE_LEVEL}</div></div>
<div class="card"><div class="label">Action Policy</div><div class="metric warn">${ACTION_POLICY}</div></div>
</div>
<div class="section">
<h2>Alert Context</h2>
<table><tr><th>Workflow</th><td>${WORKFLOW_NAME}</td></tr><tr><th>Conclusion</th><td>${WORKFLOW_CONCLUSION}</td></tr><tr><th>Branch</th><td>${HEAD_BRANCH}</td></tr><tr><th>Commit</th><td>${HEAD_SHA}</td></tr></table>
</div>
<div class="section"><h2>Recommendation</h2><p>${RECOMMENDATION}</p></div>
</div>
</body>
</html>
HTML

      - name: Publish operational alert summary
        run: |
          cat operational-alert-intelligence.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload operational alert artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operational-alert-intelligence
          path: |
            operational-alert-intelligence.json
            operational-alert-intelligence.md
            operational-alert-intelligence.html
          if-no-files-found: error
