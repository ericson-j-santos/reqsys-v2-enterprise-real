name: ReqSys Single State Consumer Readiness

on:
  pull_request:
    paths:
      - "scripts/validate_reqsys_single_state_consumers.py"
      - "scripts/build_reqsys_single_state_readiness_dashboard.py"
      - "scripts/publish_reqsys_single_state.py"
      - "scripts/build_unified_executive_integration_index.py"
      - "tests/test_validate_reqsys_single_state_consumers.py"
      - "tests/test_build_reqsys_single_state_readiness_dashboard.py"
      - "tests/test_publish_reqsys_single_state.py"
      - "docs/ops-dashboard/data/runtime-executive-index.json"
      - "docs/ops-dashboard/data/merge-intelligence-index.json"
      - ".github/workflows/reqsys-single-state-consumer-readiness.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["ReqSys Single State"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: reqsys-single-state-consumer-readiness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-consumer-readiness:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run focused tests
        run: >-
          python -m pytest -q
          tests/test_validate_reqsys_single_state_consumers.py
          tests/test_build_reqsys_single_state_readiness_dashboard.py
          tests/test_publish_reqsys_single_state.py
      - name: Build deterministic unified source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/reqsys-single-state
          cp docs/ops-dashboard/data/runtime-executive-index.json .tmp/reqsys-single-state/runtime.json 2>/dev/null || echo '{}' > .tmp/reqsys-single-state/runtime.json
          cp docs/ops-dashboard/data/merge-intelligence-index.json .tmp/reqsys-single-state/quality.json 2>/dev/null || echo '{}' > .tmp/reqsys-single-state/quality.json
          echo '{}' > .tmp/reqsys-single-state/parallelism.json
          python scripts/build_unified_executive_integration_index.py \
            --parallelism .tmp/reqsys-single-state/parallelism.json \
            --runtime .tmp/reqsys-single-state/runtime.json \
            --quality .tmp/reqsys-single-state/quality.json \
            --output .tmp/reqsys-single-state/unified-executive-integration-index.json
      - name: Publish canonical contract
        run: |
          python scripts/publish_reqsys_single_state.py \
            --source .tmp/reqsys-single-state/unified-executive-integration-index.json \
            --output .tmp/reqsys-single-state/reqsys-single-state.json
      - name: Validate governed consumers
        run: |
          python scripts/validate_reqsys_single_state_consumers.py \
            --state .tmp/reqsys-single-state/reqsys-single-state.json \
            --report artifacts/reqsys-single-state-consumer-readiness/report.json
      - name: Build executive readiness dashboard
        run: |
          python scripts/build_reqsys_single_state_readiness_dashboard.py \
            --report artifacts/reqsys-single-state-consumer-readiness/report.json \
            --output artifacts/reqsys-single-state-consumer-readiness/index.html
      - name: Add executive summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path("artifacts/reqsys-single-state-consumer-readiness/report.json").read_text(encoding="utf-8"))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as out:
              out.write("# ReqSys Single State Consumer Readiness\n\n")
              out.write(f"- Status: **{report['status']}**\n")
              out.write(f"- Readiness: **{report['readiness_percent']}%**\n")
              out.write(f"- Ready consumers: **{report['ready_consumers']}/{report['total_consumers']}**\n")
              out.write("- Dashboard: **index.html**\n")
              out.write("- Mode: **report-only**\n")
              out.write("- Production blocker: **false**\n")
              out.write(f"- Next safe increment: {report['next_safe_increment']}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: reqsys-single-state-consumer-readiness
          path: artifacts/reqsys-single-state-consumer-readiness/
          retention-days: 90
