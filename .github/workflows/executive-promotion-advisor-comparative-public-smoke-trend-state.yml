name: Executive Promotion Advisor Comparative Public Smoke Trend State

on:
  workflow_run:
    workflows:
      - Executive Promotion Advisor Comparative Public Smoke History
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: executive-promotion-advisor-comparative-public-smoke-trend-state
  cancel-in-progress: false

jobs:
  enrich-state:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile and test
        run: |
          python -m py_compile scripts/enrich_executive_promotion_advisor_comparative_public_smoke_trend.py
          python -m unittest tests/test_enrich_executive_promotion_advisor_comparative_public_smoke_trend.py

      - name: Resolve source run
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            echo "run_id=$SOURCE_RUN_ID" >> "$GITHUB_OUTPUT"
          else
            run_id=$(gh run list \
              --workflow "Executive Promotion Advisor Comparative Public Smoke History" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')
            test -n "$run_id"
            echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download comparative smoke history
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ steps.source.outputs.run_id }}
        run: |
          mkdir -p input/history
          gh run download "$SOURCE_RUN_ID" \
            --name executive-promotion-advisor-comparative-public-smoke-history \
            --dir input/history
          history=$(find input/history -type f -name 'history.json' | head -n 1)
          test -n "$history"
          cp "$history" input/history.json

      - name: Prepare canonical state copies
        run: |
          mkdir -p output
          cp docs/ops-dashboard/data/runtime-executive-index.json output/runtime-executive-index.json
          if [ -f docs/ops-dashboard/data/executive-brief.json ]; then
            cp docs/ops-dashboard/data/executive-brief.json output/executive-brief.json
          elif [ -f docs/executive-brief.json ]; then
            cp docs/executive-brief.json output/executive-brief.json
          else
            echo '{}' > output/executive-brief.json
          fi

      - name: Enrich Estado Unico and Executive Brief
        run: |
          python scripts/enrich_executive_promotion_advisor_comparative_public_smoke_trend.py \
            --history input/history.json \
            --runtime-index output/runtime-executive-index.json \
            --executive-brief output/executive-brief.json

      - name: Validate report-only guardrails
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          key = 'executive_promotion_advisor_comparative_public_smoke_trend'
          runtime = json.loads(Path('output/runtime-executive-index.json').read_text())
          brief = json.loads(Path('output/executive-brief.json').read_text())
          card = runtime['cards'][key]
          assert card['mode'] == 'report-only'
          assert card['production_blocker'] is False
          assert card['human_approval_required'] is True
          assert brief[key]['mode'] == 'report-only'
          assert brief[key]['production_blocker'] is False
          assert brief[key]['human_approval_required'] is True
          PY

      - name: Publish comparative trend state
        uses: actions/upload-artifact@v4
        with:
          name: executive-promotion-advisor-comparative-public-smoke-trend-state
          path: output
          retention-days: 90
          if-no-files-found: error
