name: Teams Notification DEV Import

on:
  workflow_dispatch:
    inputs:
      source_mode:
        description: 'Origem do pacote oficial'
        required: true
        default: export_dev
        type: choice
        options:
          - export_dev
          - artifact
      source_run_id:
        description: 'Run ID do artifact oficial; deixe vazio para capturar/exportar do DEV'
        required: false
        default: ''
        type: string
      artifact_name:
        description: 'Nome do artifact oficial'
        required: true
        default: 'reqsys-teams-notifications-v2-official'
        type: string
      confirmation:
        description: 'Digite IMPORT-REQSYS-TEAMS-V2-DEV'
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: teams-notification-dev-import
  cancel-in-progress: false

jobs:
  import-publish-activate-dev:
    name: Capture, import, publish and activate DEV
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: powerplatform-development
    env:
      SOLUTION_NAME: ReqSysTeamsNotifications
      FLOW_NAME: robo_envia_teamsv2
      ARTIFACT_NAME: ${{ inputs.artifact_name }}
      SOURCE_MODE: ${{ inputs.source_mode }}
      SOURCE_RUN_ID_INPUT: ${{ inputs.source_run_id }}
      POWERPLATFORM_DEV_ENVIRONMENT_URL: ${{ secrets.POWERPLATFORM_DEV_ENVIRONMENT_URL }}
      POWERPLATFORM_APP_ID: ${{ secrets.POWERPLATFORM_APP_ID }}
      POWERPLATFORM_CLIENT_SECRET: ${{ secrets.POWERPLATFORM_CLIENT_SECRET }}
      POWERPLATFORM_TENANT_ID: ${{ secrets.POWERPLATFORM_TENANT_ID }}
    steps:
      - name: Validate confirmation and required configuration
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "$CONFIRMATION" = 'IMPORT-REQSYS-TEAMS-V2-DEV' || {
            echo 'Confirmação inválida; operação DEV bloqueada.' >&2
            exit 1
          }
          for name in \
            POWERPLATFORM_DEV_ENVIRONMENT_URL \
            POWERPLATFORM_APP_ID \
            POWERPLATFORM_CLIENT_SECRET \
            POWERPLATFORM_TENANT_ID; do
            test -n "${!name}" || {
              echo "Secret obrigatório ausente: $name" >&2
              exit 1
            }
          done
          if [ "$SOURCE_MODE" = 'artifact' ]; then
            test -n "$SOURCE_RUN_ID_INPUT" || {
              echo 'source_run_id é obrigatório quando source_mode=artifact.' >&2
              exit 1
            }
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture official package by exporting DEV solution
        if: ${{ inputs.source_mode == 'export_dev' }}
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ secrets.POWERPLATFORM_DEV_ENVIRONMENT_URL }}
          app-id: ${{ secrets.POWERPLATFORM_APP_ID }}
          client-secret: ${{ secrets.POWERPLATFORM_CLIENT_SECRET }}
          tenant-id: ${{ secrets.POWERPLATFORM_TENANT_ID }}
          solution-name: ReqSysTeamsNotifications
          solution-output-file: artifacts/official/ReqSysTeamsNotifications.zip
          managed: false
          overwrite: true

      - name: Capture official package from prior run
        if: ${{ inputs.source_mode == 'artifact' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/official
          gh run download "$SOURCE_RUN_ID_INPUT" \
            --repo "$GITHUB_REPOSITORY" \
            --name "$ARTIFACT_NAME" \
            --dir artifacts/official

      - name: Resolve captured package and source metadata
        id: package
        run: |
          mapfile -t packages < <(find artifacts/official -type f -name '*.zip' -print)
          test "${#packages[@]}" -eq 1 || {
            echo "Esperado exatamente um ZIP oficial; encontrados: ${#packages[@]}" >&2
            exit 1
          }
          if [ "$SOURCE_MODE" = 'export_dev' ]; then
            SOURCE_RUN_ID="$GITHUB_RUN_ID"
          else
            SOURCE_RUN_ID="$SOURCE_RUN_ID_INPUT"
          fi
          echo "solution_file=${packages[0]}" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$SOURCE_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate official package contract
        id: validation
        env:
          SOLUTION_FILE: ${{ steps.package.outputs.solution_file }}
        run: |
          python scripts/validate_powerplatform_solution_zip.py \
            "$SOLUTION_FILE" \
            --expected-solution "$SOLUTION_NAME" \
            --output artifacts/official-validation.json
          echo "sha256=$(python -c "import json; print(json.load(open('artifacts/official-validation.json', encoding='utf-8'))['sha256'])")" >> "$GITHUB_OUTPUT"

      - name: Persist captured official package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            artifacts/official-validation.json
            ${{ steps.package.outputs.solution_file }}
          if-no-files-found: error
          retention-days: 30

      - name: Import and publish solution into Power Platform DEV
        uses: microsoft/powerplatform-actions/import-solution@v1
        with:
          environment-url: ${{ secrets.POWERPLATFORM_DEV_ENVIRONMENT_URL }}
          app-id: ${{ secrets.POWERPLATFORM_APP_ID }}
          client-secret: ${{ secrets.POWERPLATFORM_CLIENT_SECRET }}
          tenant-id: ${{ secrets.POWERPLATFORM_TENANT_ID }}
          solution-file: ${{ steps.package.outputs.solution_file }}
          force-overwrite: false
          publish-changes: true
          use-deployment-settings-file: false
          skip-dependency-check: false

      - name: Activate robo_envia_teamsv2
        run: |
          python scripts/activate_powerautomate_flow.py \
            --environment-url "$POWERPLATFORM_DEV_ENVIRONMENT_URL" \
            --tenant-id "$POWERPLATFORM_TENANT_ID" \
            --client-id "$POWERPLATFORM_APP_ID" \
            --client-secret "$POWERPLATFORM_CLIENT_SECRET" \
            --flow-name "$FLOW_NAME" \
            --output artifacts/flow-activation.json

      - name: Generate governed publication evidence
        env:
          SOURCE_RUN_ID: ${{ steps.package.outputs.source_run_id }}
          CAPTURED_ARTIFACT_NAME: ${{ steps.package.outputs.artifact_name }}
          PACKAGE_SHA256: ${{ steps.validation.outputs.sha256 }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          activation = json.loads(Path('artifacts/flow-activation.json').read_text(encoding='utf-8'))
          evidence = {
              'status': 'published_and_activated_in_dev',
              'solution_name': os.environ['SOLUTION_NAME'],
              'flow_name': os.environ['FLOW_NAME'],
              'target_environment': 'dev',
              'source_mode': os.environ['SOURCE_MODE'],
              'source_run_id': os.environ['SOURCE_RUN_ID'],
              'artifact_name': os.environ['CAPTURED_ARTIFACT_NAME'],
              'sha256': os.environ['PACKAGE_SHA256'],
              'published_at': datetime.now(timezone.utc).isoformat(),
              'publish_changes': True,
              'flow_activation': activation,
              'captured_or_generated': [
                  'solution.xml',
                  'customizations.xml',
                  'Workflows/',
                  'source_run_id',
                  'artifact_name',
                  'confirmation',
              ],
              'secrets_consumed_without_persistence': [
                  'POWERPLATFORM_DEV_ENVIRONMENT_URL',
                  'POWERPLATFORM_APP_ID',
                  'POWERPLATFORM_CLIENT_SECRET',
                  'POWERPLATFORM_TENANT_ID',
              ],
              'next_validation': [
                  'real Teams desktop/mobile smoke test',
                  'correlation_id and fallback validation',
                  'rollback verification to robo_envia_teamsv1',
              ],
          }
          Path('artifacts/dev-publication-evidence.json').write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          PY

      - name: Upload DEV publication evidence
        uses: actions/upload-artifact@v4
        with:
          name: reqsys-teams-v2-dev-publication-evidence
          path: |
            artifacts/official-validation.json
            artifacts/flow-activation.json
            artifacts/dev-publication-evidence.json
          if-no-files-found: error
          retention-days: 90
