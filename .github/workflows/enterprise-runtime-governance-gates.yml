name: Enterprise Runtime Governance Gates

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: enterprise-runtime-governance-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enterprise-runtime-governance:
    name: Enterprise Runtime Governance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Executar gates preventivos enterprise
        run: |
          set -euo pipefail
          python3 scripts/governance/enterprise_runtime_governance_gates.py

      - name: Publicar evidência Enterprise Runtime Governance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-runtime-governance
          path: artifacts/enterprise-runtime-governance
          if-no-files-found: error
          retention-days: 30
