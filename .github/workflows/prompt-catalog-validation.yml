name: Prompt Catalog Validation

on:
  pull_request:
    paths:
      - "docs/prompts/**"
      - "backend/app/api/__init__.py"
      - "backend/app/api/prompt_development_coordinator.py"
      - "backend/app/services/development_prompt_coordinator.py"
      - "backend/tests/test_development_prompt_coordinator.py"
      - "backend/tests/test_prompt_development_coordinator_api.py"
      - "scripts/validate_prompt_catalog.py"
      - ".github/workflows/prompt-catalog-validation.yml"
  push:
    branches: [main]
    paths:
      - "docs/prompts/**"
      - "backend/app/api/__init__.py"
      - "backend/app/api/prompt_development_coordinator.py"
      - "backend/app/services/development_prompt_coordinator.py"
      - "backend/tests/test_development_prompt_coordinator.py"
      - "backend/tests/test_prompt_development_coordinator_api.py"
      - "scripts/validate_prompt_catalog.py"
      - ".github/workflows/prompt-catalog-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prompt-catalog-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate prompt catalog and API
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --disable-pip-version-check -r backend/requirements.txt

      - name: Validate machine-readable catalog
        run: python scripts/validate_prompt_catalog.py

      - name: Smoke import coordinator API
        run: |
          python -c "from app.api.prompt_development_coordinator import router; assert len(router.routes) == 2"

      - name: Run coordinator tests
        run: |
          python -m pytest -q --noconftest \
            backend/tests/test_development_prompt_coordinator.py \
            backend/tests/test_prompt_development_coordinator_api.py

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Prompt Catalog Validation"
            echo "- Catálogo: \`docs/prompts/catalog.json\`"
            echo "- Serviço: \`backend/app/services/development_prompt_coordinator.py\`"
            echo "- API: \`backend/app/api/prompt_development_coordinator.py\`"
            echo "- Resultado: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"
