name: PR CI Watch

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows:
      - CI — ReqSys v2 Enterprise
      - CI Enterprise Fast
      - Governance Quality Gates
      - Governança Padrão Ouro
      - PR Conflict Guard
      - Branch Protection Audit
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número do PR a validar"
        required: true
        type: string
      sha:
        description: "Head SHA do PR"
        required: true
        type: string
      comment:
        description: "Comentar diagnóstico no PR"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  pull-requests: read
  issues: write

concurrency:
  group: pr-ci-watch-${{ github.event.pull_request.number || github.event.workflow_run.head_sha || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-ci-watch:
    name: PR CI Watch seguro
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      REPORT_DIR: artifacts/pr-ci-watch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolver contexto
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${REPORT_DIR}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=pull_request" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.event.inputs.sha }}" >> "$GITHUB_OUTPUT"
            echo "comment=${{ github.event.inputs.comment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            SHA="${{ github.event.workflow_run.head_sha }}"

            if [ -z "${PR_NUMBER}" ] || [ "${PR_NUMBER}" = "null" ]; then
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "reason=workflow_run_without_pull_request" >> "$GITHUB_OUTPUT"
              echo "pr_number=0" >> "$GITHUB_OUTPUT"
              echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
              echo "comment=false" >> "$GITHUB_OUTPUT"
              cat > "${REPORT_DIR}/pr-ci-watch.json" << JSON
          {
            "status": "skipped",
            "reason": "workflow_run_without_pull_request",
            "workflow_run_id": "${{ github.event.workflow_run.id }}",
            "workflow_name": "${{ github.event.workflow_run.name }}",
            "sha": "${SHA}"
          }
          JSON
              cat > "${REPORT_DIR}/pr-ci-watch.md" << MD
          # PR CI Watch

          | Campo | Valor |
          |---|---|
          | Status | \`skipped\` |
          | Motivo | \`workflow_run_without_pull_request\` |
          | Workflow | \`${{ github.event.workflow_run.name }}\` |
          | SHA | \`${SHA}\` |

          Execução ignorada de forma segura porque o \`workflow_run\` não está associado a um PR.
          MD
            else
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              echo "reason=workflow_run_with_pull_request" >> "$GITHUB_OUTPUT"
              echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
              echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
              echo "comment=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=unsupported_event" >> "$GITHUB_OUTPUT"
            echo "pr_number=0" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "comment=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.ctx.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Executar PR CI Watch
        if: steps.ctx.outputs.enabled == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          COMMENT_FLAG=""
          if [ "${{ steps.ctx.outputs.comment }}" = "true" ]; then
            COMMENT_FLAG="--comment"
          fi

          python scripts/pr_ci_watch.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ steps.ctx.outputs.pr_number }}" \
            --sha "${{ steps.ctx.outputs.sha }}" \
            --report-dir "${REPORT_DIR}" \
            --exclude-run-id "${GITHUB_RUN_ID}" \
            ${COMMENT_FLAG}

      - name: Publicar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ci-watch-report
          path: artifacts/pr-ci-watch
          if-no-files-found: error
          retention-days: 15
