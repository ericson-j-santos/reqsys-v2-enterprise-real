name: PR CI Watch

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Número do PR a validar"
        required: true
        type: string
      sha:
        description: "Head SHA do PR"
        required: true
        type: string
      comment:
        description: "Comentar diagnóstico no PR"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read
  issues: write

concurrency:
  group: pr-ci-watch-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  watch:
    name: PR CI Watch governado
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPORT_DIR: artifacts/pr-ci-watch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolver contexto
        id: ctx
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.inputs.pr_number || github.event.pull_request.number || '' }}"
          SHA="${{ github.event.inputs.sha || github.event.pull_request.head.sha || github.event.workflow_run.head_sha || '' }}"
          COMMENT="${{ github.event.inputs.comment || 'false' }}"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "comment=${COMMENT}" >> "$GITHUB_OUTPUT"

          if [ -z "${PR_NUMBER}" ] || [ -z "${SHA}" ]; then
            echo "PR number ou SHA ausente. Em workflow_run sem PR explícito, execute manualmente com inputs." >&2
            exit 0
          fi

      - name: Executar watcher
        if: steps.ctx.outputs.pr_number != '' && steps.ctx.outputs.sha != ''
        shell: bash
        run: |
          set -euo pipefail
          COMMENT_FLAG=""
          if [ "${{ steps.ctx.outputs.comment }}" = "true" ]; then
            COMMENT_FLAG="--comment"
          fi

          python scripts/pr_ci_watch.py \
            --repo "${{ github.repository }}" \
            --pr-number "${{ steps.ctx.outputs.pr_number }}" \
            --sha "${{ steps.ctx.outputs.sha }}" \
            --report-dir "${REPORT_DIR}" \
            ${COMMENT_FLAG}

      - name: Publicar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ci-watch-report
          path: artifacts/pr-ci-watch
          if-no-files-found: ignore
          retention-days: 15
