name: Cofre Runtime Evidence Gate

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente para validação runtime do Cofre
        required: true
        type: choice
        options:
          - dev
          - stg
      timeout_seconds:
        description: Timeout HTTP por chamada
        required: true
        type: string
        default: "20"
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      timeout_seconds:
        required: false
        type: string
        default: "20"
    secrets:
      COFRE_ADMIN_JWT:
        required: true
      FLY_API_TOKEN:
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: cofre-runtime-evidence-${{ inputs.environment }}
  cancel-in-progress: false

env:
  ARTIFACT_DIR: artifacts/cofre-runtime-evidence
  STATE_FILE: ${{ runner.temp }}/cofre-runtime-state.json
  CORRELATION_ID: cofre-runtime-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.environment }}

jobs:
  validate-inputs:
    name: Validar contrato do gate
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.resolve.outputs.base_url }}
      fly_app: ${{ steps.resolve.outputs.fly_app }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
    steps:
      - name: Resolver ambiente permitido
        id: resolve
        env:
          TARGET_ENV: ${{ inputs.environment }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        run: |
          set -euo pipefail
          case "$TARGET_ENV" in
            dev)
              echo "base_url=https://reqsys-api-dev.fly.dev" >> "$GITHUB_OUTPUT"
              echo "fly_app=reqsys-api-dev" >> "$GITHUB_OUTPUT"
              echo "github_environment=development" >> "$GITHUB_OUTPUT"
              ;;
            stg)
              echo "base_url=https://reqsys-api-stg.fly.dev" >> "$GITHUB_OUTPUT"
              echo "fly_app=reqsys-api-stg" >> "$GITHUB_OUTPUT"
              echo "github_environment=staging" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Somente dev e stg são permitidos. Produção é bloqueada por contrato." >&2
              exit 1
              ;;
          esac
          if ! [[ "$TIMEOUT_SECONDS" =~ ^[0-9]+$ ]] || [ "$TIMEOUT_SECONDS" -lt 1 ] || [ "$TIMEOUT_SECONDS" -gt 120 ]; then
            echo "timeout_seconds deve estar entre 1 e 120." >&2
            exit 1
          fi

  runtime-evidence:
    name: Evidência Cofre ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: validate-inputs
    timeout-minutes: 20
    environment:
      name: ${{ needs.validate-inputs.outputs.github_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preparar diretório de evidências
        run: mkdir -p "$ARTIFACT_DIR"

      - name: Validar ciclo antes do restart
        env:
          COFRE_ADMIN_JWT: ${{ secrets.COFRE_ADMIN_JWT }}
          BASE_URL: ${{ needs.validate-inputs.outputs.base_url }}
          TARGET_ENV: ${{ inputs.environment }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        run: |
          set -euo pipefail
          python scripts/cofre_runtime_evidence.py \
            --phase before-restart \
            --base-url "$BASE_URL" \
            --environment "$TARGET_ENV" \
            --correlation-id "$CORRELATION_ID" \
            --state-file "$STATE_FILE" \
            --evidence-file "$ARTIFACT_DIR/before-restart.json" \
            --timeout "$TIMEOUT_SECONDS"

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Reiniciar runtime de forma controlada
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ needs.validate-inputs.outputs.fly_app }}
        run: |
          set -euo pipefail
          mapfile -t machine_ids < <(flyctl machines list --app "$FLY_APP" --json | python -c 'import json,sys; print("\n".join(m["id"] for m in json.load(sys.stdin) if m.get("state") != "destroyed"))')
          if [ "${#machine_ids[@]}" -eq 0 ]; then
            echo "Nenhuma máquina ativa encontrada para $FLY_APP." >&2
            exit 1
          fi
          for machine_id in "${machine_ids[@]}"; do
            flyctl machine restart "$machine_id" --app "$FLY_APP"
          done
          flyctl status --app "$FLY_APP"

      - name: Aguardar readiness após restart
        env:
          BASE_URL: ${{ needs.validate-inputs.outputs.base_url }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --max-time 10 "$BASE_URL/api/runtime/readiness" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Runtime não ficou ready após restart." >&2
          exit 1

      - name: Validar persistência e cleanup
        env:
          COFRE_ADMIN_JWT: ${{ secrets.COFRE_ADMIN_JWT }}
          BASE_URL: ${{ needs.validate-inputs.outputs.base_url }}
          TARGET_ENV: ${{ inputs.environment }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
        run: |
          set -euo pipefail
          python scripts/cofre_runtime_evidence.py \
            --phase after-restart \
            --base-url "$BASE_URL" \
            --environment "$TARGET_ENV" \
            --correlation-id "$CORRELATION_ID" \
            --state-file "$STATE_FILE" \
            --evidence-file "$ARTIFACT_DIR/after-restart.json" \
            --timeout "$TIMEOUT_SECONDS"

      - name: Consolidar evidência sanitizada
        if: always()
        env:
          TARGET_ENV: ${{ inputs.environment }}
          BASE_URL: ${{ needs.validate-inputs.outputs.base_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path

          root = Path(os.environ["ARTIFACT_DIR"])
          phases = {}
          for name in ("before-restart", "after-restart"):
              path = root / f"{name}.json"
              if path.exists():
                  phases[name] = json.loads(path.read_text(encoding="utf-8"))
          ok = len(phases) == 2 and all(item.get("ok") is True for item in phases.values())
          payload = {
              "schema_version": "1.0.0",
              "contract": "reqsys-cofre-runtime-evidence-summary",
              "ok": ok,
              "environment": os.environ["TARGET_ENV"],
              "base_url": os.environ["BASE_URL"],
              "restart_runtime": True,
              "workflow_sha": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "correlation_id": os.environ["CORRELATION_ID"],
              "generated_at_epoch": int(time.time()),
              "phases": phases,
              "sensitive_values_exposed": False,
          }
          (root / "summary.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          if not ok:
              raise SystemExit("Evidência consolidada incompleta ou com falha")
          PY

      - name: Remover estado sensível residual
        if: always()
        run: rm -f "$STATE_FILE"

      - name: Upload das evidências
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cofre-runtime-evidence-${{ inputs.environment }}-${{ github.run_id }}
          path: artifacts/cofre-runtime-evidence/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Resumo do gate
        if: always()
        run: |
          {
            echo "## Cofre Runtime Evidence Gate"
            echo "- Ambiente: \`${{ inputs.environment }}\`"
            echo "- Runtime: \`${{ needs.validate-inputs.outputs.fly_app }}\`"
            echo "- Correlation ID: \`$CORRELATION_ID\`"
            echo "- Evidência: \`cofre-runtime-evidence-${{ inputs.environment }}-${{ github.run_id }}\`"
            echo "- Valores sensíveis publicados: **não**"
          } >> "$GITHUB_STEP_SUMMARY"
