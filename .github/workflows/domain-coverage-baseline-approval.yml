name: Domain Coverage Baseline Approval

on:
  pull_request:
    branches: [main]
    paths:
      - "config/domain-coverage-policy.json"
      - "docs/ops-dashboard/data/domain-coverage-baseline-diff.json"
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  scope-router:
    name: Detectar alteração de baseline
    runs-on: ubuntu-latest
    outputs:
      run_gate: ${{ steps.scope.outputs.run_gate }}
    steps:
      - name: Verificar arquivos alterados no PR
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "run_gate=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_GATE="$(gh api \
            --repo "${{ github.repository }}" \
            --paginate \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '[.[].filename | select(
              . == "config/domain-coverage-policy.json" or
              . == "docs/ops-dashboard/data/domain-coverage-baseline-diff.json"
            )] | length > 0')"

          echo "run_gate=${RUN_GATE}" >> "$GITHUB_OUTPUT"

  validate-approved-baseline:
    name: Validar baseline aprovado
    needs: scope-router
    if: needs.scope-router.outputs.run_gate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Validar escopo e política
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          policy_path = Path('config/domain-coverage-policy.json')
          diff_path = Path('docs/ops-dashboard/data/domain-coverage-baseline-diff.json')

          assert policy_path.is_file(), f'política ausente: {policy_path}'
          assert diff_path.is_file(), f'evidência de diff ausente: {diff_path}'

          policy = json.loads(policy_path.read_text(encoding='utf-8'))
          diff = json.loads(diff_path.read_text(encoding='utf-8'))

          assert policy.get('mode') == 'regression_gate', 'modo regression_gate não ativado'
          assert policy.get('baseline'), 'baseline não pode ser vazio'
          assert diff.get('requires_human_approval') is True, 'diff deve exigir aprovação humana'
          assert set(policy['baseline']) == set(policy.get('domains', {})), 'baseline incompleto'
          for name, value in policy['baseline'].items():
              assert 0.0 <= float(value) <= 100.0, f'baseline inválido para {name}'
          PY

      - name: Exigir revisão APPROVED
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          APPROVALS="$(gh api \
            --repo "${{ github.repository }}" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')"
          echo "Aprovações encontradas: ${APPROVALS}"
          test "${APPROVALS}" -ge 1

      - name: Resumo
        if: always()
        run: |
          echo "## Domain Coverage Baseline Approval" >> "$GITHUB_STEP_SUMMARY"
          echo "A substituição do baseline exige política válida e ao menos uma revisão APPROVED." >> "$GITHUB_STEP_SUMMARY"
