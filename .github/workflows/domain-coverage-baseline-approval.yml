name: Domain Coverage Baseline Approval

on:
  pull_request:
    branches: [main]
    paths:
      - "config/domain-coverage-policy.json"
      - "docs/ops-dashboard/data/domain-coverage-baseline-diff.json"
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-approved-baseline:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Verificar escopo do baseline
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          CHANGED_FILES="$(gh api \
            --repo "${{ github.repository }}" \
            --paginate \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[].filename')"

          if grep -Fxq "config/domain-coverage-policy.json" <<<"${CHANGED_FILES}" || \
             grep -Fxq "docs/ops-dashboard/data/domain-coverage-baseline-diff.json" <<<"${CHANGED_FILES}"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "PR sem alteração de baseline; validação não aplicável."
          fi

      - name: Validar escopo e política
        if: steps.scope.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          policy_path = Path('config/domain-coverage-policy.json')
          diff_path = Path('docs/ops-dashboard/data/domain-coverage-baseline-diff.json')

          assert policy_path.is_file(), 'política de cobertura ausente'
          assert diff_path.is_file(), 'diff do baseline ausente'

          policy = json.loads(policy_path.read_text(encoding='utf-8'))
          diff = json.loads(diff_path.read_text(encoding='utf-8'))

          assert policy.get('mode') == 'regression_gate', 'modo regression_gate não ativado'
          assert policy.get('baseline'), 'baseline não pode ser vazio'
          assert diff.get('requires_human_approval') is True, 'diff deve exigir aprovação humana'
          assert set(policy['baseline']) == set(policy.get('domains', {})), 'baseline incompleto'
          for name, value in policy['baseline'].items():
              assert 0.0 <= float(value) <= 100.0, f'baseline inválido para {name}'
          PY

      - name: Exigir revisão APPROVED
        if: steps.scope.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          APPROVALS="$(gh api \
            --repo "${{ github.repository }}" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')"
          echo "Aprovações encontradas: ${APPROVALS}"
          test "${APPROVALS}" -ge 1

      - name: Resumo
        if: always()
        run: |
          echo "## Domain Coverage Baseline Approval" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.scope.outputs.relevant }}" == "true" ]]; then
            echo "A substituição do baseline exige política válida e ao menos uma revisão APPROVED." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Validação não aplicável: o PR não altera os arquivos governados de baseline." >> "$GITHUB_STEP_SUMMARY"
          fi
