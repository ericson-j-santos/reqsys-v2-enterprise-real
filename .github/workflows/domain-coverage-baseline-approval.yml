name: Domain Coverage Baseline Approval

on:
  pull_request:
    branches: [main]
    paths:
      - "config/domain-coverage-policy.json"
      - "docs/ops-dashboard/data/domain-coverage-baseline-diff.json"
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-approved-baseline:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    env:
      DOMAIN_COVERAGE_POLICY_PATH: config/domain-coverage-policy.json
      DOMAIN_COVERAGE_BASELINE_DIFF_PATH: docs/ops-dashboard/data/domain-coverage-baseline-diff.json
    steps:
      - name: Detectar escopo governado
        id: scope
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          PR_FILES="$(mktemp)"
          gh api \
            --repo "${{ github.repository }}" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --paginate \
            --jq '.[].filename' > "${PR_FILES}"
          GOVERNED_MATCHES="$(grep -Fx -e "${DOMAIN_COVERAGE_POLICY_PATH}" -e "${DOMAIN_COVERAGE_BASELINE_DIFF_PATH}" "${PR_FILES}" || true)"
          rm -f "${PR_FILES}"

          if [[ -n "${GOVERNED_MATCHES}" ]]; then
            echo "requires_approval=true" >> "$GITHUB_OUTPUT"
            {
              echo "governed_files<<EOF"
              printf '%s\n' "${GOVERNED_MATCHES}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "requires_approval=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR
        if: steps.scope.outputs.requires_approval == 'true'
        uses: actions/checkout@v4

      - name: Validar escopo e política
        if: steps.scope.outputs.requires_approval == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(Path(os.environ['DOMAIN_COVERAGE_POLICY_PATH']).read_text(encoding='utf-8'))
          diff = json.loads(Path(os.environ['DOMAIN_COVERAGE_BASELINE_DIFF_PATH']).read_text(encoding='utf-8'))

          assert policy.get('mode') == 'regression_gate', 'modo regression_gate não ativado'
          assert policy.get('baseline'), 'baseline não pode ser vazio'
          assert diff.get('requires_human_approval') is True, 'diff deve exigir aprovação humana'
          assert set(policy['baseline']) == set(policy.get('domains', {})), 'baseline incompleto'
          for name, value in policy['baseline'].items():
              assert 0.0 <= float(value) <= 100.0, f'baseline inválido para {name}'
          PY

      - name: Exigir revisão APPROVED
        if: steps.scope.outputs.requires_approval == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          APPROVALS="$(gh api \
            --repo "${{ github.repository }}" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')"
          echo "Aprovações encontradas: ${APPROVALS}"
          test "${APPROVALS}" -ge 1

      - name: Resumo
        if: always()
        env:
          GOVERNED_FILES: ${{ steps.scope.outputs.governed_files }}
        run: |
          echo "## Domain Coverage Baseline Approval" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.scope.outputs.requires_approval }}" == "true" ]]; then
            echo "Arquivos governados detectados:" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            echo "${GOVERNED_FILES}" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "A substituição do baseline exige política válida e ao menos uma revisão APPROVED." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Nenhuma alteração de baseline por domínio foi detectada neste PR; validação ignorada." >> "$GITHUB_STEP_SUMMARY"
          fi
