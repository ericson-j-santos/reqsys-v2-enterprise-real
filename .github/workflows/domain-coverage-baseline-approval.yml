name: Domain Coverage Baseline Approval

on:
  pull_request:
    branches: [main]
    paths:
      - "config/domain-coverage-policy.json"
      - "docs/ops-dashboard/data/domain-coverage-baseline-diff.json"
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-approved-baseline:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.pull_request.base.ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Verificar arquivos alterados no PR
        id: check_files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          # Para pull_request, o trigger já tem filtro de paths — só dispara quando os
          # arquivos de cobertura mudam, portanto a validação é sempre pertinente.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Para pull_request_review os filtros de paths não se aplicam; verificamos
          # manualmente se o PR toca algum dos arquivos de governança de cobertura.
          # Os caminhos abaixo devem ser mantidos sincronizados com o filtro on.pull_request.paths.
          CHANGED="$(gh api \
            --repo "${{ github.repository }}" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '[.[].filename] | map(select(. == "config/domain-coverage-policy.json" or . == "docs/ops-dashboard/data/domain-coverage-baseline-diff.json")) | length')"
          if [[ "${CHANGED}" -gt 0 ]]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "PR não altera arquivos de cobertura — validação ignorada." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout PR
        if: steps.check_files.outputs.relevant == 'true'
        uses: actions/checkout@v4

      - name: Validar escopo e política
        if: steps.check_files.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(Path('config/domain-coverage-policy.json').read_text(encoding='utf-8'))
          diff = json.loads(Path('docs/ops-dashboard/data/domain-coverage-baseline-diff.json').read_text(encoding='utf-8'))

          assert policy.get('mode') == 'regression_gate', 'modo regression_gate não ativado'
          assert policy.get('baseline'), 'baseline não pode ser vazio'
          assert diff.get('requires_human_approval') is True, 'diff deve exigir aprovação humana'
          assert set(policy['baseline']) == set(policy.get('domains', {})), 'baseline incompleto'
          for name, value in policy['baseline'].items():
              assert 0.0 <= float(value) <= 100.0, f'baseline inválido para {name}'
          PY

      - name: Exigir revisão APPROVED
        if: steps.check_files.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          APPROVALS="$(gh api \
            --repo "${{ github.repository }}" \
            "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')"
          echo "Aprovações encontradas: ${APPROVALS}"
          test "${APPROVALS}" -ge 1

      - name: Resumo
        if: always()
        run: |
          echo "## Domain Coverage Baseline Approval" >> "$GITHUB_STEP_SUMMARY"
          echo "A substituição do baseline exige política válida e ao menos uma revisão APPROVED." >> "$GITHUB_STEP_SUMMARY"
