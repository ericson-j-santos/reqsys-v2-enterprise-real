name: User Experience Confidence Dashboard Reliability Card

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/inject_user_experience_confidence_dashboard_reliability_card.py'
      - 'scripts/smoke_user_experience_confidence_dashboard_reliability_card.py'
      - 'tests/test_user_experience_confidence_dashboard_reliability_card.py'
      - '.github/workflows/user-experience-confidence-dashboard-reliability-card.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/inject_user_experience_confidence_dashboard_reliability_card.py'
      - 'scripts/smoke_user_experience_confidence_dashboard_reliability_card.py'
      - 'tests/test_user_experience_confidence_dashboard_reliability_card.py'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile
        run: |
          python -m py_compile scripts/inject_user_experience_confidence_dashboard_reliability_card.py
          python -m py_compile scripts/smoke_user_experience_confidence_dashboard_reliability_card.py
      - name: Tests
        run: python -m unittest tests/test_user_experience_confidence_dashboard_reliability_card.py
      - name: Build governed evidence
        run: |
          mkdir -p artifacts
          cat > artifacts/state.json <<'JSON'
          {"cards":{"user_experience_sync_confidence_availability":{"status":"UX_CONFIDENCE_CARD_AVAILABILITY_STABLE","availability_rate":100.0,"stable_sequence":3,"sample_count":3,"confidence_score":100,"common_fingerprint":"abc","recurring_drift":false,"human_review_eligible":true,"mode":"report-only","production_blocker":false,"human_approval_required":true}}}
          JSON
          cat > artifacts/brief.json <<'JSON'
          {"indicators":{"user_experience_sync_confidence_availability":{"status":"UX_CONFIDENCE_CARD_AVAILABILITY_STABLE","availability_rate":100.0,"stable_sequence":3,"sample_count":3,"confidence_score":100,"common_fingerprint":"abc","recurring_drift":false,"human_review_eligible":true,"mode":"report-only","production_blocker":false,"human_approval_required":true}}}
          JSON
          echo '{"cards":[]}' > artifacts/dashboard-input.json
          python scripts/inject_user_experience_confidence_dashboard_reliability_card.py --dashboard artifacts/dashboard-input.json --indicator artifacts/brief.json --output artifacts/dashboard.json
          python scripts/smoke_user_experience_confidence_dashboard_reliability_card.py --state artifacts/state.json --brief artifacts/brief.json --dashboard artifacts/dashboard.json --output artifacts/smoke.json
      - uses: actions/upload-artifact@v4
        with:
          name: ux-confidence-dashboard-reliability-card
          path: artifacts/
          retention-days: 90
