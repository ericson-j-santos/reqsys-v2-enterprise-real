name: Governed PR Automation

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Numero do PR a validar"
        required: true
        type: string
      execute_merge:
        description: "Executar merge se todos os gates passarem"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      required_label:
        description: "Label obrigatoria para autorizar merge governado"
        required: true
        default: "governed-merge-approved"
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  issues: read
  actions: read

env:
  PYTHONPATH: ${{ github.workspace }}
  REQUIRED_WORKFLOWS: >-
    CI Enterprise Fast
    CI — ReqSys v2 Enterprise
    Governance Quality Gates
    Governança Padrão Ouro
    Branch Protection Audit
    PR Conflict Guard
    Governed Merge Queue

concurrency:
  group: governed-pr-automation-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  increment-gate-on-open:
    name: Increment gate — abertura de PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Avaliar increment gate do PR
        id: gate
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/governed-pr-increment-gate artifacts/coordenador-status

          set +e
          python scripts/coordenador_status_consolidator.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${BASE_BRANCH}" \
            --output-dir artifacts/coordenador-status
          consolidator_code=$?

          if [[ ! -f artifacts/coordenador-status/coordenador-status.json ]]; then
            cat > artifacts/coordenador-status/coordenador-status.json <<'JSON'
          {
            "state": "unknown",
            "decision": "increment_gate_advisory_fallback",
            "increment_gate": {
              "new_front_allowed": false,
              "blockers": ["coordenador_status_unavailable"],
              "allowed_increment_types": ["gap_fix", "hotfix", "consolidate", "close_duplicate"]
            },
            "recommended_actions": []
          }
          JSON
          fi

          python scripts/governed_pr_increment_gate.py \
            --title "${PR_TITLE}" \
            --body "${PR_BODY}" \
            --labels "${PR_LABELS}" \
            --head-ref "${HEAD_REF}" \
            --pr-number "${PR_NUMBER}" \
            --status-json artifacts/coordenador-status/coordenador-status.json \
            --output-dir artifacts/governed-pr-increment-gate \
            --json | tee artifacts/governed-pr-increment-gate/decision.json
          gate_code=${PIPESTATUS[0]}
          set -e

          if [[ ! -f artifacts/governed-pr-increment-gate/decision.json ]]; then
            cat > artifacts/governed-pr-increment-gate/decision.json <<JSON
          {
            "allowed": false,
            "reason": "increment_gate_execution_failed",
            "detail": "Governed PR Automation open gate falhou antes de produzir decision.json.",
            "increment_type": "unknown",
            "new_front_allowed": false,
            "blockers": ["increment_gate_execution_failed"],
            "allowed_increment_types": ["gap_fix", "hotfix", "consolidate", "close_duplicate"],
            "pr_number": ${PR_NUMBER},
            "consolidator_exit_code": ${consolidator_code},
            "gate_exit_code": ${gate_code}
          }
          JSON
          fi

          echo "exit_code=${gate_code}" >> "$GITHUB_OUTPUT"
          allowed=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/decision.json')).get('allowed'))")
          reason=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/decision.json')).get('reason'))")
          increment_type=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/decision.json')).get('increment_type'))")
          echo "allowed=${allowed}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "increment_type=${increment_type}" >> "$GITHUB_OUTPUT"

      - name: Resumo executivo
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f artifacts/governed-pr-increment-gate/decision.json ]]; then
            {
              echo "## Governed PR Automation — Increment Gate"
              echo ""
              echo "| Campo | Valor |"
              echo "|---|---|"
              echo "| PR | #${{ github.event.pull_request.number }} |"
              echo "| Allowed | \`${{ steps.gate.outputs.allowed }}\` |"
              echo "| Reason | \`${{ steps.gate.outputs.reason }}\` |"
              echo "| Increment type | \`${{ steps.gate.outputs.increment_type }}\` |"
              echo "| Mode | \`advisory-on-open\` |"
              echo ""
              echo "O gate de abertura é advisory para não contaminar checks de PRs seguros. O bloqueio obrigatório permanece no caminho workflow_dispatch de merge governado."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comentar bloqueio no PR
        if: steps.gate.outputs.exit_code != '0' && hashFiles('artifacts/governed-pr-increment-gate/decision.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const decision = JSON.parse(
              fs.readFileSync('artifacts/governed-pr-increment-gate/decision.json', 'utf8')
            );
            const blockers = (decision.blockers || []).join(', ') || 'nenhum';
            const allowedTypes = (decision.allowed_increment_types || []).join(', ') || 'nenhum';
            const actions = (decision.recommended_actions || [])
              .slice(0, 5)
              .map((item) => `- **${item.priority}** ${item.action}: ${item.detail}`)
              .join('\n');
            const body = [
              '## Governed PR Automation — abertura em modo advisory',
              '',
              `**Motivo:** \`${decision.reason}\``,
              '',
              decision.detail || '',
              '',
              `- \`new_front_allowed\`: \`${decision.new_front_allowed}\``,
              `- Tipo inferido: \`${decision.increment_type}\` (${decision.inference?.inference_source || 'n/a'})`,
              `- Blockers: \`${blockers}\``,
              `- Tipos permitidos agora: \`${allowedTypes}\``,
              '',
              'Este gate não falha o status de abertura do PR. O bloqueio obrigatório segue no fluxo `workflow_dispatch` de merge governado.',
              '',
              '### Proximas acoes sugeridas',
              actions || '- Consultar artifact `governed-pr-increment-gate-evidence`',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Publicar artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governed-pr-increment-gate-evidence
          path: artifacts/governed-pr-increment-gate
          if-no-files-found: warn
          retention-days: 14

      - name: Registrar resultado advisory
        if: steps.gate.outputs.exit_code != '0'
        run: |
          echo "Abertura de PR sinalizada pelo increment gate, mas mantida como advisory."
          echo "O bloqueio obrigatório permanece no workflow_dispatch de merge governado."

  governed-pr-check:
    name: Validate governed PR merge readiness
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar increment gate do PR (merge path)
        id: increment_gate
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/governed-pr-increment-gate
          PR_JSON=$(gh pr view "$PR_NUMBER" --json title,body,labels,headRefName,baseRefName,number)
          echo "$PR_JSON" > artifacts/governed-pr-increment-gate/pr.json
          BASE_BRANCH=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/pr.json'))['baseRefName'])")
          python scripts/coordenador_status_consolidator.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${BASE_BRANCH}" \
            --output-dir artifacts/coordenador-status
          TITLE=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/pr.json'))['title'])")
          BODY=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/pr.json'))['body'] or '')")
          LABELS=$(python -c "import json; labels=[item['name'] for item in json.load(open('artifacts/governed-pr-increment-gate/pr.json'))['labels']]; print(','.join(labels))")
          HEAD_REF=$(python -c "import json; print(json.load(open('artifacts/governed-pr-increment-gate/pr.json'))['headRefName'])")
          set +e
          python scripts/governed_pr_increment_gate.py \
            --title "$TITLE" \
            --body "$BODY" \
            --labels "$LABELS" \
            --head-ref "$HEAD_REF" \
            --pr-number "$PR_NUMBER" \
            --status-json artifacts/coordenador-status/coordenador-status.json \
            --output-dir artifacts/governed-pr-increment-gate \
            --json | tee artifacts/governed-pr-increment-gate/decision.json
          code=$?
          set -e
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          if [[ "$code" != "0" ]]; then
            echo "Increment gate bloqueou o PR antes da validacao de merge."
            exit 1
          fi

      - name: Validate PR gates
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const executeMerge = core.getInput('execute_merge') === 'true';
            const requiredLabel = core.getInput('required_label');
            const requiredWorkflows = process.env.REQUIRED_WORKFLOWS
              .split('\n')
              .map((item) => item.trim())
              .filter(Boolean);

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });

            const failures = [];
            if (pr.state !== 'open') failures.push(`PR precisa estar aberto. Estado atual: ${pr.state}`);
            if (pr.draft) failures.push('PR ainda esta em draft.');
            if (!pr.mergeable) failures.push(`PR nao esta mergeable. Valor atual: ${pr.mergeable}`);

            const labels = await github.paginate(github.rest.issues.listLabelsOnIssue, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const labelNames = labels.map((label) => label.name);
            if (!labelNames.includes(requiredLabel)) {
              failures.push(`Label obrigatoria ausente: ${requiredLabel}`);
            }

            const headSha = pr.head.sha;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              head_sha: headSha,
              event: 'pull_request',
              per_page: 100,
            });

            const latestByWorkflow = new Map();
            for (const run of runs) {
              const existing = latestByWorkflow.get(run.name);
              if (!existing || new Date(run.created_at) > new Date(existing.created_at)) {
                latestByWorkflow.set(run.name, run);
              }
            }

            const workflowSummary = [];
            for (const workflow of requiredWorkflows) {
              const run = latestByWorkflow.get(workflow);
              if (!run) {
                failures.push(`Workflow obrigatorio nao encontrado no head SHA: ${workflow}`);
                workflowSummary.push({ workflow, status: 'missing', conclusion: 'missing' });
                continue;
              }
              workflowSummary.push({ workflow, status: run.status, conclusion: run.conclusion, url: run.html_url });
              if (run.status !== 'completed') failures.push(`Workflow ainda nao completou: ${workflow} (${run.status})`);
              if (run.conclusion !== 'success') failures.push(`Workflow sem sucesso: ${workflow} (${run.conclusion})`);
            }

            const summaryLines = [
              '# Governed PR Automation',
              '',
              `PR: #${prNumber}`,
              `Head SHA: ${headSha}`,
              `Modo merge: ${executeMerge ? 'executar' : 'dry-run'}`,
              `Label obrigatoria: ${requiredLabel}`,
              '',
              '| Workflow | Status | Conclusao |',
              '|---|---|---|',
              ...workflowSummary.map((item) => `| ${item.workflow} | ${item.status} | ${item.conclusion} |`),
              '',
              failures.length ? '## Bloqueios' : '## Resultado',
              failures.length ? failures.map((item) => `- ${item}`).join('\n') : '- PR elegivel para merge governado.',
            ];
            await core.summary.addRaw(summaryLines.join('\n')).write();

            core.setOutput('eligible', failures.length === 0 ? 'true' : 'false');
            core.setOutput('execute_merge', executeMerge ? 'true' : 'false');
            core.setOutput('head_sha', headSha);

            if (failures.length) {
              core.setFailed(failures.join('\n'));
            }

      - name: Merge PR when explicitly authorized
        if: steps.validate.outputs.eligible == 'true' && steps.validate.outputs.execute_merge == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(core.getInput('pr_number'));
            const headSha = '${{ steps.validate.outputs.head_sha }}';
            const { owner, repo } = context.repo;
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: prNumber,
              merge_method: 'squash',
              sha: headSha,
              commit_title: `chore: governed merge PR #${prNumber}`,
              commit_message: 'Merge executado por Governed PR Automation apos validacao de gates obrigatorios.',
            });