name: Unified Operational Event Bus

on:
  workflow_run:
    workflows:
      - "Operational Runtime Mesh Hub"
      - "Operational Alert Intelligence"
      - "Operational Executive Dashboard Generator"
      - "Operational Data Lake & Historical Intelligence"
      - "Governed Auto Remediation Engine"
      - "Workflow Reliability Analytics"
      - "Operational Stability Score"
      - "CI Incident Intelligence"
      - "Post Merge Operational Summary"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unified-operational-event-bus
  cancel-in-progress: true

jobs:
  governance-gate:
    name: Suprimir ruído de mesh/informativos
    runs-on: ubuntu-latest
    outputs:
      should_emit: ${{ steps.govern.outputs.should_emit }}
      event_class: ${{ steps.govern.outputs.event_class }}
      severity: ${{ steps.govern.outputs.severity }}
      action_policy: ${{ steps.govern.outputs.action_policy }}
    steps:
      - name: Classificar evento
        id: govern
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || inputs.source_workflow || 'manual' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'success' }}
        run: |
          set -euo pipefail
          INFORMATIVE=(
            "Operational Runtime Mesh Hub"
            "Workflow Governance Consolidator"
            "Operational Intelligence Hub"
            "Operational Governance Orchestrator"
            "Coordenador Status Consolidator"
            "Runtime Health Validator"
            "Workflow Command Center"
            "Workflow Reliability Analytics"
            "Operational Stability Score"
            "CI Incident Intelligence"
            "Post Merge Operational Summary"
            "CI Observability"
          )

          event_class="OPERATIONAL_SIGNAL"
          severity="INFO"
          action_policy="OBSERVE"
          should_emit=true

          for item in "${INFORMATIVE[@]}"; do
            if [ "$WORKFLOW_NAME" = "$item" ]; then
              event_class="INFORMATIVE_EVIDENCE"
              severity="INFO"
              action_policy="OBSERVE"
              if [ "$WORKFLOW_CONCLUSION" = "success" ] || [ "$WORKFLOW_CONCLUSION" = "skipped" ]; then
                should_emit=false
              fi
              break
            fi
          done

          if [ "$WORKFLOW_CONCLUSION" != "success" ] && [ "$event_class" != "INFORMATIVE_EVIDENCE" ]; then
            event_class="OPERATIONAL_INCIDENT"
            severity="HIGH"
            action_policy="MANUAL_REVIEW_REQUIRED"
          fi

          if [ "$WORKFLOW_CONCLUSION" = "cancelled" ]; then
            event_class="OPERATIONAL_INTERRUPTION"
            severity="MEDIUM"
            action_policy="VERIFY_CONTEXT"
          fi

          {
            echo "should_emit=${should_emit}"
            echo "event_class=${event_class}"
            echo "severity=${severity}"
            echo "action_policy=${action_policy}"
          } >> "$GITHUB_OUTPUT"

  unified-operational-event-bus:
    runs-on: ubuntu-latest
    needs: governance-gate
    if: needs.governance-gate.outputs.should_emit == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate unified operational event payload
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'manual' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'success' }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt || github.run_attempt }}
          EVENT_NAME: ${{ github.event.workflow_run.event || github.event_name }}
          EVENT_CLASS: ${{ needs.governance-gate.outputs.event_class }}
          SEVERITY: ${{ needs.governance-gate.outputs.severity }}
          ACTION_POLICY: ${{ needs.governance-gate.outputs.action_policy }}
        run: |
          BUS_STATUS="ACTIVE"
          ROUTING_KEY="ops.signal"
          GOVERNANCE_GATE="PRESERVED"

          if [ "${EVENT_CLASS}" = "OPERATIONAL_INCIDENT" ]; then
            ROUTING_KEY="ops.incident"
          elif [ "${EVENT_CLASS}" = "OPERATIONAL_INTERRUPTION" ]; then
            ROUTING_KEY="ops.interruption"
          elif [ "${EVENT_CLASS}" = "INFORMATIVE_EVIDENCE" ]; then
            ROUTING_KEY="ops.informative"
          fi

          cat > unified-operational-event.json <<JSON
{
  "schema_version": "1.0.0",
  "bus": "unified-operational-event-bus",
  "bus_status": "${BUS_STATUS}",
  "event_class": "${EVENT_CLASS}",
  "severity": "${SEVERITY}",
  "routing_key": "${ROUTING_KEY}",
  "action_policy": "${ACTION_POLICY}",
  "governance_gate": "${GOVERNANCE_GATE}",
  "source": {
    "platform": "github_actions",
    "workflow": "${WORKFLOW_NAME}",
    "conclusion": "${WORKFLOW_CONCLUSION}",
    "event": "${EVENT_NAME}",
    "run_id": "${RUN_ID}",
    "run_attempt": "${RUN_ATTEMPT}",
    "workflow_url": "${WORKFLOW_URL}"
  },
  "git": {
    "branch": "${HEAD_BRANCH}",
    "commit": "${HEAD_SHA}"
  },
  "routing": {
    "dashboard": true,
    "history": true,
    "alerting": true,
    "remediation": false,
    "manual_review_required": "${ACTION_POLICY}"
  }
}
JSON

          cat > unified-operational-event-bus.md <<MD
# Unified Operational Event Bus

| Field | Value |
|---|---|
| Bus status | ${BUS_STATUS} |
| Workflow | ${WORKFLOW_NAME} |
| Conclusion | ${WORKFLOW_CONCLUSION} |
| Event class | ${EVENT_CLASS} |
| Severity | ${SEVERITY} |
| Routing key | ${ROUTING_KEY} |
| Action policy | ${ACTION_POLICY} |
| Governance gate | ${GOVERNANCE_GATE} |
| Branch | ${HEAD_BRANCH} |
| Commit | ${HEAD_SHA} |

## Source workflow

${WORKFLOW_URL}

## Operational routing

- Dashboard: enabled
- History: enabled
- Alerting: enabled
- Remediation: disabled by design
- Manual review: governed by action policy
MD

          cat > unified-operational-event-bus.html <<HTML
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Operational Event Bus</title>
<style>
body{font-family:Arial,sans-serif;background:#020617;color:#e2e8f0;margin:0;padding:24px}.container{max-width:1500px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.title{font-size:32px;font-weight:bold}.badge{padding:10px 18px;border-radius:999px;background:#14532d;color:#bbf7d0;font-weight:bold}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.card{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:22px}.label{color:#94a3b8;font-size:14px}.metric{font-size:32px;font-weight:bold;margin-top:10px}.ok{color:#22c55e}.warn{color:#f59e0b}.risk{color:#ef4444}.section{margin-top:28px}table{width:100%;border-collapse:collapse;margin-top:18px}th,td{padding:12px;border-bottom:1px solid #1f2937;text-align:left}.route{background:#0f172a;border-left:4px solid #22c55e;padding:12px;margin-top:10px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<div class="header"><div class="title">Unified Operational Event Bus</div><div class="badge">ACTIVE</div></div>
<div class="grid">
<div class="card"><div class="label">Bus Status</div><div class="metric ok">${BUS_STATUS}</div></div>
<div class="card"><div class="label">Event Class</div><div class="metric warn">${EVENT_CLASS}</div></div>
<div class="card"><div class="label">Severity</div><div class="metric warn">${SEVERITY}</div></div>
<div class="card"><div class="label">Routing Key</div><div class="metric ok">${ROUTING_KEY}</div></div>
</div>
<div class="section"><h2>Unified Event Payload</h2><table><tr><th>Workflow</th><td>${WORKFLOW_NAME}</td></tr><tr><th>Conclusion</th><td>${WORKFLOW_CONCLUSION}</td></tr><tr><th>Branch</th><td>${HEAD_BRANCH}</td></tr><tr><th>Commit</th><td>${HEAD_SHA}</td></tr><tr><th>Action policy</th><td>${ACTION_POLICY}</td></tr><tr><th>Governance gate</th><td>${GOVERNANCE_GATE}</td></tr></table></div>
<div class="section"><h2>Routes</h2><div class="route">Dashboard route: enabled</div><div class="route">Historical route: enabled</div><div class="route">Alert route: enabled</div><div class="route">Remediation route: disabled by design</div></div>
</div>
</body>
</html>
HTML

      - name: Publish unified event bus summary
        run: |
          cat unified-operational-event-bus.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unified event bus artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unified-operational-event-bus
          path: |
            unified-operational-event.json
            unified-operational-event-bus.md
            unified-operational-event-bus.html
          if-no-files-found: error

  skip-noise:
    name: Evento informativo suprimido
    runs-on: ubuntu-latest
    needs: governance-gate
    if: needs.governance-gate.outputs.should_emit != 'true' && github.event_name != 'workflow_dispatch'
    steps:
      - name: Registrar supressão governada
        run: |
          echo "## Unified Operational Event Bus — supressão governada" >> "$GITHUB_STEP_SUMMARY"
          echo "- Fonte informativa sem falha real; evento não emitido" >> "$GITHUB_STEP_SUMMARY"
          echo "- Classificação: \`governed_skip\`" >> "$GITHUB_STEP_SUMMARY"
