name: Schema Runtime Validation

on:
  pull_request:
    paths:
      - "runtime/**"
      - "tests/schema_runtime/**"
      - "examples/runtime/**"
      - "schemas/**"
      - "docs/schema-registry.json"
      - ".github/workflows/schema-runtime-validation.yml"
  push:
    branches:
      - main
    paths:
      - "runtime/**"
      - "tests/schema_runtime/**"
      - "examples/runtime/**"
      - "schemas/**"
      - "docs/schema-registry.json"
      - ".github/workflows/schema-runtime-validation.yml"

jobs:
  schema-runtime-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run schema runtime enforcement tests
        run: |
          python tests/schema_runtime/test_schema_runtime_enforcer.py

      - name: Validate runtime valid fixture through CLI
        run: |
          python runtime/schema_runtime_enforcer.py product-intelligence-event examples/runtime/product-intelligence-event.runtime.valid.json --correlation-id ci-runtime-valid

      - name: Validate runtime invalid fixture is blocked
        run: |
          if python runtime/schema_runtime_enforcer.py product-intelligence-event examples/runtime/product-intelligence-event.runtime.invalid-extra-field.json --correlation-id ci-runtime-invalid; then
            echo "Invalid runtime fixture unexpectedly passed"
            exit 1
          fi
