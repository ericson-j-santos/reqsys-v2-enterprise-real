name: Workflow Efficiency State Integration

on:
  pull_request:
    paths:
      - "scripts/enrich_reqsys_state_workflow_efficiency.py"
      - "tests/test_enrich_reqsys_state_workflow_efficiency.py"
      - ".github/workflows/workflow-efficiency-state-integration.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile and test
        run: |
          set -euo pipefail
          python -m py_compile scripts/enrich_reqsys_state_workflow_efficiency.py
          python -m unittest tests/test_enrich_reqsys_state_workflow_efficiency.py
      - name: Build synthetic contracts
        run: |
          set -euo pipefail
          mkdir -p docs/ops-dashboard/data artifacts/main-operational-state-snapshot
          cat > docs/ops-dashboard/data/ci-workflow-efficiency-dashboard.json <<'JSON'
          {
            "mode": "report_only",
            "executive_card": {"title": "Workflow Efficiency", "status": "green", "score_percent": 87.5, "trend_delta_points": 4, "recommended_action": "REVIEW_TOP_WORKFLOW"},
            "summary": {"pr_sample_count": 8, "estimated_runs_saved": 12},
            "top_workflows": [{"workflow": "Runtime Risk Scoring"}]
          }
          JSON
          cat > docs/ops-dashboard/data/runtime-executive-index.json <<'JSON'
          {"schema_version":"1.3.0","cards":{},"summary":{},"links":{},"guardrails":[]}
          JSON
          cat > artifacts/main-operational-state-snapshot/main-operational-state-snapshot.json <<'JSON'
          {"contract":"main-operational-state-snapshot","indicators":{}}
          JSON
      - name: Integrate and validate
        run: |
          set -euo pipefail
          python scripts/enrich_reqsys_state_workflow_efficiency.py
          python - <<'PY'
          import json
          from pathlib import Path
          index=json.loads(Path('docs/ops-dashboard/data/runtime-executive-index.json').read_text())
          state=json.loads(Path('artifacts/main-operational-state-snapshot/main-operational-state-snapshot.json').read_text())
          assert index['cards']['workflow_efficiency']['score_percent'] == 87.5
          assert index['links']['workflow_efficiency'] == 'data/ci-workflow-efficiency-dashboard.json'
          assert state['workflow_efficiency_status'] == 'green'
          assert state['indicators']['workflow_efficiency']['mode'] == 'report_only'
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-efficiency-state-integration
          path: |
            docs/ops-dashboard/data/runtime-executive-index.json
            artifacts/main-operational-state-snapshot/main-operational-state-snapshot.json
          retention-days: 30
