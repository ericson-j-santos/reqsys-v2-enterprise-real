name: PR Fast Classifier

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-fast-classifier-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  classify:
    name: Classificar risco e escopo do PR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classificar PR
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/pr-fast-classifier

          if git rev-parse --verify "${BASE_SHA}^{commit}" >/dev/null 2>&1; then
            BASE_REF="${BASE_SHA}"
          else
            BASE_REF="origin/main"
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE_REF}" "${HEAD_SHA}" | sort || true)"
          FILE_COUNT="$(printf '%s\n' "${CHANGED_FILES}" | sed '/^$/d' | wc -l | tr -d ' ')"
          LINE_COUNT="$(git diff --shortstat "${BASE_REF}" "${HEAD_SHA}" | sed -E 's/.* ([0-9]+) insertions.*/\1/; t; s/.*/0/' || echo 0)"

          RISK="low"
          REVIEW_MODE="fast"

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '(^|/)(auth|security|secrets|jwt|cors|deploy|fly|docker|Dockerfile|\.github/workflows/)'; then
            RISK="high"
            REVIEW_MODE="deep"
          elif [ "${FILE_COUNT}" -gt 12 ]; then
            RISK="medium"
            REVIEW_MODE="deep"
          fi

          {
            echo "# PR Fast Classifier"
            echo
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| Arquivos alterados | ${FILE_COUNT} |"
            echo "| Linhas estimadas adicionadas | ${LINE_COUNT} |"
            echo "| Risco | ${RISK} |"
            echo "| Modo recomendado | ${REVIEW_MODE} |"
            echo
            echo "## Arquivos"
            printf '%s\n' "${CHANGED_FILES}" | sed '/^$/d' | sed 's/^/- /'
          } | tee artifacts/pr-fast-classifier/summary.md

          cat > artifacts/pr-fast-classifier/classification.json <<EOF
          {
            "file_count": ${FILE_COUNT},
            "estimated_insertions": ${LINE_COUNT},
            "risk": "${RISK}",
            "review_mode": "${REVIEW_MODE}"
          }
          EOF

          cat artifacts/pr-fast-classifier/summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Publicar artifact de classificação
        uses: actions/upload-artifact@v4
        with:
          name: pr-fast-classifier
          path: artifacts/pr-fast-classifier
          retention-days: 14
