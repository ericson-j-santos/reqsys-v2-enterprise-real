name: Trilha D — Qualidade e Governança

on:
  workflow_dispatch:
    inputs:
      fail_on_error:
        description: "Falhar workflow quando Trilha D estiver vermelha"
        required: false
        default: false
        type: boolean
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/trilha-d-qualidade-governanca.yml'
      - 'scripts/trilha_d_qualidade_governanca.py'
      - 'scripts/trilha_d_coverage_dimension.py'
      - 'scripts/build_trilha_d_history.py'
      - 'scripts/build_continuous_trilha_d_monitoring.py'
      - 'scripts/predict_operational_regression.py'
      - 'docs/contracts/trilha-d-qualidade-governanca.schema.json'
      - 'docs/runbooks/trilha-d-qualidade-governanca.md'
      - 'tests/test_trilha_d_qualidade_governanca.py'
      - 'backend/**'
      - 'docs/contracts/**'
      - 'docs/schema-registry.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/trilha-d-qualidade-governanca.yml'
      - 'scripts/trilha_d_qualidade_governanca.py'
      - 'scripts/trilha_d_coverage_dimension.py'
      - 'scripts/build_trilha_d_history.py'
      - 'scripts/build_continuous_trilha_d_monitoring.py'
      - 'scripts/predict_operational_regression.py'
      - 'docs/contracts/trilha-d-qualidade-governanca.schema.json'
      - 'docs/runbooks/trilha-d-qualidade-governanca.md'
      - 'tests/test_trilha_d_qualidade_governanca.py'

concurrency:
  group: trilha-d-qualidade-governanca-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trilha-d-matrix:
    name: "Trilha D — ${{ matrix.dimension }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        dimension:
          - tests
          - coverage
          - mutation
          - contract
          - schema
          - ci-watch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        if: matrix.dimension != 'ci-watch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ODBC driver (pyodbc dependency)
        if: contains(fromJSON('["tests", "coverage", "mutation", "contract"]'), matrix.dimension)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q unixodbc-dev

      - name: Install backend dependencies
        if: contains(fromJSON('["tests", "coverage", "mutation", "contract"]'), matrix.dimension)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Executar dimensão
        id: run
        env:
          OUTPUT_DIR: artifacts/trilha-d-qualidade-governanca
        run: |
          set -euo pipefail
          if [[ "${{ matrix.dimension }}" == "coverage" ]]; then
            python scripts/trilha_d_coverage_dimension.py \
              --output-dir "${OUTPUT_DIR}" \
              --repository "${{ github.repository }}" \
              --run-id "${{ github.run_id }}"
          else
            python scripts/trilha_d_qualidade_governanca.py \
              --dimension "${{ matrix.dimension }}" \
              --output-dir "${OUTPUT_DIR}" \
              --repository "${{ github.repository }}" \
              --run-id "${{ github.run_id }}"
          fi

      - name: Publicar artifact da dimensão
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trilha-d-${{ matrix.dimension }}-${{ github.run_id }}
          path: artifacts/trilha-d-qualidade-governanca/${{ matrix.dimension }}.json
          if-no-files-found: error
          retention-days: 14

  trilha-d-consolidate:
    name: Trilha D — Consolidar
    runs-on: ubuntu-latest
    needs: trilha-d-matrix
    if: always()
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Baixar artifacts das dimensões
        uses: actions/download-artifact@v4
        with:
          pattern: trilha-d-*-${{ github.run_id }}
          path: artifacts/trilha-d-qualidade-governanca/download
          merge-multiple: true

      - name: Normalizar relatórios por dimensão
        shell: bash
        run: |
          set -euo pipefail
          OUT="artifacts/trilha-d-qualidade-governanca"
          mkdir -p "${OUT}"
          for dim in tests coverage mutation contract schema ci-watch; do
            src="${OUT}/download/${dim}.json"
            if [[ -f "${src}" ]]; then
              cp "${src}" "${OUT}/${dim}.json"
            fi
          done
          ls -la "${OUT}"

      - name: Consolidar Trilha D
        id: consolidate
        env:
          FAIL_ON_ERROR: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_error == true }}
        run: |
          set -euo pipefail
          args=(
            --consolidate
            --output-dir artifacts/trilha-d-qualidade-governanca
            --repository "${{ github.repository }}"
            --run-id "${{ github.run_id }}"
          )
          if [[ "${FAIL_ON_ERROR}" == "true" ]]; then
            args+=(--fail-on-error)
          fi
          python scripts/trilha_d_qualidade_governanca.py "${args[@]}" | tee /tmp/trilha-d-summary.json

      - name: Resumo executivo
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT="artifacts/trilha-d-qualidade-governanca/trilha-d-qualidade-governanca.json"
          if [[ ! -f "${REPORT}" ]]; then
            echo "Relatório consolidado ausente" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          
          report = json.loads(Path("artifacts/trilha-d-qualidade-governanca/trilha-d-qualidade-governanca.json").read_text())
          print("## Trilha D — Qualidade e Governança")
          print()
          print(f"- Estado: **{report['state']}**")
          print(f"- Decisão: {report['decision']}")
          print(f"- Score médio: {report['average_score']}%")
          print(f"- Paralelizável: {report['parallelizable']}")
          print()
          print("| Dimensão | Status | Score | Resumo |")
          print("|---|---|---:|---|")
          for item in report["dimensions"]:
              print(f"| {item['dimension']} | {item['status']} | {item['score']} | {item['summary']} |")
          PY

      - name: Validar superfície artifact ingestion
        if: always()
        run: |
          set -euo pipefail
          python -m pytest tests/test_build_trilha_d_history.py -q -k "artifact_ingestion"

      - name: Validar superfície artifact ingestion refresh
        if: always()
        run: |
          set -euo pipefail
          python -m pytest tests/test_refresh_trilha_d_artifact_ingestion.py -q
          python -m pytest tests/test_build_trilha_d_history.py -q -k "artifact_ingestion_refresh"

      - name: Refresh artifact ingestion Trilha D
        if: always()
        run: |
          set -euo pipefail
          REPORT="artifacts/trilha-d-qualidade-governanca/trilha-d-qualidade-governanca.json"
          if [[ ! -f "${REPORT}" ]]; then
            echo "::warning::Relatório consolidado ausente; refresh não executado."
            exit 0
          fi
          args=(
            --report "${REPORT}"
            --github-run-id "${{ github.run_id }}"
          )
          MERGE_REPORT="artifacts/merge-readiness/merge-readiness.json"
          if [[ -f "${MERGE_REPORT}" ]]; then
            args+=(--merge-readiness-report "${MERGE_REPORT}")
          fi
          python scripts/refresh_trilha_d_artifact_ingestion.py "${args[@]}"

      - name: Validar superfície monitoramento contínuo
        if: always()
        run: |
          set -euo pipefail
          python -m pytest tests/test_build_continuous_trilha_d_monitoring.py -q

      - name: Validar superfície coverage targeted
        if: always()
        run: |
          set -euo pipefail
          # COVERAGE_TARGETED_MIN_SCORE=92.0 — gate alinhado a scripts/build_trilha_d_history.py
          # Suíte: test_*_critical_paths
          python -m pytest backend/tests/ -q -k "critical_paths"

      - name: Validar superfície deep links governança
        if: always()
        run: |
          set -euo pipefail
          python -m pytest tests/test_build_governance_deep_links.py -q

      - name: Publicar artifact consolidado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trilha-d-qualidade-governanca-evidence
          path: |
            artifacts/trilha-d-qualidade-governanca/
            docs/ops-dashboard/data/trilha-d-history.json
            docs/ops-dashboard/data/padrao-ouro-operational-pareto.json
            docs/ops-dashboard/data/predictive-regression-gate.json
            docs/ops-dashboard/data/continuous-trilha-d-monitoring.json
            docs/ops-dashboard/data/governance-evidence-index.json
            docs/ops-dashboard/data/merge-readiness-history.json
          if-no-files-found: warn
          retention-days: 30

  trilha-d-publish-history:
    name: Trilha D — Publicar histórico
    runs-on: ubuntu-latest
    needs: trilha-d-consolidate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar histórico gerado
        uses: actions/download-artifact@v4
        with:
          name: trilha-d-qualidade-governanca-evidence
          path: artifacts/trilha-d-ingest

      - name: Commit histórico atualizado na main
        run: |
          set -euo pipefail
          SRC_HISTORY="artifacts/trilha-d-ingest/docs/ops-dashboard/data/trilha-d-history.json"
          SRC_PARETO="artifacts/trilha-d-ingest/docs/ops-dashboard/data/padrao-ouro-operational-pareto.json"
          SRC_PREDICTIVE="artifacts/trilha-d-ingest/docs/ops-dashboard/data/predictive-regression-gate.json"
          SRC_MONITORING="artifacts/trilha-d-ingest/docs/ops-dashboard/data/continuous-trilha-d-monitoring.json"
          SRC_GOVERNANCE="artifacts/trilha-d-ingest/docs/ops-dashboard/data/governance-evidence-index.json"
          SRC_MERGE_READINESS="artifacts/trilha-d-ingest/docs/ops-dashboard/data/merge-readiness-history.json"
          DEST_HISTORY="docs/ops-dashboard/data/trilha-d-history.json"
          DEST_PARETO="docs/ops-dashboard/data/padrao-ouro-operational-pareto.json"
          DEST_PREDICTIVE="docs/ops-dashboard/data/predictive-regression-gate.json"
          DEST_MONITORING="docs/ops-dashboard/data/continuous-trilha-d-monitoring.json"
          DEST_GOVERNANCE="docs/ops-dashboard/data/governance-evidence-index.json"
          DEST_MERGE_READINESS="docs/ops-dashboard/data/merge-readiness-history.json"
          if [[ ! -f "${SRC_HISTORY}" ]]; then
            echo "Histórico não gerado neste run; nada a publicar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          mkdir -p "$(dirname "${DEST_HISTORY}")" "$(dirname "${DEST_PARETO}")"
          cp "${SRC_HISTORY}" "${DEST_HISTORY}"
          if [[ -f "${SRC_PARETO}" ]]; then
            cp "${SRC_PARETO}" "${DEST_PARETO}"
          fi
          if [[ -f "${SRC_PREDICTIVE}" ]]; then
            cp "${SRC_PREDICTIVE}" "${DEST_PREDICTIVE}"
          fi
          if [[ -f "${SRC_MONITORING}" ]]; then
            cp "${SRC_MONITORING}" "${DEST_MONITORING}"
          fi
          if [[ -f "${SRC_GOVERNANCE}" ]]; then
            cp "${SRC_GOVERNANCE}" "${DEST_GOVERNANCE}"
          fi
          if [[ -f "${SRC_MERGE_READINESS}" ]]; then
            cp "${SRC_MERGE_READINESS}" "${DEST_MERGE_READINESS}"
          fi
          git add "${DEST_HISTORY}"
          if [[ -f "${DEST_PARETO}" ]]; then
            git add "${DEST_PARETO}"
          fi
          if [[ -f "${DEST_PREDICTIVE}" ]]; then
            git add "${DEST_PREDICTIVE}"
          fi
          if [[ -f "${DEST_MONITORING}" ]]; then
            git add "${DEST_MONITORING}"
          fi
          if [[ -f "${DEST_GOVERNANCE}" ]]; then
            git add "${DEST_GOVERNANCE}"
          fi
          if [[ -f "${DEST_MERGE_READINESS}" ]]; then
            git add "${DEST_MERGE_READINESS}"
          fi
          if git diff --cached --quiet; then
            echo "Histórico Trilha D, Pareto, gate preditivo, monitoramento, governança e merge-readiness já estão atualizados."
            exit 0
          fi
          git commit -m "chore(ops): atualizar artifacts Trilha D via artifact ingestion refresh"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Histórico Trilha D publicado na main."
              exit 0
            fi
            status=$?
            git rebase --abort || true
            echo "::warning::Tentativa ${attempt}/3 de publicar histórico falhou com status ${status}; nova tentativa em ${attempt}s."
            sleep "${attempt}"
          done
          echo "::warning::Histórico Trilha D não publicado por corrida de atualização em main; artifact preservado para auditoria."
          exit 0
