name: Executive Promotion Advisor Post Artifact Homologation

on:
  workflow_run:
    workflows:
      - "Ops Dashboard"
    types:
      - completed
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID do Ops Dashboard"
        required: true
        type: string
      public_url:
        description: "URL pública opcional do Ops Dashboard"
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: advisor-post-artifact-homologation-${{ github.event.workflow_run.id || inputs.run_id }}
  cancel-in-progress: false

jobs:
  homologate:
    name: Homologate canonical artifact and public surface
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate implementation
        run: |
          set -euo pipefail
          python -m py_compile scripts/homologate_executive_promotion_advisor_artifact.py
          python -m py_compile scripts/build_executive_promotion_advisor_homologation_history.py
          python -m unittest tests/test_executive_promotion_advisor_post_artifact_homologation.py

      - name: Resolve source run
        id: source
        env:
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id || inputs.run_id }}
        run: |
          set -euo pipefail
          test -n "$SOURCE_RUN_ID"
          echo "run_id=$SOURCE_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download canonical dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: ops-dashboard-static
          path: artifacts/ops-dashboard-static
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.source.outputs.run_id }}

      - name: Resolve previous successful history run
        id: previous
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          previous_run_id="$({
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/executive-promotion-advisor-post-artifact-homologation.yml/runs?status=success&per_page=20" \
              --jq ".workflow_runs[] | select(.id != ${GITHUB_RUN_ID}) | .id" 2>/dev/null || true
          } | head -n 1)"
          echo "run_id=${previous_run_id}" >> "$GITHUB_OUTPUT"

      - name: Download previous homologation history
        if: steps.previous.outputs.run_id != ''
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: executive-promotion-advisor-homologation-history
          path: artifacts/previous-advisor-homologation-history
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.previous.outputs.run_id }}

      - name: Homologate artifact and public URL
        env:
          INPUT_PUBLIC_URL: ${{ inputs.public_url }}
          CONFIGURED_PUBLIC_URL: ${{ vars.EXECUTIVE_PROMOTION_ADVISOR_PUBLIC_URL }}
        run: |
          set -euo pipefail
          public_url="${INPUT_PUBLIC_URL:-${CONFIGURED_PUBLIC_URL:-}}"
          mkdir -p artifacts/executive-promotion-advisor-post-artifact-homologation
          python scripts/homologate_executive_promotion_advisor_artifact.py \
            --root artifacts/ops-dashboard-static \
            --public-url "$public_url" \
            --output artifacts/executive-promotion-advisor-post-artifact-homologation/evidence.json

      - name: Build homologation history
        run: |
          set -euo pipefail
          mkdir -p artifacts/executive-promotion-advisor-homologation-history
          args=(
            --evidence artifacts/executive-promotion-advisor-post-artifact-homologation/evidence.json
            --output artifacts/executive-promotion-advisor-homologation-history/history.json
            --max-samples 50
          )
          if [ -f artifacts/previous-advisor-homologation-history/history.json ]; then
            args+=(--previous-history artifacts/previous-advisor-homologation-history/history.json)
          fi
          python scripts/build_executive_promotion_advisor_homologation_history.py "${args[@]}"

      - name: Validate report-only history
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          evidence = json.loads(Path('artifacts/executive-promotion-advisor-post-artifact-homologation/evidence.json').read_text())
          history = json.loads(Path('artifacts/executive-promotion-advisor-homologation-history/history.json').read_text())
          assert evidence['production_blocker'] is False
          assert evidence['human_approval_required'] is True
          assert history['mode'] == 'report-only'
          assert history['summary']['production_blocker'] is False
          PY

      - name: Publish homologation evidence
        uses: actions/upload-artifact@v4
        with:
          name: executive-promotion-advisor-post-artifact-homologation
          path: artifacts/executive-promotion-advisor-post-artifact-homologation
          if-no-files-found: error
          retention-days: 90

      - name: Publish homologation history
        uses: actions/upload-artifact@v4
        with:
          name: executive-promotion-advisor-homologation-history
          path: artifacts/executive-promotion-advisor-homologation-history
          if-no-files-found: error
          retention-days: 90

      - name: Summarize homologation
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          evidence = json.loads(Path('artifacts/executive-promotion-advisor-post-artifact-homologation/evidence.json').read_text())
          history = json.loads(Path('artifacts/executive-promotion-advisor-homologation-history/history.json').read_text())
          print('# Executive Promotion Advisor — pós-artifact')
          print()
          print(f"- Decisão: {evidence['decision']}")
          print(f"- Artifact: {evidence['artifact']['status']}")
          print(f"- URL pública: {evidence['public_url']['status']}")
          print(f"- Amostras: {history['summary']['sample_count']}")
          print(f"- Taxa homologação completa: {history['summary']['full_homologation_rate_percent']}%")
          print(f"- Sequência estável: {history['summary']['stable_streak']}")
          print('- Modo: report-only')
          print('- Bloqueio automático de produção: não')
          PY
