name: Main Smoke CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-smoke-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  main-smoke:
    name: Main smoke / post-merge evidence
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validar arquivos críticos de CI
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/workflows/pr-ci-watch.yml
          test -f .github/workflows/ci-fast-operational.yml
          test -f scripts/pr_ci_watch.py
          test -f tests/test_pr_ci_watch.py
          test -f docs/runbooks/pr-ci-watch.md
          grep -qi -- "--exclude-run-id" .github/workflows/pr-ci-watch.yml
          grep -qi -- "upload-artifact" .github/workflows/pr-ci-watch.yml
          grep -qi -- "Fast CI - Operational Guardrails" .github/workflows/ci-fast-operational.yml

      - name: Validar sintaxe Python
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/pr_ci_watch.py

      - name: Executar testes rápidos do watcher
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest tests/test_pr_ci_watch.py -q

      - name: Gerar evidência pós-merge
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/main-smoke-ci

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          output_dir = Path("artifacts/main-smoke-ci")
          output_dir.mkdir(parents=True, exist_ok=True)

          summary = """# Main Smoke CI

Validação pós-merge da branch `main`.

## Escopo

- Verifica presença dos workflows operacionais críticos.
- Verifica guardrail `--exclude-run-id` no PR CI Watch.
- Valida sintaxe do watcher Python.
- Executa testes rápidos do watcher.
- Não executa deploy.
- Não altera produção.
"""
          (output_dir / "summary.md").write_text(summary, encoding="utf-8")

          evidence = {
              "workflow": "Main Smoke CI",
              "branch": os.environ.get("GITHUB_REF_NAME", ""),
              "sha": os.environ.get("GITHUB_SHA", ""),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "environment_change": False,
              "deploy": False,
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
          }
          (output_dir / "evidence.json").write_text(
              json.dumps(evidence, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publicar artifact de evidência
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-smoke-ci-evidence
          path: artifacts/main-smoke-ci
          if-no-files-found: error
          retention-days: 15
