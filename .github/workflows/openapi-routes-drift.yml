name: OpenAPI Routes Drift

on:
  pull_request:
    paths:
      - docs-site/assets/openapi/**
      - backend/app/**
      - scripts/validate_openapi_routes_drift.py
      - tests/test_openapi_parallel_lanes.py
      - tests/test_openapi_semantic_diff_strict.py
      - .github/workflows/openapi-routes-drift.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openapi-routes-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  routes-drift:
    name: Backend routes ↔ OpenAPI drift (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run routes drift detector
        env:
          DATABASE_URL: sqlite:///./reqsys.db
          JWT_SECRET: ci-placeholder-secret-min-32-chars-long
          JWT_ISSUER: reqsys-ci
          JWT_AUDIENCE: reqsys-ci
        run: |
          python scripts/validate_openapi_routes_drift.py \
            --contract docs-site/assets/openapi/reqsys-runtime-openapi-v0.3.0.json \
            --output artifacts/openapi/openapi-routes-drift.json

      - name: Run drift unit tests
        env:
          DATABASE_URL: sqlite:///./reqsys.db
          JWT_SECRET: ci-placeholder-secret-min-32-chars-long
          JWT_ISSUER: reqsys-ci
          JWT_AUDIENCE: reqsys-ci
        run: |
          pytest tests/test_openapi_parallel_lanes.py tests/test_openapi_semantic_diff_strict.py -q --tb=short

      - name: Upload drift artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-routes-drift
          path: artifacts/openapi/openapi-routes-drift.json
          if-no-files-found: error
          retention-days: 15

      - name: Resumo executivo
        if: always()
        run: |
          if [[ -f artifacts/openapi/openapi-routes-drift.json ]]; then
            python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/openapi/openapi-routes-drift.json").read_text(encoding="utf-8"))
          summary = report.get("summary") or {}
          print("## OpenAPI Routes Drift (canonico / Lane C)")
          print(f"- Status: `{report.get('status')}`")
          print(f"- Missing in OpenAPI: `{summary.get('missing_in_openapi')}`")
          print(f"- Missing in backend: `{summary.get('missing_in_backend')}`")
          PY
          fi >> "$GITHUB_STEP_SUMMARY"

  routes-drift-strict:
    name: Strict gate — routes drift must be zero
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: routes-drift
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run routes drift with --strict
        env:
          DATABASE_URL: sqlite:///./reqsys.db
          JWT_SECRET: ci-placeholder-secret-min-32-chars-long
          JWT_ISSUER: reqsys-ci
          JWT_AUDIENCE: reqsys-ci
        run: |
          python scripts/validate_openapi_routes_drift.py \
            --contract docs-site/assets/openapi/reqsys-runtime-openapi-v0.3.0.json \
            --output artifacts/openapi/openapi-routes-drift-strict.json \
            --strict

      - name: Strict gate summary
        if: always()
        run: |
          echo "## OpenAPI Routes Drift — Strict Gate (canonico)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Detector: \`validate_openapi_routes_drift.py\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resultado: \`PASS\` (drift zero)" >> "$GITHUB_STEP_SUMMARY"
