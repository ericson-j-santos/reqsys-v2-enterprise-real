name: Deploy Staging Auth Fix

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Executar deploy da API staging
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: Executar deploy do frontend staging
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - 'frontend/src/auth/**'
      - 'frontend/Dockerfile.prod'
      - 'frontend/fly.staging.toml'
      - 'backend/fly.staging.toml'
      - 'backend/app/core/config.py'
      - 'scripts/validar_frontend_auth_redirect.py'
      - 'scripts/gerar_indice_evidencia_visual.py'
      - 'frontend/tests/e2e/visual-evidence.spec.js'
      - 'frontend/tests/e2e/helpers/evidence.js'
      - '.github/workflows/deploy-staging-auth-fix.yml'

permissions:
  contents: read

concurrency:
  group: deploy-staging-auth-fix
  cancel-in-progress: false

jobs:
  validate-bundle:
    name: Validar bundle local sem callback.html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend staging
        working-directory: frontend
        env:
          VITE_API_URL: https://reqsys-api-stg.fly.dev
          VITE_PUBLIC_URL: https://reqsys-app-stg.fly.dev
        run: npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Garantir redirect URI sem /auth/callback.html
        run: |
          python scripts/validar_frontend_auth_redirect.py --dist-dir frontend/dist \
            | tee frontend-auth-redirect-validation.json

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-auth-redirect-validation
          path: frontend-auth-redirect-validation.json

  deploy-backend:
    name: Deploy API staging
    runs-on: ubuntu-latest
    needs: validate-bundle
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.deploy_backend == true) ||
      (github.event_name == 'push')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: backend
        run: flyctl deploy --remote-only --config fly.staging.toml --app reqsys-api-stg

  deploy-frontend:
    name: Deploy frontend staging
    runs-on: ubuntu-latest
    needs: validate-bundle
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true) ||
      (github.event_name == 'push')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy frontend staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: frontend
        run: flyctl deploy --remote-only --config fly.staging.toml --app reqsys-app-stg

  validate-runtime:
    name: Validar auth Azure em staging
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && needs.validate-bundle.result == 'success' && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validar /v1/auth/config da API staging
        run: |
          python scripts/validar_login_azure_operacional.py \
            --api-url https://reqsys-api-stg.fly.dev \
            --expected-redirect-uri https://reqsys-app-stg.fly.dev \
            | tee auth-azure-staging-report.json

      - name: Validar bundle publicado do frontend staging
        run: |
          python scripts/validar_frontend_auth_redirect.py \
            --frontend-url https://reqsys-app-stg.fly.dev \
            | tee frontend-auth-public-report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-auth-validation-reports
          path: |
            auth-azure-staging-report.json
            frontend-auth-public-report.json

  visual-evidence-staging:
    name: Evidência visual staging (screenshots)
    runs-on: ubuntu-latest
    needs: [validate-runtime]
    if: always() && needs.validate-runtime.result == 'success'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Instalar dependências e Chromium
        run: npm ci && npx playwright install --with-deps chromium

      - name: Capturar telas em staging
        env:
          E2E_BASE_URL: https://reqsys-app-stg.fly.dev
          E2E_API_URL: https://reqsys-api-stg.fly.dev
          E2E_EVIDENCE_MODE: '1'
        run: npx playwright test tests/e2e/visual-evidence.spec.js

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Gerar índice HTML das evidências
        run: python ../scripts/gerar_indice_evidencia_visual.py --evidence-dir test-results/evidence

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-visual-evidence
          path: |
            frontend/test-results/evidence/
            frontend/playwright-report/evidence/
          retention-days: 30
