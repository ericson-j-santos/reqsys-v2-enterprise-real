name: CI Audit Scope Remediation

on:
  push:
    branches:
      - agent/prompt-coordinator-api
    paths:
      - .github/workflows/ci-audit-scope-remediation.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-audit-scope-remediation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Restrict npm audit to production dependencies
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/ci.yml')
          content = workflow.read_text(encoding='utf-8')
          current = 'run: npm audit --audit-level=high'
          target = 'run: npm audit --omit=dev --audit-level=high'

          if target in content:
              print('CI already audits only production dependencies.')
          elif current in content:
              workflow.write_text(content.replace(current, target, 1), encoding='utf-8')
              print('CI audit scope corrected.')
          else:
              raise SystemExit('Expected npm audit command not found in .github/workflows/ci.yml')
          PY

      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- .github/workflows/ci.yml; then
            echo 'No correction required.'
            exit 0
          fi
          git config user.name 'reqsys-ci-remediation'
          git config user.email 'actions@github.com'
          git add .github/workflows/ci.yml
          git commit -m 'fix(ci): audit only production dependencies'
          git push origin HEAD:${{ github.ref_name }}
