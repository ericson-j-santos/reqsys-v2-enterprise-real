name: Delivery Burndown Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/delivery-burndown-snapshot.yml'
      - 'docs/runbooks/delivery-burndown-snapshot.md'

concurrency:
  group: delivery-burndown-snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  delivery-burndown:
    name: Build delivery burndown snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Build burndown artifact
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          dimensions = [
              {'name': 'delivery_visibility', 'current_percent': 99.2, 'target_percent': 99.5},
              {'name': 'dashboard_delivery_drilldown', 'current_percent': 92.0, 'target_percent': 98.0},
              {'name': 'evidence_indexing', 'current_percent': 99.0, 'target_percent': 99.5},
              {'name': 'artifact_contract_coverage', 'current_percent': 99.2, 'target_percent': 99.5},
          ]
          for item in dimensions:
              item['gap_pp'] = round(item['target_percent'] - item['current_percent'], 2)
              item['status'] = 'closed' if item['gap_pp'] <= 0 else 'open'
          total_gap = round(sum(item['gap_pp'] for item in dimensions), 2)
          report = {
              'schema_version': '1.0.0',
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'repository': os.environ['REPOSITORY'],
              'run_id': os.environ['RUN_ID'],
              'event_name': os.environ['EVENT_NAME'],
              'total_gap_pp': total_gap,
              'largest_gap': max(dimensions, key=lambda item: item['gap_pp']),
              'dimensions': dimensions,
              'mode': 'report_only',
          }
          Path('audit/delivery-burndown').mkdir(parents=True, exist_ok=True)
          Path('audit/delivery-burndown/delivery-burndown-snapshot.json').write_text(json.dumps(report, indent=2, ensure_ascii=False), encoding='utf-8')
          lines = ['# Delivery Burndown Snapshot', '', f"- Total gap: {total_gap} p.p.", f"- Largest gap: {report['largest_gap']['name']}", '- Mode: report_only', '', '## Dimensions']
          lines.extend([f"- {item['name']}: {item['current_percent']}% -> {item['target_percent']}% (gap {item['gap_pp']} p.p.)" for item in dimensions])
          Path('audit/delivery-burndown/delivery-burndown-snapshot.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(json.dumps(report, indent=2, ensure_ascii=False))
          PY

      - name: Upload delivery burndown artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delivery-burndown-snapshot-${{ github.run_id }}
          path: audit/delivery-burndown/
          if-no-files-found: error
          retention-days: 30
