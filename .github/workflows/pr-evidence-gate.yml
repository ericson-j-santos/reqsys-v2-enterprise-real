name: PR Evidence Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows:
      - CI — ReqSys v2 Enterprise
      - Governance Quality Gates
      - Governança Padrão Ouro
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to validate
        required: true
        type: string

concurrency:
  group: pr-evidence-gate-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  evidence-gate:
    name: Validate PR head, workflows and artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      STRICT_WORKFLOW_NAME: CI — ReqSys v2 Enterprise
      MAX_WAIT_SECONDS: "600"
      POLL_SECONDS: "15"
    steps:
      - name: Build conclusive evidence
        id: evidence
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function resolvePullRequest() {
              if (context.payload.pull_request) return context.payload.pull_request;

              const input = core.getInput('pr_number');
              if (input) {
                const { data } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: Number(input),
                });
                return data;
              }

              const workflowRun = context.payload.workflow_run;
              const direct = workflowRun?.pull_requests?.[0];
              if (direct?.number) {
                const { data } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: Number(direct.number),
                });
                return data;
              }

              const headSha = workflowRun?.head_sha;
              if (!headSha) return null;

              const { data } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: headSha,
                per_page: 100,
              });
              return data.find((item) => item.state === 'open' && item.head.sha === headSha) || null;
            }

            async function listRuns(headSha) {
              return github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner,
                repo,
                head_sha: headSha,
                per_page: 100,
              });
            }

            function evaluate(runs, headSha) {
              const matching = runs
                .filter((run) => run.name === process.env.STRICT_WORKFLOW_NAME)
                .sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)));

              const successful = matching.find(
                (run) => run.status === 'completed' && run.conclusion === 'success',
              );
              const failed = matching.find(
                (run) => run.status === 'completed' &&
                  run.conclusion &&
                  !['success', 'skipped', 'neutral'].includes(run.conclusion),
              );
              const active = matching.find((run) => run.status !== 'completed');

              if (successful) {
                return { status: 'passed', reason: 'strict_ci_success', run: successful };
              }
              if (failed && !active) {
                return { status: 'failed', reason: 'strict_ci_failed', run: failed };
              }
              if (active) {
                return { status: 'pending', reason: 'strict_ci_running', run: active };
              }
              return {
                status: 'pending',
                reason: `strict_ci_not_found_for_${headSha}`,
                run: null,
              };
            }

            const pr = await resolvePullRequest();
            if (!pr) {
              const audit = {
                schema_version: '1.1.0',
                generated_at: new Date().toISOString(),
                repository: `${owner}/${repo}`,
                event: eventName,
                gate: {
                  status: 'skipped',
                  reason: 'no_open_pr_for_workflow_run',
                },
              };
              fs.mkdirSync('audit', { recursive: true });
              fs.writeFileSync('audit/pr-evidence-gate.json', JSON.stringify(audit, null, 2));
              core.setOutput('status', 'skipped');
              core.setOutput('reason', audit.gate.reason);
              core.setOutput('head_sha', context.payload.workflow_run?.head_sha || context.sha);
              return;
            }

            const headSha = pr.head.sha;
            const deadline = Date.now() + Number(process.env.MAX_WAIT_SECONDS) * 1000;
            let runs = [];
            let gate;

            do {
              runs = await listRuns(headSha);
              gate = evaluate(runs, headSha);
              if (gate.status !== 'pending') break;
              if (Date.now() >= deadline) break;
              core.info(`Strict CI pending (${gate.reason}); retrying in ${process.env.POLL_SECONDS}s.`);
              await sleep(Number(process.env.POLL_SECONDS) * 1000);
            } while (Date.now() < deadline);

            if (gate.status === 'pending') {
              gate = {
                ...gate,
                status: 'deferred',
                reason: `${gate.reason}_after_timeout`,
                retrigger: 'workflow_run_completed',
              };
            }

            const audit = {
              schema_version: '1.1.0',
              generated_at: new Date().toISOString(),
              repository: `${owner}/${repo}`,
              event: eventName,
              pr: {
                number: pr.number,
                title: pr.title,
                state: pr.state,
                draft: pr.draft,
                head_ref: pr.head.ref,
                base_ref: pr.base.ref,
                head_sha: headSha,
                html_url: pr.html_url,
              },
              gate,
              workflow_runs: runs.map((run) => ({
                id: run.id,
                name: run.name,
                event: run.event,
                status: run.status,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                html_url: run.html_url,
                created_at: run.created_at,
                updated_at: run.updated_at,
              })),
            };

            fs.mkdirSync('audit', { recursive: true });
            fs.writeFileSync('audit/pr-evidence-gate.json', JSON.stringify(audit, null, 2));
            fs.writeFileSync('audit/pr-evidence-gate.md', [
              '# PR Evidence Gate',
              '',
              `- PR: #${pr.number}`,
              `- Head SHA: ${headSha}`,
              `- Event: ${eventName}`,
              `- Status: ${gate.status}`,
              `- Reason: ${gate.reason}`,
              `- Strict workflow: ${process.env.STRICT_WORKFLOW_NAME}`,
              `- Evidence URL: ${gate.run?.html_url || 'pending'}`,
            ].join('\n'));

            core.setOutput('status', gate.status);
            core.setOutput('reason', gate.reason);
            core.setOutput('head_sha', headSha);

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-evidence-gate-${{ steps.evidence.outputs.head_sha || github.sha }}
          path: audit/
          if-no-files-found: error
          retention-days: 30

      - name: Enforce conclusive result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status='${{ steps.evidence.outputs.status }}'
          reason='${{ steps.evidence.outputs.reason }}'

          case "$status" in
            passed|skipped)
              echo "PR Evidence Gate: $status ($reason)"
              ;;
            deferred)
              echo "::notice::PR Evidence Gate deferred without false failure: $reason. A workflow_run completion will perform the conclusive validation."
              ;;
            *)
              echo "::error::PR Evidence Gate failed: ${status:-unknown} ($reason)"
              exit 1
              ;;
          esac
