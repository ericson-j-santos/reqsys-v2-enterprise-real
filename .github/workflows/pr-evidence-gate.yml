name: PR Evidence Gate

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to validate'
        required: false
        type: string

concurrency:
  group: pr-evidence-gate-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: read
  contents: read
  pull-requests: read

jobs:
  evidence-gate:
    name: Validate PR head, workflows and artifacts
    runs-on: ubuntu-latest
    env:
      REQUIRED_WORKFLOW_NAMES: |
        CI — ReqSys v2 Enterprise
        Governance Quality Gates
        Governança Padrão Ouro
      OPTIONAL_WORKFLOW_NAMES: |
        NGINX Security Profile
      MAX_WAIT_SECONDS: '60'
      POLL_SECONDS: '30'
    steps:
      - name: Build audit evidence
        id: evidence
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runCache = new Map();
            const artifactCache = new Map();

            async function getPullRequest() {
              if (context.payload.pull_request) return context.payload.pull_request;
              const inputNumber = core.getInput('pr_number');
              if (!inputNumber) {
                throw new Error('pr_number is required for workflow_dispatch runs.');
              }
              const { data } = await withRetry(() => github.rest.pulls.get({ owner, repo, pull_number: Number(inputNumber) }));
              return data;
            }

            function parseList(value) {
              return String(value || '')
                .split('\n')
                .map((item) => item.trim())
                .filter(Boolean);
            }

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            function isRateLimitError(error) {
              return error && (error.status === 403 || error.status === 429) && String(error.message || '').toLowerCase().includes('rate limit');
            }

            async function withRetry(operation, attempts = 3) {
              let lastError;
              for (let attempt = 1; attempt <= attempts; attempt += 1) {
                try {
                  return await operation();
                } catch (error) {
                  lastError = error;
                  if (!isRateLimitError(error) || attempt === attempts) break;
                  const waitMs = attempt * 15000;
                  core.warning(`GitHub API rate limit detected. Backing off for ${waitMs / 1000}s before retry ${attempt + 1}/${attempts}.`);
                  await sleep(waitMs);
                }
              }
              throw lastError;
            }

            async function listRuns(headSha) {
              if (runCache.has(headSha)) return runCache.get(headSha);

              const { data } = await withRetry(() => github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                per_page: 50,
              }));

              const runSummaries = data.workflow_runs.map((run) => ({
                id: run.id,
                name: run.name,
                event: run.event,
                status: run.status,
                conclusion: run.conclusion,
                head_sha: run.head_sha,
                html_url: run.html_url,
                created_at: run.created_at,
                updated_at: run.updated_at,
                artifacts: [],
              }));

              runCache.set(headSha, runSummaries);
              return runSummaries;
            }

            async function listArtifactsForSuccessfulRequiredRuns(runSummaries, requiredWorkflowNames) {
              const requiredSuccessfulRuns = runSummaries.filter((run) =>
                requiredWorkflowNames.includes(run.name) && run.status === 'completed' && run.conclusion === 'success'
              );

              const cappedRuns = requiredSuccessfulRuns.slice(0, 3);
              for (const run of cappedRuns) {
                if (artifactCache.has(run.id)) {
                  run.artifacts = artifactCache.get(run.id);
                  continue;
                }

                const { data } = await withRetry(() => github.rest.actions.listWorkflowRunArtifacts({
                  owner,
                  repo,
                  run_id: run.id,
                  per_page: 20,
                }));

                const artifacts = data.artifacts.map((artifact) => ({
                  id: artifact.id,
                  name: artifact.name,
                  expired: artifact.expired,
                  size_in_bytes: artifact.size_in_bytes,
                  archive_download_url: artifact.archive_download_url,
                }));
                artifactCache.set(run.id, artifacts);
                run.artifacts = artifacts;
              }
              return runSummaries;
            }

            function evaluate({ headSha, runSummaries, requiredWorkflowNames, optionalWorkflowNames }) {
              const failures = [];
              const pending = [];

              if (!headSha) failures.push('PR head SHA was not resolved.');
              if (runSummaries.length === 0) failures.push(`No workflow runs found for PR head SHA ${headSha}.`);

              const requiredResults = requiredWorkflowNames.map((name) => {
                const matchingRuns = runSummaries.filter((run) => run.name === name);
                const successfulRuns = matchingRuns.filter((run) => run.status === 'completed' && run.conclusion === 'success');
                const failedRuns = matchingRuns.filter((run) => run.status === 'completed' && run.conclusion && run.conclusion !== 'success');
                const activeRuns = matchingRuns.filter((run) => run.status !== 'completed');
                const latest = matchingRuns.sort((a, b) => String(b.updated_at).localeCompare(String(a.updated_at)))[0] || null;

                if (matchingRuns.length === 0) failures.push(`Required workflow has no run on current head SHA: ${name}`);
                else if (activeRuns.length > 0 && successfulRuns.length === 0) pending.push(`Required workflow still running on current head SHA: ${name}`);
                else if (successfulRuns.length === 0 && failedRuns.length > 0) failures.push(`Required workflow failed on current head SHA: ${name}`);

                return {
                  name,
                  matching_runs: matchingRuns.length,
                  successful_runs: successfulRuns.length,
                  failed_runs: failedRuns.length,
                  active_runs: activeRuns.length,
                  latest,
                };
              });

              const optionalResults = optionalWorkflowNames.map((name) => {
                const matchingRuns = runSummaries.filter((run) => run.name === name);
                return { name, matching_runs: matchingRuns.length };
              });

              const allArtifacts = runSummaries.flatMap((run) => (run.artifacts || []).map((artifact) => ({ ...artifact, workflow: run.name, run_id: run.id })));

              return {
                status: failures.length === 0 && pending.length === 0 ? 'passed' : failures.length > 0 ? 'failed' : 'pending',
                failures,
                pending,
                required_workflows: requiredResults,
                optional_workflows: optionalResults,
                observed_artifacts: allArtifacts,
              };
            }

            const pr = await getPullRequest();
            const headSha = pr.head.sha;
            const requiredWorkflowNames = parseList(process.env.REQUIRED_WORKFLOW_NAMES);
            const optionalWorkflowNames = parseList(process.env.OPTIONAL_WORKFLOW_NAMES);
            const maxWaitSeconds = Number(process.env.MAX_WAIT_SECONDS || '60');
            const pollSeconds = Number(process.env.POLL_SECONDS || '30');
            const deadline = Date.now() + maxWaitSeconds * 1000;

            let runSummaries = [];
            let gate = null;

            do {
              runSummaries = await listRuns(headSha);
              gate = evaluate({ headSha, runSummaries, requiredWorkflowNames, optionalWorkflowNames });
              if (gate.status !== 'pending') break;
              runCache.delete(headSha);
              core.info(`Evidence still pending. Waiting ${pollSeconds}s before one lightweight recheck.`);
              await sleep(pollSeconds * 1000);
            } while (Date.now() < deadline);

            if (gate.status === 'pending') {
              gate.failures.push(...gate.pending);
              gate.status = 'failed';
            }

            try {
              runSummaries = await listArtifactsForSuccessfulRequiredRuns(runSummaries, requiredWorkflowNames);
              gate = evaluate({ headSha, runSummaries, requiredWorkflowNames, optionalWorkflowNames });
            } catch (error) {
              core.warning(`Artifact collection skipped due to GitHub API limitation: ${error.message}`);
            }

            const audit = {
              schema_version: '1.0.2',
              generated_at: new Date().toISOString(),
              repository: `${owner}/${repo}`,
              pr: {
                number: pr.number,
                title: pr.title,
                draft: pr.draft,
                state: pr.state,
                head_ref: pr.head.ref,
                base_ref: pr.base.ref,
                head_sha: headSha,
                html_url: pr.html_url,
              },
              gate,
              workflow_runs: runSummaries,
            };

            fs.mkdirSync('audit', { recursive: true });
            fs.writeFileSync('audit/pr-evidence-gate.json', JSON.stringify(audit, null, 2));
            fs.writeFileSync('audit/pr-evidence-gate.md', [
              `# PR Evidence Gate`,
              ``,
              `- Repository: ${owner}/${repo}`,
              `- PR: #${pr.number}`,
              `- Head SHA: ${headSha}`,
              `- Status: ${audit.gate.status}`,
              `- Failures: ${audit.gate.failures.length}`,
              `- Pending after wait: ${audit.gate.pending.length}`,
              ``,
              `## Failures`,
              audit.gate.failures.length ? audit.gate.failures.map((failure) => `- ${failure}`).join('\n') : '- None',
            ].join('\n'));

            core.setOutput('status', audit.gate.status);
            core.setOutput('head_sha', headSha);

            if (audit.gate.status !== 'passed') {
              core.setFailed(audit.gate.failures.join('\n'));
            }

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-evidence-gate-${{ steps.evidence.outputs.head_sha || github.sha }}
          path: audit/
          if-no-files-found: error
          retention-days: 30
