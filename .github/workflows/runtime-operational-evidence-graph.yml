name: Runtime Operational Evidence Graph

on:
  pull_request:
    paths:
      - 'tools/product_intelligence/**'
      - 'docs/operations/**'
      - '.github/workflows/runtime-operational-evidence-graph.yml'

jobs:
  runtime-operational-evidence-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate timeline prerequisite
        run: python tools/product_intelligence/generate_runtime_operational_correlation_timeline.py
      - name: Generate evidence graph
        run: python tools/product_intelligence/generate_runtime_operational_evidence_graph.py
      - name: Validate evidence graph
        run: |
          python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('reports/github-runtime-analytics/runtime-operational-evidence-graph.json').read_text(encoding='utf-8'))
assert payload['mode'] == 'review_only', payload
assert payload['runtime_state'] == 'EVIDENCE_GRAPH_READY', payload
assert payload['node_count'] >= 3, payload
assert payload['edge_count'] >= 2, payload
assert payload['confidence_percent'] >= 90, payload
assert payload['risk_percent'] <= 5, payload
PY
