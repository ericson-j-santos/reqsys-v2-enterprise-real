name: CI — ReqSys v2 Enterprise

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Backend — FastAPI / pytest
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ODBC driver (pyodbc dependency)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./reqsys_test.db
          JWT_SECRET_KEY: ci-secret-key-for-testing-only
          REDMINE_URL: https://placeholder.example.com
          REDMINE_API_KEY: placeholder
          ENABLE_GITHUB_REDMINE_IMPORT: "false"
          SSRS_BASE_URL: ""
        run: python -m pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # JOB 2: Frontend — Vite build
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: /api
        run: npm run build
