name: CI — ReqSys v2 Enterprise

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Backend — Lint + Segurança de dependências
  # ──────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Security (ruff + pip-audit + bandit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install lint tools
        run: pip install ruff pip-audit bandit

      - name: Lint — ruff (erros, warnings e imports)
        run: |
          ruff check app/ --select E,F,W,I --ignore E501 --output-format json --output-file /tmp/ruff-report.json
          ruff check app/ --select E,F,W,I --ignore E501

      - name: Publicar relatório ruff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ruff-report
          path: /tmp/ruff-report.json
          if-no-files-found: ignore

      - name: Segurança deps — pip-audit
        run: pip-audit -r requirements.txt

      - name: Segurança código — bandit
        run: bandit -r app/ -ll -x app/tests

  # ──────────────────────────────────────────────
  # JOB 2: Backend — Testes com cobertura
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend Tests + Coverage (pytest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ODBC driver (pyodbc dependency)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q unixodbc-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Verificar encoding UTF-8 (anti-mojibake)
        run: |
          echo "Verificando strings com mojibake em app/api/ e app/services/ ..."
          if grep -rn --include="*.py" -E "Ã§|Ã£|Ã©|Ã¡|Ãº" app/api/ app/services/ 2>/dev/null; then
            echo "ERRO: Strings com mojibake detectadas. Corrija o encoding do arquivo antes do commit."
            exit 1
          fi
          echo "OK: Nenhum mojibake encontrado."

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./reqsys_test.db
          JWT_SECRET_KEY: ci-secret-key-for-testing-only
          JWT_SECRET: ci-secret-key-for-testing-only-minimum-32-characters
          JWT_ISSUER: reqsys-ci
          JWT_AUDIENCE: reqsys-ci-tests
          ALLOW_DEMO_LOGIN: "true"
          APP_ENV: test
          REDMINE_URL: https://placeholder.example.com
          REDMINE_API_KEY: placeholder
          ENABLE_GITHUB_REDMINE_IMPORT: "false"
          SSRS_BASE_URL: ""
          GITHUB_WEBHOOK_SECRET: ""
          GITLAB_WEBHOOK_TOKEN: ""
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=app --cov-report=term-missing \
            --cov-fail-under=60

  # ──────────────────────────────────────────────
  # JOB 3: Frontend — Build + Audit de dependências
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend Build + Security Audit (Vite + npm audit)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit — npm audit
        run: npm audit --audit-level=high

      - name: Build production bundle
        env:
          VITE_API_URL: /api
        run: npm run build

  # ──────────────────────────────────────────────
  # JOB 4: Frontend — Responsividade E2E
  # ──────────────────────────────────────────────
  frontend-e2e-responsive:
    name: Frontend Responsive E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start Vite dev server
        env:
          VITE_API_URL: /api
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > /tmp/reqsys-vite.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              echo "Vite disponível"
              exit 0
            fi
            sleep 2
          done
          echo "Vite não ficou disponível no tempo esperado"
          cat /tmp/reqsys-vite.log || true
          exit 1

      - name: Run responsive layout tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
        run: npx playwright test tests/e2e/responsividade.spec.js
