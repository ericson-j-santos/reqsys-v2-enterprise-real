name: Docs MkDocs

on:
  pull_request:
    paths:
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "docs-site/**"
      - "docs/offline/**"
      - ".github/workflows/docs-mkdocs.yml"
  push:
    branches:
      - main
    paths:
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "docs-site/**"
      - "docs/offline/**"
      - ".github/workflows/docs-mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: docs-mkdocs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build MkDocs strict
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build documentation
        shell: bash
        run: |
          set +e
          mkdocs build --strict --site-dir site > mkdocs-build.log 2>&1
          status=$?
          cat mkdocs-build.log
          echo "$status" > mkdocs-build-status.txt
          exit "$status"

      - name: Upload MkDocs diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: |
            mkdocs-build.log
            mkdocs-build-status.txt
          if-no-files-found: ignore

      - name: Preserve offline fallback in artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/offline
          if [[ -f docs/offline/reqsys-docs-v0.1.0.html ]]; then
            cp docs/offline/reqsys-docs-v0.1.0.html site/offline/reqsys-docs-v0.1.0.html
          elif [[ -f docs-site/offline/reqsys-docs-v0.1.0.html ]]; then
            cp docs-site/offline/reqsys-docs-v0.1.0.html site/offline/reqsys-docs-v0.1.0.html
          else
            echo "Fallback offline não encontrado em docs/offline nem docs-site/offline." >&2
            exit 1
          fi

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        id: configure-pages
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Deploy Pages
        id: deployment
        if: steps.configure-pages.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Report Pages deployment status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.configure-pages.outcome }}" != "success" ]]; then
            echo "GitHub Pages ainda não está configurado para este repositório. Build MkDocs permaneceu validado; deploy tratado como não bloqueante."
            exit 0
          fi
          if [[ "${{ steps.deployment.outcome }}" != "success" ]]; then
            echo "Deploy GitHub Pages não estabilizou nesta execução. Build MkDocs permaneceu validado; deploy tratado como não bloqueante."
            exit 0
          fi
          echo "GitHub Pages publicado com sucesso: ${{ steps.deployment.outputs.page_url }}"
