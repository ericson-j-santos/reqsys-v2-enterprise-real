name: Configurar Fly Auth Azure

on:
  workflow_dispatch:
    inputs:
      fly_app:
        description: Nome do app Fly.io da API
        required: true
        default: reqsys-api
      app_env:
        description: Ambiente da aplicação
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
          - development
      app_public_url:
        description: URL pública do frontend
        required: true
        default: https://reqsys-app.fly.dev
      api_public_url:
        description: URL pública da API
        required: true
        default: https://reqsys-api.fly.dev
      azure_tenant_id:
        description: Opcional. Se vazio, tenta GitHub Secrets e depois cofre.
        required: false
        default: ''
      azure_client_id:
        description: Opcional. Se vazio, tenta GitHub Secrets e depois cofre.
        required: false
        default: ''
      cofre_tenant_key:
        description: Nome da chave do tenant no cofre
        required: true
        default: AZURE_TENANT_ID
      cofre_client_key:
        description: Nome da chave do client id no cofre
        required: true
        default: AZURE_CLIENT_ID
  push:
    branches:
      - main
    paths:
      - '.github/workflows/configurar-fly-auth-azure.yml'
      - 'scripts/configurar_fly_auth_azure.py'
      - 'backend/app/api/auth.py'
      - 'backend/app/core/config.py'

jobs:
  configurar-auth-azure-manual:
    name: Configurar secrets Fly e validar Azure AD — manual
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolver secrets, configurar Fly e validar
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          COFRE_API_URL: ${{ secrets.COFRE_API_URL }}
          VAULT_API_TOKEN: ${{ secrets.VAULT_API_TOKEN }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          TENANT_INPUT="${{ inputs.azure_tenant_id }}"
          CLIENT_INPUT="${{ inputs.azure_client_id }}"
          TENANT_VALUE="${TENANT_INPUT:-$AZURE_TENANT_ID_SECRET}"
          CLIENT_VALUE="${CLIENT_INPUT:-$AZURE_CLIENT_ID_SECRET}"

          python scripts/configurar_fly_auth_azure.py \
            --fly-app "${{ inputs.fly_app }}" \
            --app-env "${{ inputs.app_env }}" \
            --app-public-url "${{ inputs.app_public_url }}" \
            --api-public-url "${{ inputs.api_public_url }}" \
            --azure-tenant-id "$TENANT_VALUE" \
            --azure-client-id "$CLIENT_VALUE" \
            --cofre-tenant-key "${{ inputs.cofre_tenant_key }}" \
            --cofre-client-key "${{ inputs.cofre_client_key }}" \
            | tee fly-auth-azure-report.json

      - name: Publicar evidência operacional
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fly-auth-azure-report-manual
          path: fly-auth-azure-report.json

  configurar-auth-azure-todos-ambientes:
    name: Configurar Azure AD — ${{ matrix.environment }}
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: production
            fly_app: reqsys-api
            app_public_url: https://reqsys-app.fly.dev
            api_public_url: https://reqsys-api.fly.dev
          - environment: staging
            fly_app: reqsys-api-stg
            app_public_url: https://reqsys-app-stg.fly.dev
            api_public_url: https://reqsys-api-stg.fly.dev
          - environment: development
            fly_app: reqsys-api-dev
            app_public_url: https://reqsys-app-dev.fly.dev
            api_public_url: https://reqsys-api-dev.fly.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolver secrets, configurar Fly e validar ambiente
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          COFRE_API_URL: ${{ secrets.COFRE_API_URL }}
          VAULT_API_TOKEN: ${{ secrets.VAULT_API_TOKEN }}
          AZURE_TENANT_ID_SECRET: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID_SECRET: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          set -euo pipefail
          python scripts/configurar_fly_auth_azure.py \
            --fly-app "${{ matrix.fly_app }}" \
            --app-env "${{ matrix.environment }}" \
            --app-public-url "${{ matrix.app_public_url }}" \
            --api-public-url "${{ matrix.api_public_url }}" \
            --azure-tenant-id "$AZURE_TENANT_ID_SECRET" \
            --azure-client-id "$AZURE_CLIENT_ID_SECRET" \
            --cofre-tenant-key "AZURE_TENANT_ID" \
            --cofre-client-key "AZURE_CLIENT_ID" \
            | tee "fly-auth-azure-report-${{ matrix.environment }}.json"

      - name: Publicar evidência operacional
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fly-auth-azure-report-${{ matrix.environment }}
          path: fly-auth-azure-report-${{ matrix.environment }}.json

