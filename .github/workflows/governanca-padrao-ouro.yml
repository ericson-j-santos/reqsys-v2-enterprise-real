name: Governança Padrão Ouro

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validar-governanca:
    name: Validar artefatos de governança
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar documentos obrigatórios
        shell: bash
        run: |
          set -euo pipefail

          arquivos_obrigatorios=(
            "docs/governanca/PADRAO_OURO_ENTERPRISE.md"
            "docs/ADR/ADR-0001-padrao-ouro-enterprise.md"
            "docs/architecture/trilha-e/architecture-as-code.json"
            "docs/architecture/trilha-e/index.html"
            ".github/PULL_REQUEST_TEMPLATE.md"
          )

          for arquivo in "${arquivos_obrigatorios[@]}"; do
            if [ ! -s "$arquivo" ]; then
              echo "Arquivo obrigatório ausente ou vazio: $arquivo"
              exit 1
            fi
          done

      - name: Validar termos mínimos de governança
        shell: bash
        run: |
          set -euo pipefail

          documento="docs/governanca/PADRAO_OURO_ENTERPRISE.md"

          termos=(
            "correlation_id"
            "CI/CD"
            "ADR"
            "drill-down"
            "Schema-Driven UI"
            "IA corporativa auditável"
            "Gates bloqueantes"
            "Trilha E"
            "arquitetura viva"
          )

          for termo in "${termos[@]}"; do
            if ! grep -qi "$termo" "$documento"; then
              echo "Termo obrigatório não localizado no documento de governança: $termo"
              exit 1
            fi
          done

      - name: Validar Trilha E — Arquitetura Viva (padrão ouro)
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/trilha_e_arquitetura_viva.py > /tmp/trilha-e-report.json
          status="$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("/tmp/trilha-e-report.json").read_text(encoding="utf-8"))
          print(data["status"])
          PY
          )"
          if [ "$status" = "failed" ]; then
            echo "Trilha E padrão ouro falhou validação."
            cat /tmp/trilha-e-report.json
            exit 1
          fi
          echo "Trilha E padrão ouro validada: $status"

      - name: Resultado
        run: echo "Governança padrão ouro validada com sucesso."
