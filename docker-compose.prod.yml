services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      - DATABASE_URL=sqlite:////data/reqsys.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET obrigatório em prod}
    volumes:
      - reqsys-db:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api

  nginx:
    ports:
      - "${GATEWAY_PORT:-8081}:80"
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  reqsys-db:
