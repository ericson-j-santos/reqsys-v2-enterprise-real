services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    user: "1000:1000"
    # Sem ports: — backend nunca exposto diretamente em prod; acesso somente via nginx
    environment:
      - APP_ENV=production
      - ALLOW_DEMO_LOGIN=false
      # Postgres centralizado (ADR-042/ADR-043): POSTGRES_PASSWORD obrigatorio em prod,
      # sem fallback fraco. Se este ambiente ainda tem dados reais no volume `reqsys-db`
      # (sqlite legado), migre-os ANTES de trocar (ver docs/runbooks/migracao-postgres.md).
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-reqsys_app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio em prod}@db:5432/${POSTGRES_DB:-reqsys}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET obrigatorio em prod}
      - JWT_ISSUER=${JWT_ISSUER:?JWT_ISSUER obrigatorio em prod}
      - JWT_AUDIENCE=${JWT_AUDIENCE:?JWT_AUDIENCE obrigatorio em prod}
      - JWT_EXP_MINUTES=${JWT_EXP_MINUTES:-60}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tieridev.duckdns.org,https://tierin.duckdns.org,https://tieriprod.duckdns.org}
      - WIKI_SYNC_BASE_URL=${WIKI_SYNC_BASE_URL:-}
      - WIKI_SYNC_TOKEN=${WIKI_SYNC_TOKEN:-}
      - SDD_SPECS_PATH=/sdd
    volumes:
      - ${SDD_SPECS_HOST_PATH:?SDD_SPECS_HOST_PATH obrigatorio em prod}:/sdd:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  db:
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio em prod}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    user: "101:101"
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  nginx:
    ports:
      - "${GATEWAY_PORT:-8081}:80"
    volumes:
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

volumes:
  # reqsys-db (sqlite legado) nao e mais montado por nenhum servico. O volume Docker
  # em si nao e apagado automaticamente — se este ambiente tinha dados reais nele,
  # recupere com `docker run --rm -v reqsys-db:/data -v $(pwd):/backup alpine cp /data/reqsys.db /backup/`
  # ANTES de rodar `docker compose down -v`.
