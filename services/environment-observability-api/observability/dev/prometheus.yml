global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/alerts.yaml
  - /etc/prometheus/rules/synthetic-alerts.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: environment-observability-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          environment: development

  - job_name: otel-collector
    static_configs:
      - targets: ["collector:8888"]
        labels:
          environment: development
