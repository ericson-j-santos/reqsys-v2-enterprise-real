app = "reqsys-env-api-stg"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "staging"
  PUBLIC_ENVIRONMENT = "staging"
  API_PUBLIC_URL = "https://reqsys-env-api-stg.fly.dev"
  SERVICE_NAME = "environment-observability-api"
  SERVICE_VERSION = "0.1.0"
  LOG_LEVEL = "INFO"
  READINESS_ENABLED = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "20s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/api/runtime/readiness"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
