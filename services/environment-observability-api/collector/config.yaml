extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 127.0.0.1:1777
  zpages:
    endpoint: 127.0.0.1:55679
  file_storage:
    directory: /var/lib/otelcol/queue
    create_directory: true
    timeout: 10s
    compaction:
      on_start: true
      directory: /var/lib/otelcol/queue

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: ${env:OTELCOL_MEMORY_LIMIT_MIB:-256}
    spike_limit_mib: ${env:OTELCOL_MEMORY_SPIKE_MIB:-64}
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024
  resource/environment:
    attributes:
      - key: deployment.environment.name
        value: ${env:APP_ENV}
        action: upsert
      - key: service.namespace
        value: reqsys
        action: upsert
      - key: telemetry.collector.instance
        value: ${env:HOSTNAME}
        action: upsert

exporters:
  otlphttp/upstream:
    endpoint: ${env:OTEL_UPSTREAM_ENDPOINT}
    headers:
      Authorization: ${env:OTEL_UPSTREAM_AUTHORIZATION:-}
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      storage: file_storage
      num_consumers: 4
      queue_size: ${env:OTELCOL_QUEUE_SIZE:-10000}
  debug/sampled:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 500

service:
  extensions: [health_check, pprof, zpages, file_storage]
  telemetry:
    logs:
      level: ${env:OTELCOL_LOG_LEVEL:-info}
      encoding: json
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/environment, batch]
      exporters: [otlphttp/upstream, debug/sampled]
