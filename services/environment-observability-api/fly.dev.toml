app = "reqsys-env-api-dev"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "development"
  PUBLIC_ENVIRONMENT = "development"
  API_PUBLIC_URL = "https://reqsys-env-api-dev.fly.dev"
  SERVICE_NAME = "environment-observability-api"
  SERVICE_VERSION = "0.1.0"
  LOG_LEVEL = "DEBUG"
  READINESS_ENABLED = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
