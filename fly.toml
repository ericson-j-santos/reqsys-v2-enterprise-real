app = "reqsys-api"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  APP_ENV = "production"
  ALLOW_DEMO_LOGIN = "false"
  DATABASE_URL = "sqlite:////data/reqsys.db"
  JWT_EXP_MINUTES = "60"
  CORS_ORIGINS = "https://reqsys-app.fly.dev,https://reqsys-api.fly.dev"
  SDD_SPECS_PATH = "/app/specs"
  REQSYS_BOOT_FALLBACK = "true"
  REQSYS_BOOT_FALLBACK_DATABASE_URL = "sqlite:////tmp/reqsys-fallback.db"
  REQSYS_BOOT_MAX_ATTEMPTS = "8"

[[mounts]]
  source = "reqsys_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "90s"
    method = "GET"
    path = "/api/runtime/health"
    protocol = "http"

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "90s"
    method = "GET"
    path = "/api/runtime/readiness"
    protocol = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
