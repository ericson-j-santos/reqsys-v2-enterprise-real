services:
  api:
    build: ./backend-dotnet
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ReqSys__Version: ${REQSYS_VERSION:-3.1.0}
      ReqSys__CorsOrigins__0: ${REQSYS_CORS_ORIGIN_0:?REQSYS_CORS_ORIGIN_0 obrigatorio para a stack .NET}
      ReqSys__Jwt__Issuer: ${REQSYS_JWT_ISSUER:?REQSYS_JWT_ISSUER obrigatorio para a stack .NET}
      ReqSys__Jwt__Audience: ${REQSYS_JWT_AUDIENCE:?REQSYS_JWT_AUDIENCE obrigatorio para a stack .NET}
      ReqSys__Jwt__Secret: ${REQSYS_JWT_SECRET:?REQSYS_JWT_SECRET obrigatorio para a stack .NET}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - reqsys-dotnet-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - reqsys-dotnet-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${DOTNET_GATEWAY_PORT:-8090}:80"
    volumes:
      - ./infra/nginx/default.dotnet.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - reqsys-dotnet-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  reqsys-dotnet-net:
    driver: bridge
